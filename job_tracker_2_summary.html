<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>PFF Table</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;

      --blue-cone: rgba(74, 86, 255, 0.82);
      --green-cone: rgba(36, 210, 116, 0.78);
      --red-cone: rgba(255, 92, 48, 0.76);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow: hidden;
    }

    #fit {
      width: 100%;
    }

    #app {
      width: 100%;
      margin: 0;
      padding: 14px 2px 14px;
      text-align: center;
    }

    #app.is-loading .table-section {
      display: none;
    }

    #app:not(.is-loading) .app-loading {
      display: none;
    }

    .app-loading {
      width: 100%;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .cone-loader {
      position: relative;
      width: 176px;
      height: 78px;
      margin: 0 auto;
      overflow: visible;
      isolation: isolate;
    }

    .cone {
      position: absolute;
      bottom: 8px;
      width: 58px;
      height: 68px;
      opacity: 0;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      -webkit-clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      filter: none;
      mix-blend-mode: normal;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
      will-change: opacity;
    }

    .cone.blue {
      left: 33px;
      background: var(--blue-cone);
      animation: blueConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.green {
      left: 69px;
      background: var(--green-cone);
      animation: greenConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.red {
      left: 85px;
      background: var(--red-cone);
      animation: redConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .loader-text {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      line-height: 1.35;
      text-align: center;
      animation: loadingTextPulse 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    @keyframes blueConeCycle {
      0% {
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes greenConeCycle {
      0% {
        opacity: 0;
      }

      20% {
        opacity: 0;
      }

      32% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes redConeCycle {
      0% {
        opacity: 0;
      }

      40% {
        opacity: 0;
      }

      52% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes loadingTextPulse {
      0% {
        opacity: 0.45;
      }

      52% {
        opacity: 0.78;
      }

      76% {
        opacity: 0.78;
      }

      87% {
        opacity: 0.45;
      }

      100% {
        opacity: 0.45;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cone.blue,
      .cone.green,
      .cone.red {
        animation: none;
        opacity: 1;
      }

      .loader-text {
        animation: none;
        opacity: 0.72;
      }
    }
    .table-section {
      width: 100%;
      margin-top: 0;
    }
    .table-lead {
      margin: 0 0 10px;
      color: var(--ink);
      text-align: center;
    }

    .table-lead-primary,
    .table-lead-secondary {
      margin: 0;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.3;
    }

    .table-lead-secondary {
      margin-top: 2px;
    }
    .table-wrap {
      position: relative;
      width: 100%;
    }

    .table-wrap::after {
      content: "";
      position: absolute;
      z-index: 2;
      top: 0;
      bottom: 0;
      left: 24%;
      width: 1px;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        #fff 0%,
        rgba(21, 21, 21, 0.16) 10%,
        var(--ink) 18%,
        rgba(21, 21, 21, 0.16) 78%,
        #fff 100%
      );
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .data-table th,
    .data-table td {
      position: relative;
      padding: 8px 6px;
      line-height: 1.2;
      text-align: center;
    }

    .data-table th {
      color: var(--muted);
      font-size: clamp(11px, 3.4vw, 14px);
      font-weight: 700;
      white-space: nowrap;
    }

    .data-table td {
      color: var(--ink);
      font-size: clamp(12px, 3.6vw, 15px);
      font-weight: 400;
    }

    .data-table th + th,
    .data-table td + td {
      border-left: 1px solid var(--track);
    }

    .data-table th:nth-child(2),
    .data-table td:nth-child(2) {
      border-left: 0;
    }

    .data-table .table-major-separator td {
      height: 0;
      padding: 0;
      line-height: 0;
      background: transparent;
      border-top: 1px solid var(--ink);
    }

    .data-table .table-empty-separator td {
      height: 0;
      padding: 0;
      line-height: 0;
      background: transparent;
      border-top: 1px solid var(--track);
    }

    .data-table sup {
      font-size: 0.7em;
      line-height: 0;
      vertical-align: super;
    }

    .live-data-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      margin: 0;
      padding: 0;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }

    .live-data-dot {
      width: 6px;
      height: 6px;
      flex: 0 0 6px;
      border-radius: 50%;
      background: #e53935;
    }

    .data-table th:first-child,
    .data-table td:first-child {
      width: 24%;
    }

    .data-table td:first-child {
      font-weight: 700;
      white-space: nowrap;
    }

    .error {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 430px) {
      #app {
        padding: 12px 1px 12px;
      }

      .data-table th,
      .data-table td {
        padding: 7px 3px;
      }

      .data-table th {
        font-size: 11px;
      }

      .data-table td {
        font-size: 12px;
      }
      .app-loading {
        min-height: 155px;
      }

      .cone-loader {
        width: 160px;
        height: 70px;
      }

      .cone {
        width: 52px;
        height: 61px;
      }

      .cone.blue {
        left: 30px;
      }

      .cone.green {
        left: 64px;
      }

      .cone.red {
        left: 78px;
      }

      .loader-text {
        font-size: 10px;
      }      
    }
  </style>
</head>

<body>
  <div id="fit">
    <main id="app" class="is-loading">
      <div id="loading-state" class="app-loading" role="status" aria-label="Loading">
        <div class="cone-loader">
          <div class="cone blue" aria-hidden="true"></div>
          <div class="cone green" aria-hidden="true"></div>
          <div class="cone red" aria-hidden="true"></div>
        </div>

        <div class="loader-text">Loading...</div>
      </div>

      <section class="table-section" aria-label="PFF table">
        <div class="table-lead">
          <p class="table-lead-primary">For roles outside optometry practice</p>
          <p class="table-lead-secondary">New jobs in the last...:</p>
        </div>

        <div class="table-wrap">
          <table id="data-table" class="data-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>

      </section>
    </main>
  </div>

  <script>
    const SPREADSHEET_ID = '12kFzZpUBE8J4WZygnK2EbFIEFC2MN2MWNuCselrFZ6s';
    const SHEET_NAME = 'Optom-related jobs summary stats';
    const TABLE_RANGE = 'K1:M3';
    const EXPECTED_ROWS = 3;
    const EXPECTED_COLS = 3;

    const app = document.getElementById('app');
    const dataTable = document.getElementById('data-table');
    const loadingState = document.getElementById('loading-state');

    function appendLiveDataCell(cell) {
      const liveData = document.createElement('span');
      liveData.className = 'live-data-inline';
      liveData.setAttribute('aria-label', 'Live data');

      const dot = document.createElement('span');
      dot.className = 'live-data-dot';
      dot.setAttribute('aria-hidden', 'true');

      const text = document.createElement('span');
      text.textContent = 'LIVE data';

      liveData.appendChild(dot);
      liveData.appendChild(text);
      cell.appendChild(liveData);
    }

    function appendHeaderText(cell, value) {
      const text = String(value || '—');
      const suffixMatch = text.match(/^(.*?)(th)$/i);

      if (!suffixMatch) {
        cell.textContent = text;
        return;
      }

      cell.appendChild(document.createTextNode(suffixMatch[1]));

      const superscript = document.createElement('sup');
      superscript.textContent = suffixMatch[2];
      cell.appendChild(superscript);
    }

    function hideLoadingState() {
      app.classList.remove('is-loading');
      loadingState.setAttribute('aria-hidden', 'true');
    }

    function formatCellText(value) {
      const text = String(value || '')
        .replace(/\u00A0/g, ' ')
        .trim()
        .replace(/\s+/g, ' ');

      if (text.toLowerCase() === 'optom-related') {
        return 'Opt-related';
      }

      return text || '—';
    }
    function renderTable(values) {
      hideLoadingState();

      const thead = dataTable.querySelector('thead');
      const tbody = dataTable.querySelector('tbody');

      thead.textContent = '';
      tbody.textContent = '';

      const headers = values?.[0] || [];
      const dataRows = values?.slice(1) || [];

      const headerRow = document.createElement('tr');

      headers.forEach((value, index) => {
        const th = document.createElement('th');
        th.scope = 'col';

        if (index === 0) {
          appendLiveDataCell(th);
        } else {
          appendHeaderText(th, value);
        }

        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);

      const separatorRow = document.createElement('tr');
      separatorRow.className = 'table-major-separator';

      const separatorCell = document.createElement('td');
      separatorCell.colSpan = Math.max(headers.length, 1);

      separatorRow.appendChild(separatorCell);
      thead.appendChild(separatorRow);

      dataRows.forEach(row => {
        const isBlankRow = headers.every((_, index) => {
          return String(row?.[index] ?? '').trim() === '';
        });

        if (isBlankRow) {
          const separatorRow = document.createElement('tr');
          separatorRow.className = 'table-empty-separator';

          const separatorCell = document.createElement('td');
          separatorCell.colSpan = Math.max(headers.length, 1);

          separatorRow.appendChild(separatorCell);
          tbody.appendChild(separatorRow);
          return;
        }

        const tr = document.createElement('tr');

        headers.forEach((_, index) => {
          const td = document.createElement('td');
          const rawValue = row?.[index] || '';

          if (index === 0) {
            td.textContent = formatCellText(rawValue);
          } else {
            td.textContent = rawValue || '—';
          }

          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
    }

    function showError(error) {
      console.error(error);

      hideLoadingState();

      renderTable([
        ['ERROR', '—', '—'],
        [error?.message || 'Could not load data', '—', '—'],
        ['—', '—', '—']
      ]);

      dataTable.classList.add('error');
    }

    function getCellDisplayValue(cell) {
      if (!cell) return '';
      return String(cell.f ?? cell.v ?? '').trim();
    }

    function normaliseGvizTable(response) {
      if (response?.status === 'error') {
        throw new Error(response?.errors?.[0]?.detailed_message || 'Could not load Google Sheet data');
      }
    
      const cols = response?.table?.cols || [];
      const rows = response?.table?.rows || [];
      const values = [];
    
      // Rebuild the original header row from Google Sheets column labels.
      const headerRow = [];
    
      for (let c = 0; c < EXPECTED_COLS; c++) {
        headerRow.push(String(cols?.[c]?.label ?? '').trim() || '—');
      }
    
      values.push(headerRow);
    
      // Then add the remaining data rows.
      for (let r = 0; r < EXPECTED_ROWS - 1; r++) {
        const row = [];
    
        for (let c = 0; c < EXPECTED_COLS; c++) {
          row.push(getCellDisplayValue(rows?.[r]?.c?.[c]));
        }
    
        values.push(row);
      }
    
      return values;
    }

      return values;
    }

    function loadTableData() {
      const callbackName = `pffJobTracker2Callback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
      const script = document.createElement('script');

      const timeout = window.setTimeout(() => {
        cleanup();
        showError(new Error('Could not load data'));
      }, 10000);

      function cleanup() {
        window.clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      window[callbackName] = response => {
        cleanup();

        try {
          renderTable(normaliseGvizTable(response));
        } catch (error) {
          showError(error);
        }
      };

      script.onerror = () => {
        cleanup();
        showError(new Error('Could not load data'));
      };

    const params = new URLSearchParams({
      sheet: SHEET_NAME,
      range: TABLE_RANGE,
      headers: '1',
      tqx: `responseHandler:${callbackName}`
    });

      script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
      document.body.appendChild(script);
    }

    loadTableData();
  </script>
</body>
</html>
