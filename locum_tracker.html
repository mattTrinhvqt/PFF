<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Casual & Locum Optom Income Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #6600ff;
  --ink: #151515;
  --muted: #69718a;
  --track: #e8eaf0;
}

* {
  box-sizing: border-box;
}

html {
  margin: 0;
  padding: 0;
  min-height: 100%;
}

body {
  font-family: 'Lato', sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100%;
  color: var(--ink);
  background: #fff;
  overflow-x: hidden;
  overflow-y: auto;
}

#fit {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100dvh;
  width: 100%;
}

.box {
  width: min(100%, 560px);
  padding: 30px 28px 36px;
  text-align: center;
}

/* Permanent tracker instructions */
.tracker-notice {
  width: 100%;
  margin: 0 0 8px;
  padding: 0 0 14px;
  border-bottom: 1px solid var(--track);
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
  text-align: center;
}

.tracker-notice p {
  margin: 0;
}

.tracker-notice p + p {
  margin-top: 2px;
}

/* One-question wizard */
.step {
  display: none;
}

.step.active {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  min-height: 68dvh;
}

/* Progress moves visually to the top */
.progress {
  order: 1;
  width: 100%;
  min-height: 42px;
  margin: 0;
  padding-top: 22px;
  font-size: 15px;
  color: var(--purple);
  text-align: center;
}

.progress::before {
  content: '';
  display: block;
  height: 4px;
  margin: 0 0 20px;
  border-radius: 99px;
  background: linear-gradient(
    to right,
    var(--purple) 0 var(--progress, 20%),
    var(--track) var(--progress, 20%) 100%
  );
}

/* Question area */
.step-body {
  order: 2;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
  width: 100%;
  padding-top: 48px;
}

.step-body > label {
  display: block;
  max-width: 500px;
  margin: 0 auto 16px;
  color: var(--ink);
  font-size: clamp(24px, 6vw, 32px);
  font-weight: 700;
  line-height: 1.2;
  text-align: center;
}

.step-body > label small {
  display: block;
  margin-top: 12px;
  color: var(--muted);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.45;
}

.step[data-step="1"] .question-title {
  font-size: clamp(30px, 8vw, 42px);
}

.step[data-step="5"] .step-body > label {
  font-size: clamp(22px, 5.8vw, 30px);
}

.workplace-banner {
  margin: 0 0 10px;
  color: var(--muted);
  font-size: 14px;
  text-align: center;
}

/* Standard line-style inputs and dropdowns */
.step-body > input[type="number"],
.step-body > select {
  display: block;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  height: 58px;
  margin: 18px auto 0;
  padding: 0 4px;
  color: var(--ink);
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--ink);
  border-radius: 0;
  font: inherit;
  font-size: 22px;
  text-align: center;
  outline: none;
}

.step-body > input[type="number"]:focus,
.step-body > select:focus {
  border-bottom-color: var(--ink);
}

select {
  text-align-last: center;
  -moz-text-align-last: center;
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  margin: 0;
  -webkit-appearance: none;
}

/* First-screen rate field */
.rate-field {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  min-width: 0;
  height: 70px;
  margin-top: 26px;
  border-bottom: 1px solid var(--ink);
}

.rate-prefix {
  color: var(--purple);
  font-size: 40px;
  font-weight: 400;
  line-height: 1;
}

.rate-field input[type="number"] {
  flex: 1;
  width: auto;
  height: 100%;
  margin: 0;
  padding: 0;
  color: var(--ink);
  background: transparent;
  border: 0;
  border-radius: 0;
  font: inherit;
  font-size: 32px;
  text-align: left;
  outline: none;
}

.rate-suffix {
  color: var(--muted);
  font-size: 22px;
}

/* Buttons */
.nav-row {
  order: 3;
  display: flex;
  align-items: center;
  width: 100%;
  min-height: 54px;
  margin-top: 30px;
  padding: 0;
  gap: 12px;
}

button {
  font-family: inherit;
  cursor: pointer;
}

.nav-row .next,
.nav-row #submit,
.nav-row #submit-another {
  flex: 1;
  min-height: 54px;
  padding: 0 20px;
  color: #fff;
  background: var(--ink);
  border: 0;
  border-radius: 6px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0;
}

.nav-row .next:hover,
.nav-row #submit:hover,
.nav-row #submit-another:hover {
  background: #26324d;
}

.nav-row .back {
  min-height: 48px;
  padding: 0 8px;
  color: var(--muted);
  background: transparent;
  border: 0;
  font-size: 15px;
}

.nav-row .next:only-child {
  width: 100%;
}

/* Previously submitted entry / errors / confirmation */
#out {
  width: 100%;
  margin: 20px auto 0;
  min-height: 1.6em;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.55;
  text-align: left;
  white-space: pre-line;
}

.last-submitted-note {
  padding-top: 8px;
}

.last-submitted-date {
  color: var(--ink);
  font-size: 17px;
}

.last-submitted-date span {
  margin-right: 8px;
  color: var(--muted);
  font-weight: 700;
}

.last-submitted-details {
  margin-top: 8px;
  color: var(--muted);
  font-size: 16px;
}

.multi {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  margin: 14px auto 0;
  text-align: left;
}

.multi label {
  display: inline-flex;
  align-items: center;
  margin: 5px 0;
  color: var(--ink);
  font-size: 16px;
  font-weight: 400;
}

.multi label input {
  margin-right: 9px;
}

small {
  color: var(--muted);
}

@media (max-width: 430px) {
  .box {
    padding: 24px 24px 32px;
  }

  .step-body {
    padding-top: 38px;
  }

  .rate-field {
    height: 62px;
  }

  .rate-prefix {
    font-size: 34px;
  }

  .rate-field input[type="number"] {
    font-size: 28px;
  }

  .rate-suffix {
    font-size: 19px;
  }
}

/* ---------- Compact fixed-position wizard override ---------- */

.box {
  width: min(calc(100% - 24px), 520px);
  max-width: 100%;
  min-width: 0;
  margin-inline: auto;
  padding: 20px 18px 28px;
}

/* Same three-row structure on every question:
   progress → question/answer area → navigation */
.step.active {
  display: grid;
  grid-template-areas:
    "progress"
    "body"
    "nav";
  grid-template-rows: 28px minmax(0, 1fr) 48px;
  min-height: clamp(420px, 60dvh, 500px);
  align-items: stretch;
}

/* Progress always occupies the same top position */
.progress {
  grid-area: progress;
  order: initial;
  min-height: 28px;
  margin: 0;
  padding: 0;
  color: var(--purple);
  font-size: 13px;
  line-height: 28px;
  text-align: center;
}

.progress::before {
  display: none;
}

/* Question and answer zone always starts at the same place */
.step-body {
  grid-area: body;
  order: initial;
  display: flex;
  flex: none;
  min-height: 0;
  padding: 24px 0 0;
}

/* Reserve equal space for every heading/help block */
.step-body > label {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 108px;
  margin: 0;
  font-size: clamp(22px, 5.4vw, 28px);
  line-height: 1.2;
}

.step-body > label small {
  margin-top: 8px;
  font-size: 13px;
  line-height: 1.35;
}

.step[data-step="1"] .question-title {
  font-size: clamp(28px, 6.6vw, 36px);
}

.step[data-step="5"] .step-body > label {
  font-size: clamp(21px, 5.2vw, 27px);
}

/* All normal answer lines are slimmer and positioned consistently */
.step-body > input[type="number"],
.step-body > select {
  height: 50px;
  margin: 0 auto;
  padding: 0 4px;
  font-size: 20px;
  border-bottom-width: 1px;
}

/* Slimmer first-question rate line */
.rate-field {
  height: 50px;
  margin-top: 0;
  border-bottom-width: 1px;
}

.rate-prefix {
  font-size: 32px;
}

.rate-field input[type="number"] {
  min-width: 0;
  font-size: 26px;
}

.rate-suffix {
  font-size: 18px;
}

/* Navigation always occupies the same bottom row */
.nav-row {
  grid-area: nav;
  order: initial;
  align-self: end;
  min-height: 48px;
  margin-top: 0;
  gap: 10px;
}

.nav-row .next,
.nav-row #submit,
.nav-row #submit-another {
  min-height: 48px;
  padding: 0 18px;
  border-radius: 6px;
  font-size: 16px;
}

.nav-row .back {
  flex: 0 0 64px;
  min-height: 48px;
  padding: 0 4px;
  font-size: 14px;
}

/* Keep the first full-width Next button, but at the same height */
.nav-row .next:only-child {
  width: 100%;
}

/* Slimmer previous-submission section */
#out {
  margin-top: 14px;
  font-size: 14px;
}

.last-submitted-date {
  font-size: 16px;
}

.last-submitted-details {
  margin-top: 5px;
  font-size: 15px;
}

@media (max-width: 430px) {
  .box {
    width: calc(100% - 24px);
    padding: 18px 14px 26px;
  }

  .step.active {
    min-height: clamp(400px, 58dvh, 470px);
  }

  .step-body {
    padding-top: 20px;
  }

  .step-body > label {
    min-height: 100px;
  }

  .rate-field {
    height: 48px;
  }

  .rate-prefix {
    font-size: 30px;
  }

  .rate-field input[type="number"] {
    font-size: 24px;
  }
}

/* Last-submitted note within Question 1 */
#last-submitted {
  width: 100%;
  margin-top: 12px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.45;
  text-align: left;
}

#rate-warning,
.field-warning {
  width: 100%;
  margin-top: 10px;
  color: #b42318;
  font-size: 14px;
  line-height: 1.45;
  text-align: left;
}

#rate-warning:empty,
.field-warning:empty {
  display: none;
}

/* Inline action links */
#rate-warning button,
.field-warning button,
.step-body > label small a {
  color: var(--purple);
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.45;
  text-decoration: underline;
}

#rate-warning button,
.field-warning button {
  display: block;
  margin: 8px 0 0;
  padding: 0;
  background: transparent;
  border: 0;
}

#last-submitted:empty {
  display: none;
}

#last-submitted .last-submitted-note {
  padding-top: 0;
}

#last-submitted .last-submitted-date {
  font-size: 14px;
}

#last-submitted .last-submitted-details {
  margin-top: 4px;
  font-size: 14px;
}

.step.active,
.step-body,
.nav-row,
.rate-field {
  min-width: 0;
}

@media (max-width: 430px) {
  .step-body > input[type="number"],
  .step-body > select {
    min-width: 0;
    max-width: 100%;
  }
}
</style>
</head>

<body>
<div id="fit">
<div id="app" class="box">

  <aside class="tracker-notice" role="note">
    <p>Best used in a non-Facebook browser</p>
    <p>Australian locum optometrists only</p>
    <p>Submit per locum stint</p>
  </aside>

  <!-- Step 1 -->
  <div class="step active" data-step="1">
    <div class="step-body">
      <label for="q1_rate" class="question-title">
        Hourly weekday rate
        <small>Exclude bonuses</small>
      </label>

      <div class="rate-field">
        <span class="rate-prefix">$</span>

        <input
          id="q1_rate"
          type="number"
          inputmode="numeric"
          enterkeyhint="next"
          step="1"
          required
          aria-label="Hourly weekday rate"
        >

        <span class="rate-suffix">/hour</span>
      </div>

      <div id="rate-warning" role="alert" aria-live="polite"></div>
      <div id="last-submitted"></div>
    </div>

    <div class="nav-row">
      <button type="button" class="next">Next</button>
    </div>

    <div class="progress"></div>
  </div>

  <!-- Step 2 -->
  <div class="step" data-step="2">
    <div class="step-body">
      <label>Years since graduating</label>
      <input
        id="q2_exp"
        type="number"
        inputmode="decimal"
        enterkeyhint="next"
        step="0.5"
        required
      >
    </div>
    <div class="nav-row">
      <button type="button" class="back">Back</button>
      <button type="button" class="next">Next</button>
    </div>
    <div class="progress"></div>
  </div>

  <!--
    Patient-volume question temporarily disabled.
    To restore it later, remove this opening and closing HTML comment.

    <div class="step" data-step="3">
      <div class="step-body">
        <label>Average number of patients per 8hr day</label>
        <input id="q3_pats" type="number" min="0" max="50" step="1" required>
      </div>
      <div class="nav-row">
        <button type="button" class="back">Back</button>
        <button type="button" class="next">Next</button>
      </div>
      <div class="progress"></div>
    </div>
  -->

  <!-- Step 4 -->
  <div class="step" data-step="4">
    <div class="step-body">
      <label>State/territory of practice</label>
      <select id="q4_state" required>
        <option value="" selected disabled>Select…</option>
        <option>NSW</option><option>QLD</option><option>ACT</option><option>VIC</option>
        <option>SA</option><option>NT</option><option>WA</option><option>TAS</option>
      </select>
    </div>
    <div class="nav-row">
      <button type="button" class="back">Back</button>
      <button type="button" class="next">Next</button>
    </div>
    <div class="progress"></div>
  </div>

  <!-- Step 5 -->
  <div class="step" data-step="5">
    <div class="step-body">
      <label for="q4_mmm">
        Rurality of practice (MMM)
        <small>
          <a
            href="https://www.health.gov.au/resources/apps-and-tools/health-workforce-locator/health-workforce-locator"
            target="_blank"
            rel="noopener"
          >Find my MMM</a>
        </small>
      </label>

      <select id="q4_mmm" required>
        <option value="" selected disabled>Select MMM…</option>
        <option value="1">MM1 (Metropolitan areas)</option>
        <option value="2">MM2 (Regional centres)</option>
        <option value="3">MM3 (Large rural towns)</option>
        <option value="4">MM4 (Medium rural towns)</option>
        <option value="5">MM5 (Small rural towns)</option>
        <option value="6">MM6 (Remote communities)</option>
        <option value="7">MM7 (Very remote communities)</option>
      </select>
    </div>
    <div class="nav-row">
      <button type="button" class="back">Back</button>
      <button type="button" class="next">Next</button>
    </div>
    <div class="progress"></div>
  </div>

  <!--
    Specialty-services question temporarily disabled.
    To restore it later, remove this opening and closing HTML comment.

    <div class="step" data-step="6">
      <div class="step-body">
        <label>Specialty services you provide at the practice</label>
        <div class="multi">
          <label><input class="q5" type="checkbox" value="Advanced contact lenses"> Advanced contact lenses </label>
          <label><input class="q5" type="checkbox" value="Myopia control"> Myopia control</label>
          <label><input class="q5" type="checkbox" value="Behavioural / paediatric"> Behavioural / paediatric</label>
          <label><input class="q5" type="checkbox" value="Low-vision"> Low-vision</label>
          <label><input class="q5" type="checkbox" value="Dry-eye"> Dry-eye</label>
          <label><input class="q5" type="checkbox" value="None – routine eye exams"> None – routine eye exams</label>
        </div>
      </div>
      <div class="nav-row">
        <button type="button" class="back">Back</button>
        <button type="button" class="next">Next</button>
      </div>
      <div class="progress"></div>
    </div>
  -->

  <!-- Step 7 (Structure + Submit) -->
  <div class="step" data-step="7">
    <div class="step-body">
      <label>Business structure</label>
      <select id="q6_structure" required>
        <option value="" selected disabled>Select…</option>
        <option>Sole trader</option>
        <option>Company/trust</option>
      </select>
    </div>
    <div class="nav-row">
      <button type="button" class="back">Back</button>
      <button id="submit" type="button">Submit</button>
    </div>
    <div class="progress"></div>
  </div>

  <div id="out"></div>

</div><!-- /#app -->
</div><!-- /#fit -->

<script>
  /* --- Visual scale toggle (set true/false) --- */
  const ENABLE_SCALE = false;   // ← flip to false to disable scaling

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya-MZvQvUy4gauS8xTeLeRmZcYv25CcWnFv1jW56LbgmNfoy_EN1U1Gnn5uigCI2cTEg/exec';

  // Local submission history is used only to show your last submitted entry.
  // There is no submission limit for the locum tracker.

  function applyScale() {
    if (!ENABLE_SCALE) return;

    const app = document.getElementById('app');
    const fit = document.getElementById('fit');

    // Measure natural size each time (handles dynamic “Saving…/Saved!” height)
    const prev = app.style.transform;
    app.style.transform = 'none';

    // simulate post-save height while measuring
    const outEl = document.getElementById('out');
    const prevOut = outEl ? outEl.innerHTML : '';
    if (outEl && !prevOut) outEl.textContent = 'Saved!'; // wide-enough placeholder

    const NAT_W = app.offsetWidth;
    const NAT_H = app.offsetHeight;

    // restore original state (including any buttons/HTML)
    if (outEl) outEl.innerHTML = prevOut;
    app.style.transform = prev;

    const vw = window.innerWidth;
    const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight); // use visual viewport
    const scale = Math.min(vw / NAT_W, vh / NAT_H, 1);

    app.style.transform = `scale(${scale})`;
    fit.style.height = Math.min(Math.floor(vh), Math.ceil(NAT_H * scale)) + 'px'; // cap at viewport; no +2
    fit.style.width = Math.floor(window.innerWidth) + 'px';
  }

  window.addEventListener('load', applyScale);
  window.addEventListener('resize', applyScale);

  // ----- Wizard controller -----
  const steps = [...document.querySelectorAll('.step')];
  let cur = 0;
  const confirmedUnusualValues = new Map();

  function showStep(index){
    steps.forEach((s,i)=>s.classList.toggle('active', i===index));

    // Progress line
    const p = steps[index].querySelector('.progress');

    if (p) {
      p.textContent = `Q ${index + 1} of ${steps.length}`;
      p.style.setProperty(
        '--progress',
        `${((index + 1) / steps.length) * 100}%`
      );
    }

    // focus first input/select (then rescale)
    setTimeout(()=>{
      const first = steps[index].querySelector('input, select, textarea, button');
      if (first && first.id !== 'submit') first.focus();
      applyScale();
    },0);

    // On the first step, show last submitted info (if any)
    if (index === 0) {
      showLastSubmissionNote();
      document.getElementById('out').textContent = '';
    }
  }

  function showLastSubmissionNote() {
    const lastEl = document.getElementById('last-submitted');
    if (!lastEl) return;

    const raw = JSON.parse(localStorage.getItem('optomHistory') || '[]');

    const hist = Array.isArray(raw)
      ? raw.map(h => (typeof h === 'string' ? { ts: h } : h))
      : [];

    if (hist.length === 0) {
      lastEl.textContent = '';
      return;
    }

    const latest = hist.reduce((a, b) =>
      new Date(a.ts) > new Date(b.ts) ? a : b
    );

    const dt = new Date(latest.ts);

    if (isNaN(+dt)) {
      lastEl.textContent = '';
      return;
    }

    const dd = String(dt.getDate()).padStart(2, '0');
    const mm = String(dt.getMonth() + 1).padStart(2, '0');
    const yyyy = dt.getFullYear();

    const parts = [];

    if (Number.isFinite(latest.rate)) {
      parts.push(`$${Math.round(latest.rate)}/h`);
    }

    if (Number.isFinite(latest.expYears)) {
      parts.push(`${latest.expYears} yrs`);
    }

    if (latest.state) {
      parts.push(latest.state);
    }

    if (Number.isFinite(latest.mmm)) {
      parts.push(`MM${latest.mmm}`);
    }

    if (latest.structure) {
      parts.push(latest.structure);
    }

    const summary = parts.join(' · ');

    lastEl.innerHTML = `
      <div class="last-submitted-note">
        <div class="last-submitted-date">
          <span>Last submitted:</span>
          <strong>${dd}/${mm}/${yyyy}</strong>
        </div>
        ${
          summary
            ? `<div class="last-submitted-details">${summary}</div>`
            : ''
        }
      </div>
    `;
  }

  function stepValid(index){
    const stepEl = steps[index];

    // require at least one checkbox on the services step
    if (stepEl.querySelector('.q5')) {
      const any = [...stepEl.querySelectorAll('.q5')].some(c=>c.checked);
      return any;
    }

    const reqs = [...stepEl.querySelectorAll('input[required], select[required], textarea[required]')];
    return reqs.every(el=>{
      if (el.tagName === 'SELECT') return el.value && el.value !== '';
      return el.value.trim() !== '';
    });
  }

  function formatWarningNumber(value) {
    return Number(value).toLocaleString('en-AU', {
      maximumFractionDigits: 2
    });
  }

  const FIELD_RULES = {
    q1_rate: {
      hardInvalid: value => value < 0,
      hardMessage: '⚠️ Enter an hourly rate of $0 or more',
      unusual: value => value > 200,
      unusualMessage: value =>
        `⚠️ $${formatWarningNumber(value)}/hour seems unusual, please check`
    },

    q2_exp: {
      hardInvalid: value => value < 0,
      hardMessage: '⚠️ Enter 0 or more years since graduating',
      unusual: value => value > 50,
      unusualMessage: value =>
        `⚠️ ${formatWarningNumber(value)} years since graduating seems unusual, please check`
    }
  };

  function getWarningElement(field) {
    if (field.id === 'q1_rate') {
      return document.getElementById('rate-warning');
    }

    const stepEl = field.closest('.step');
    let warning = stepEl.querySelector('.field-warning');

    if (warning) return warning;

    warning = document.createElement('div');
    warning.className = 'field-warning';
    warning.setAttribute('role', 'alert');
    warning.setAttribute('aria-live', 'polite');

    field.insertAdjacentElement('afterend', warning);

    return warning;
  }

  function clearFieldWarning(field) {
    const stepEl = field.closest('.step');

    const warning = field.id === 'q1_rate'
      ? document.getElementById('rate-warning')
      : stepEl.querySelector('.field-warning');

    if (warning) {
      warning.textContent = '';
    }
  }

  function showFieldWarning(field, message, allowContinue = false) {
    const warning = getWarningElement(field);

    warning.textContent = '';
    warning.appendChild(document.createTextNode(message));

    if (!allowContinue) {
      applyScale();
      return;
    }

    const continueButton = document.createElement('button');
    continueButton.type = 'button';
    continueButton.textContent = 'Continue anyway';

    continueButton.addEventListener('click', () => {
      confirmedUnusualValues.set(field.id, field.value.trim());
      clearFieldWarning(field);

      if (cur < steps.length - 1) {
        cur++;
        showStep(cur);
      }
    });

    warning.appendChild(continueButton);
    applyScale();
  }

  function validateFieldRule(field) {
    const rule = FIELD_RULES[field.id];

    if (!rule) return true;

    const value = Number(field.value);

    if (!Number.isFinite(value)) {
      showFieldWarning(field, '⚠️ Enter a valid number');
      return false;
    }

    if (rule.hardInvalid && rule.hardInvalid(value)) {
      showFieldWarning(field, rule.hardMessage);
      return false;
    }

    const alreadyConfirmed =
      confirmedUnusualValues.get(field.id) === field.value.trim();

    if (rule.unusual && rule.unusual(value) && !alreadyConfirmed) {
      showFieldWarning(field, rule.unusualMessage(value), true);
      return false;
    }

    clearFieldWarning(field);
    return true;
  }

  document.addEventListener('input', event => {
    const field = event.target;

    if (!field.matches('input, select')) return;

    confirmedUnusualValues.delete(field.id);
    clearFieldWarning(field);
  });

  document.addEventListener('change', event => {
    const field = event.target;

    if (!field.matches('input, select')) return;

    confirmedUnusualValues.delete(field.id);
    clearFieldWarning(field);
  });

  function toNext() {
    if (!stepValid(cur)) {
      return;
    }

    const stepEl = steps[cur];
    const field = stepEl.querySelector('input[required], select[required]');

    if (field && !validateFieldRule(field)) {
      return;
    }

    if (cur < steps.length - 1) {
      cur++;
      showStep(cur);
    }
  }

  function toBack(){
    if (cur > 0){
      cur--;
      showStep(cur);
    }
  }

  // Click handlers
  document.addEventListener('click', (e)=>{
    if (e.target.classList.contains('next')) toNext();
    if (e.target.classList.contains('back')) toBack();
  });

  // Enter = Next (except on selects)
  document.addEventListener('keydown', (e)=>{
    if (e.key === 'Enter'){
      const inActive = e.target.closest('.step')?.classList.contains('active');
      if (inActive && e.target.tagName !== 'SELECT'){
        e.preventDefault();
        if (cur < steps.length - 1) toNext();
      }
    }
  });

  // Auto-advance on select change in active step
  document.addEventListener('change', (e)=>{
    const inActive = e.target.closest('.step')?.classList.contains('active');
    if (inActive && e.target.tagName === 'SELECT') toNext();
  });

  // init
  showStep(cur);

  // (nice on mobile): rescale when visual viewport changes
  window.visualViewport?.addEventListener('resize', applyScale);

  /* ---------- element handles ---------- */
  const out   = document.getElementById('out');
  const btn   = document.getElementById('submit');
  const lastNavRow  = document.querySelector('.step[data-step="7"] .nav-row');
  const lastBackBtn = lastNavRow.querySelector('.back');
  let isSaving = false;

  btn.addEventListener('click', save);

  function resetForm() {
    // Clear all inputs and selects in the app
    document.querySelectorAll('#app input, #app select').forEach(el => {
      if (el.type === 'checkbox' || el.type === 'radio') {
        el.checked = false;
      } else {
        el.value = '';
      }
    });

    confirmedUnusualValues.clear();
    clearFieldWarning(document.getElementById('q1_rate'));

    document.querySelectorAll('.field-warning').forEach(warning => {
      warning.textContent = '';
    });

    // Go back to the first step
    cur = 0;
    showStep(cur);
  }

  function getOrCreateRespondentId() {
    const storageKey = 'optomLocumRespondentId';
    let id = localStorage.getItem(storageKey);

    if (!id) {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        id = window.crypto.randomUUID();
      } else {
        id = 'ol_' + Date.now().toString(36) + '_' +
            Math.random().toString(36).slice(2);
      }

      localStorage.setItem(storageKey, id);
    }

    return id;
  }

  function submitSurveyViaJsonp(workplaces, respondentId) {
    return new Promise((resolve, reject) => {
      const callbackName = `locumSubmitCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
      const script = document.createElement('script');

      const timeout = window.setTimeout(() => {
        cleanup();
        reject(new Error('Request timed out.'));
      }, 30000);

      function cleanup() {
        window.clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      window[callbackName] = response => {
        cleanup();
        resolve(response);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error('Network error.'));
      };

      const params = new URLSearchParams({
        callback: callbackName,
        respondentId,
        workplaces: JSON.stringify(workplaces)
      });

      script.src = `${SCRIPT_URL}?${params.toString()}`;
      document.body.appendChild(script);
    });
  }

  async function save () {
    if (isSaving) return;  // prevent double-clicks while saving
    const structureField = document.getElementById('q6_structure');

    if (!structureField.value.trim()) {
      showFieldWarning(
        structureField,
        '⚠️ Please select a business structure'
      );
      applyScale();
      return;
    }

    /* read & validate fields for a single workplace… */

    const rateRaw      = document.getElementById('q1_rate').value.trim();
    const expRaw       = document.getElementById('q2_exp').value.trim();

    // Patient-volume field temporarily disabled:
    // const patsRaw      = document.getElementById('q3_pats').value.trim();

    const stateRaw     = document.getElementById('q4_state').value.trim();
    const mmmRaw       = document.getElementById('q4_mmm').value.trim();
    const structureRaw = document.getElementById('q6_structure').value.trim();

    const rate     = rateRaw  === '' ? 'x' : +rateRaw;
    const expYears = expRaw   === '' ? 'x' : +expRaw;

    // Patient-volume field temporarily disabled:
    // const patients = patsRaw === '' ? 'x' : +patsRaw;

    const state    = stateRaw === '' ? 'x' : stateRaw;
    const mmmStripped = mmmRaw.replace(/^mm/i, '').trim();
    const mmm      = mmmStripped === '' ? 'x' : +mmmStripped;
    const structure = structureRaw === '' ? 'x' : structureRaw;

    /*
      Specialty-services field temporarily disabled:

      const svcBoxes = [...document.querySelectorAll('.q5')].filter(c=>c.checked);
      const services = svcBoxes.length
        ? svcBoxes.map(c=>c.value).join('; ')
        : 'x';
    */

    let invalidQuestion = null;

    if (!Number.isFinite(rate) || rate < 0) {
      invalidQuestion = 1;
    } else if (!Number.isFinite(expYears) || expYears < 0) {
      invalidQuestion = 2;
    } else if (state === 'x') {
      invalidQuestion = 3;
    } else if (!Number.isInteger(mmm) || mmm < 1 || mmm > 7) {
      invalidQuestion = 4;
    } else if (structure === 'x') {
      invalidQuestion = 5;
    }

    if (invalidQuestion !== null) {
      out.textContent = `⚠️ Please complete Q ${invalidQuestion}`;
      applyScale();
      return;
    }

    const respondentId = getOrCreateRespondentId();

    // From this point we are actually saving – lock buttons
    isSaving = true;
    btn.disabled = true;
    lastBackBtn.disabled = true;

    // Single workplace payload
    const workplace = {
      rate,
      expYears,
      patientsPerDay: '', // Column D stays blank for new submissions
      state,
      mmm,
      services: '',       // Column F stays blank for new submissions
      structure
    };

    out.textContent = 'Submitting…';
    applyScale();

    try {
      const res = await submitSurveyViaJsonp([workplace], respondentId);

      if (!res || !res.ok) {
        throw new Error(res?.message || 'Unable to submit right now.');
      }

      // Save a concise snapshot for “last submitted” note.
      const snapshot = {
        ts: new Date().toISOString(),
        respondentId,
        rate: workplace.rate,
        expYears: workplace.expYears,
        patients: workplace.patientsPerDay,
        state: workplace.state,
        mmm: workplace.mmm,
        services: workplace.services,
        structure: workplace.structure
      };

      const historyRaw2 = JSON.parse(localStorage.getItem('optomHistory') || '[]');
      const updated = Array.isArray(historyRaw2) ? historyRaw2 : [];
      updated.push(snapshot);
      localStorage.setItem('optomHistory', JSON.stringify(updated));

      // Mark saving finished
      isSaving = false;

      // Show "Submitted!" text
      out.textContent = '✅ Submitted!';
      applyScale();

      // Replace Back + Submit with a single full-width "Submit another" button
      lastBackBtn.style.display = 'none';
      btn.style.display = 'none';

      const againBtn = document.createElement('button');
      againBtn.type = 'button';
      againBtn.id = 'submit-another';
      againBtn.textContent = 'Submit another';
      againBtn.style.width = '100%';

      lastNavRow.appendChild(againBtn);

      againBtn.addEventListener('click', () => {
        // Remove the "Submit another" button
        againBtn.remove();

        // Restore Back + Submit for the next entry
        lastBackBtn.style.display = '';
        btn.style.display = '';
        btn.disabled = false;
        lastBackBtn.disabled = false;

        resetForm();
      });

      console.log('Saved 1 workplace.');
    } catch (err) {
      // Re-enable buttons so the user can try again
      isSaving = false;
      btn.disabled = false;
      lastBackBtn.disabled = false;

      out.textContent = '⚠️ Unable to submit right now, please try again';
      applyScale();
      console.error(err);
    }
  }
</script>
