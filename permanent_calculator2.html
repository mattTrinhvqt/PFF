<!DOCTYPE html>
<html>
<head>
  <script>
    /* --- Visual scale toggle (set true/false) --- */
    const ENABLE_SCALE = false;

    let scaleTimer = null;

    function scheduleApplyScale() {
      if (!ENABLE_SCALE) return;
      clearTimeout(scaleTimer);

      scaleTimer = setTimeout(() => {
        requestAnimationFrame(applyScale);
      }, 80);
    }

    function applyScale() {
      const app = document.getElementById('app');
      const fit = document.getElementById('fit');
      if (!app || !fit) return;

      if (!ENABLE_SCALE) {
        app.style.transform = 'none';
        fit.style.minHeight = '100vh';
        fit.style.width = '100%';
        return;
      }

      const prevTransform = app.style.transform;
      app.style.transform = 'none';

      let sizer = document.getElementById('appSizer');

      if (!sizer) {
        sizer = app.cloneNode(true);
        sizer.id = 'appSizer';
        document.body.appendChild(sizer);
      } else {
        sizer.innerHTML = app.innerHTML;
      }

      Object.assign(sizer.style, {
        position: 'absolute',
        left: '-99999px',
        top: '0',
        transform: 'none',
        visibility: 'hidden',
        pointerEvents: 'none',
        display: 'block',
        width: getComputedStyle(app).width
      });

      const sResults = sizer.querySelector('#results');
      const sOut = sizer.querySelector('#out');

      if (sResults) sResults.style.display = 'block';
      if (sOut) sOut.textContent = 'Calculating…';

      const NAT_W = sizer.offsetWidth || app.offsetWidth || 1;
      const NAT_H = sizer.offsetHeight || app.offsetHeight || 1;

      app.style.transform = prevTransform;

      const vw = document.documentElement.clientWidth || window.innerWidth;
      const vh = window.innerHeight;

      const scale = Math.min(vw / NAT_W, vh / NAT_H, 1);

      app.style.transform = `scale(${scale})`;
      fit.style.width = '100%';
      fit.style.minHeight = Math.max(Math.ceil(NAT_H * scale), vh) + 'px';
    }

    window.addEventListener('load', scheduleApplyScale);
    window.addEventListener('resize', scheduleApplyScale);
    window.addEventListener('orientationchange', scheduleApplyScale);
    window.addEventListener('pageshow', scheduleApplyScale);
  </script>

  <meta charset="utf-8">
  <title>Permanent Optom Income Estimator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #fit {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100dvh;
      width: 100%;
    }

    .box {
      width: min(calc(100% - 24px), 520px);
      max-width: 100%;
      min-width: 0;
      margin-inline: auto;
      padding: 20px 18px 28px;
      text-align: center;
    }

    #app {
      transform-origin: top center;
      will-change: transform;
    }

    .calculator-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(28px, 6.6vw, 36px);
      font-weight: 700;
      line-height: 1.2;
    }

    .calculator-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .calculator-notice {
      width: 100%;
      margin: 0 0 8px;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--track);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    .calculator-notice p {
      margin: 0;
    }

    .calculator-notice p + p {
      margin-top: 2px;
    }

    #modelMeta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    #modelMeta.warn {
      color: #b42318;
    }

    .calculator-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 14px;
      text-align: left;
    }

    .field,
    .field:first-child,
    .field:nth-child(3) {
      grid-column: auto;
      margin: 0;
    }

    .field label,
    .field-heading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 0;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.25;
      text-align: center;
    }

    .field label small,
    .field-help {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.3;
      text-align: center;
    }

    .field label small a {
      color: var(--purple);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      text-decoration: underline;
    }

    .field input[type="number"],
    .field select {
      display: block;
      width: 100%;
      height: 38px;
      margin: 6px auto 0;
      padding: 0 3px;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--muted);
      border-radius: 0;
      font: inherit;
      font-size: 16px;
      text-align: center;
      outline: none;
    }

    .field input[type="number"]:focus,
    .field select:focus {
      border-bottom-color: var(--ink);
    }

    .loadings-field {
      padding-top: 2px;
    }

    .loading-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      width: 100%;
      margin-top: 8px;
    }

    .field .loading-item {
      display: block;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      text-align: center;
    }

    .field .loading-item input[type="number"] {
      width: 100%;
      margin-top: 6px;
    }

    select {
      text-align-last: center;
      -moz-text-align-last: center;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    #estimateBtn,
    #toggleBtn {
      display: block;
      width: 100%;
      min-height: 48px;
      margin: 0 auto;
      padding: 0 18px;
      border-radius: 6px;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    #estimateBtn {
      align-self: end;
      min-height: 38px;
      padding: 0 12px;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      font-size: 14px;
      font-weight: 400;
    }

    #estimateBtn:hover {
      color: #fff;
      background: var(--ink);
    }

    #toggleBtn {
      margin-top: 16px;
      min-height: 38px;
      padding: 0 12px;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      font-size: 14px;
      font-weight: 400;
    }

    #toggleBtn:hover {
      color: #fff;
      background: var(--ink);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #out {
      grid-column: 1 / -1;
      min-height: 0;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      text-align: left;
    }

    #out:empty {
      display: none;
    }

    #results {
      display: none;
      grid-column: 1 / -1;
      margin-top: 12px;
      padding-top: 22px;
      border-top: 1px solid var(--track);
      text-align: left;
    }

    .results-section-label {
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
    }

    .scale {
      --trackY: 32px;
      --barH: 6px;
      --gapValue: 6px;
      --gapLabel: 7px;

      position: relative;
      margin-top: 16px;
      padding: 40px 0 46px;
    }

    .scale .track {
      position: absolute;
      top: var(--trackY);
      right: 0;
      left: 0;
      height: var(--barH);
      background: var(--track);
      border-radius: 0;
    }

    .scale .tick {
      --stemUp: 20px;
      --stemDown: 18px;

      position: absolute;
      top: calc(var(--trackY) + var(--barH) / 2);
      transform: translateX(-50%);
      text-align: center;
    }

    .scale .t20,
    .scale .t80 {
      --stemUp: 17px;
      --stemDown: 16px;
    }

    .scale .t5,
    .scale .t95 {
      --stemUp: 14px;
      --stemDown: 14px;
    }

    .scale .tick .stem {
      position: absolute;
      top: calc(-1 * var(--stemUp));
      left: 50%;
      width: 0;
      height: calc(var(--stemUp) + var(--stemDown));
      transform: translateX(-50%);
      border-left: 3px solid var(--muted);
    }

    .scale .t50 .stem {
      border-left-width: 4px;
      border-left-color: var(--purple);
    }

    .scale .t5 .stem,
    .scale .t95 .stem {
      border-left-width: 2px;
    }

    .scale .tick .value {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, calc(-100% - var(--stemUp) - var(--gapValue)));
      color: var(--ink);
      font-size: 13px;
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
    }

    .scale .tick .label {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, calc(var(--stemDown) + var(--gapLabel)));
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
    }

    .scale .t50 .value,
    .scale .t50 .label {
      color: var(--purple);
      font-size: 16px;
      font-weight: 700;
    }

    .scale .t20 .value,
    .scale .t80 .value {
      font-size: 12px;
    }

    .scale .t5 .value,
    .scale .t95 .value {
      font-size: 11px;
    }

    .caption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    .calculator-note {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    .warn {
      color: #b42318;
    }

    @media (max-width: 430px) {
      .box {
        width: calc(100% - 24px);
        padding: 18px 14px 26px;
      }

      .calculator-form {
        grid-template-columns: 1fr;
        gap: 16px;
        margin-top: 12px;
      }

      .field label,
      .field-heading {
        min-height: 0;
        font-size: 12px;
      }

      .field label small a {
        font-size: 12px;
      }

      .field input[type="number"],
      .field select {
        height: 36px;
        margin-top: 6px;
        font-size: 15px;
      }

      .loading-grid {
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <div id="fit">
    <div id="app" class="box">

      <aside class="calculator-notice" role="note">
        <p>Shows what employers pay</p>
        <p id="modelMeta" aria-live="polite">Loading models…</p>
      </aside>

      <main class="calculator-form">

        <div class="field">
          <label for="years">
            Years since graduating
          </label>
          <input
            id="years"
            type="number"
            inputmode="decimal"
            min="0"
            max="50"
            step="0.5"
            required
          >
        </div>

        <div class="field">
          <label for="mmm">
            Rurality of practice (MMM)
            <small>
              <a
                href="https://www.health.gov.au/resources/apps-and-tools/health-workforce-locator/health-workforce-locator"
                target="_blank"
                rel="noopener"
              >Find my MMM</a>
            </small>
          </label>

          <select id="mmm" required>
            <option value="" selected disabled>Select MMM…</option>
            <option value="1">MM1 (Metropolitan areas)</option>
            <option value="2">MM2 (Regional centres)</option>
            <option value="3">MM3 (Large rural towns)</option>
            <option value="4">MM4 (Medium rural towns)</option>
            <option value="5">MM5 (Small rural towns)</option>
            <option value="6">MM6 (Remote communities)</option>
            <option value="7">MM7 (Very remote communities)</option>
          </select>
        </div>

        <div class="field">
          <label for="state">
            State/territory of practice
          </label>

          <select id="state" required>
            <option value="" selected disabled>Select…</option>
            <option>NSW</option>
            <option>QLD</option>
            <option>ACT</option>
            <option>VIC</option>
            <option>SA</option>
            <option>NT</option>
            <option>WA</option>
            <option>TAS</option>
          </select>
        </div>

        <div class="field loadings-field">
          <div class="field-heading">
            Additional loadings per 4-week cycle
          </div>
          <div class="field-help">
            Optional; weekend days are Saturdays + Sundays
          </div>

          <div class="loading-grid">
            <label class="loading-item" for="weekendDays">
              <span>Weekend days /8</span>
              <input
                id="weekendDays"
                type="number"
                inputmode="numeric"
                min="0"
                max="8"
                step="1"
                placeholder="Optional"
              >
            </label>

            <label class="loading-item" for="lateNights">
              <span>Late nights /4</span>
              <input
                id="lateNights"
                type="number"
                inputmode="numeric"
                min="0"
                max="4"
                step="1"
                placeholder="Optional"
              >
            </label>
          </div>
        </div>

        <button id="estimateBtn" type="button">Calculate</button>

        <div id="out" aria-live="polite"></div>

        <section id="results" aria-live="polite">
          <div id="resultsHeading" class="results-section-label">
            Estimated salary
          </div>

          <div id="pctScale" class="scale">
            <div class="track"></div>

            <div class="tick t5">
              <span class="value" id="p05v">–</span>
              <span class="stem"></span>
              <span class="label">5<sup>th</sup></span>
            </div>

            <div class="tick t20">
              <span class="value" id="p20v">–</span>
              <span class="stem"></span>
              <span class="label">20<sup>th</sup></span>
            </div>

            <div class="tick t50">
              <span class="value" id="p50v">–</span>
              <span class="stem"></span>
              <span class="label">Median</span>
            </div>

            <div class="tick t80">
              <span class="value" id="p80v">–</span>
              <span class="stem"></span>
              <span class="label">80<sup>th</sup></span>
            </div>

            <div class="tick t95">
              <span class="value" id="p95v">–</span>
              <span class="stem"></span>
              <span class="label">95<sup>th</sup></span>
            </div>
          </div>

          <div class="caption" id="pctCaption">
            Prediction percentiles
          </div>

          <button id="toggleBtn" type="button" style="display:none;">
            Salary; switch to hourly rate
          </button>

          <p class="calculator-note">
            Salary estimates (FTE) exclude super. Leave both loading fields blank for the standard model.
          </p>
        </section>

      </main>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzAq_9_k1NCsLeF-WIIoo7_Ggej4HVFXvxhnZ2lme8KWEPvJlZlOo0Pu7mwPB45BaoIaw/exec';

    function callPermanentEstimatorBackend(action, params = {}) {
      return new Promise((resolve, reject) => {
        if (!BACKEND_URL || BACKEND_URL === 'PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE') {
          reject(new Error('Backend URL has not been set.'));
          return;
        }

        const callbackName = `permEstimatorCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');

        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Request timed out.'));
        }, 30000);

        function cleanup() {
          window.clearTimeout(timeout);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = response => {
          cleanup();

          if (!response || !response.ok) {
            reject(new Error(response?.message || 'Request failed.'));
            return;
          }

          resolve(response);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Network error.'));
        };

        const query = new URLSearchParams({
          callback: callbackName,
          action,
          ...params
        });

        script.src = `${BACKEND_URL}?${query.toString()}`;
        document.body.appendChild(script);
      });
    }

    const out = document.getElementById('out');
    const estimateBtn = document.getElementById('estimateBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const resultsHeading = document.getElementById('resultsHeading');
    const pctCaption = document.getElementById('pctCaption');

    let viewMode = 'salary';
    let lastRes = null;
    let fteHours = null;

    const AUFMT = new Intl.NumberFormat('en-AU');

    function round0(x) {
      if (x === null || x === undefined || isNaN(x)) return '–';
      return AUFMT.format(Math.round(Number(x)));
    }

    function fmtDollarsInt(x) {
      if (x === null || x === undefined || isNaN(x)) return '–';
      return '$' + AUFMT.format(Math.round(Number(x)));
    }

    function toHourly(res) {
      if (!fteHours || !Number.isFinite(fteHours) || fteHours <= 0) {
        return null;
      }

      const f = x => Number(x) / 52 / fteHours;

      return {
        ...res,
        p05: f(res.p05),
        p20: f(res.p20),
        p50: f(res.p50),
        p80: f(res.p80),
        p95: f(res.p95),
        predLo: f(res.predLo),
        predHi: f(res.predHi)
      };
    }

    function updateView() {
      if (!lastRes) return;

      const showHourly = viewMode === 'hourly';
      const displayRes = showHourly ? toHourly(lastRes) : lastRes;

      if (showHourly && !displayRes) {
        alert('Still fetching FTE hours… please try again in a moment.');
        return;
      }

      renderPercentileScale(displayRes);

      resultsHeading.textContent = showHourly
        ? 'Estimated hourly rate'
        : 'Estimated salary';

      toggleBtn.textContent = showHourly
        ? 'Hourly rate; switch to Salary'
        : 'Salary; switch to Hourly rate';

      const modelLabel = lastRes.modelType === 'loadingAdjusted'
        ? 'Loading-adjusted model'
        : 'Standard model';

      pctCaption.textContent = `Prediction percentiles · ${modelLabel}`;
      toggleBtn.style.display = 'inline-block';

      scheduleApplyScale();
    }

    function renderPercentileScale(res) {
      const [p05, p20, p50, p80, p95] =
        [res.p05, res.p20, res.p50, res.p80, res.p95].map(Number);

      const P_MIN = 5;
      const P_MAX = 95;
      const P_SPAN = P_MAX - P_MIN;

      const posPct = p => ((p - P_MIN) / P_SPAN) * 100;

      document.querySelector('.t5').style.left = posPct(5) + '%';
      document.querySelector('.t20').style.left = posPct(20) + '%';
      document.querySelector('.t50').style.left = posPct(50) + '%';
      document.querySelector('.t80').style.left = posPct(80) + '%';
      document.querySelector('.t95').style.left = posPct(95) + '%';

      document.getElementById('p05v').textContent = round0(p05);
      document.getElementById('p20v').textContent = round0(p20);
      document.getElementById('p50v').textContent = fmtDollarsInt(p50);
      document.getElementById('p80v').textContent = round0(p80);
      document.getElementById('p95v').textContent = round0(p95);
    }

    function loadModel() {
      const modelMeta = document.getElementById('modelMeta');

      callPermanentEstimatorBackend('summary')
        .then(response => {
          modelMeta.classList.remove('warn');
          modelMeta.textContent = response.loadingAvailable
            ? 'Standard + loading-adjusted models loaded'
            : 'Standard model loaded; loading model unavailable';

          scheduleApplyScale();
        })
        .catch(err => {
          modelMeta.classList.add('warn');
          modelMeta.textContent = 'Model error: ' + err.message;
          scheduleApplyScale();
        });

      callPermanentEstimatorBackend('fteHours')
        .then(response => {
          const n = Number(response.fteHours);

          if (Number.isFinite(n) && n > 0) {
            fteHours = n;
          }
        })
        .catch(err => {
          console.warn('FTE hours fetch failed:', err.message);
        });
    }

    function parseOptionalWholeNumberField(id, min, max, label) {
      const text = document.getElementById(id).value.trim();

      if (text === '') {
        return {
          provided: false,
          text: '',
          value: 0
        };
      }

      const value = Number(text);

      if (!Number.isInteger(value) || value < min || value > max) {
        throw new Error(`${label} must be a whole number from ${min} to ${max}.`);
      }

      return {
        provided: true,
        text: String(value),
        value
      };
    }

    function estimate() {
      const years = parseFloat(document.getElementById('years').value);
      const mmm = parseInt(document.getElementById('mmm').value, 10);
      const state = document.getElementById('state').value.trim();

      if (!isFinite(years) || years < 0 || !isFinite(mmm) || mmm < 1 || mmm > 7) {
        alert('Please enter valid years and MMM (1–7).');
        return;
      }

      if (!state) {
        alert('Please select a State/territory.');
        return;
      }

      let weekend;
      let late;

      try {
        weekend = parseOptionalWholeNumberField(
          'weekendDays',
          0,
          8,
          'Weekend days'
        );

        late = parseOptionalWholeNumberField(
          'lateNights',
          0,
          4,
          'Late nights'
        );
      } catch (err) {
        alert(err.message);
        return;
      }

      const payload = {
        years: String(years),
        mmm: String(mmm),
        state,
        weekendDays: weekend.text,
        lateNights: late.text
      };

      const resultsEl = document.getElementById('results');

      resultsEl.style.display = 'none';
      out.textContent = 'Calculating…';
      estimateBtn.disabled = true;
      estimateBtn.textContent = 'Calculating…';

      scheduleApplyScale();

      callPermanentEstimatorBackend('predict', payload)
        .then(res => {
          resultsEl.style.display = 'block';

          lastRes = res;
          viewMode = 'salary';
          updateView();

          out.textContent = '';
          estimateBtn.disabled = false;
          estimateBtn.textContent = 'Calculate';
        })
        .catch(err => {
          out.textContent = '⚠ ' + err.message;
          scheduleApplyScale();

          estimateBtn.disabled = false;
          estimateBtn.textContent = 'Calculate';
        });
    }

    document.getElementById('estimateBtn').addEventListener('click', estimate);

    toggleBtn.addEventListener('click', () => {
      viewMode = viewMode === 'salary' ? 'hourly' : 'salary';
      updateView();
    });

    loadModel();
  </script>
</body>
</html>
