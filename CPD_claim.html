<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CPD Certificate Request</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

<script>
  /* === Same scale-to-fit behaviour (force worst-case footprint) === */
  const ENABLE_SCALE = false;

  function applyScale() {
    if (!ENABLE_SCALE) return;
    const app = document.getElementById('app');
    const fit = document.getElementById('fit');
    if (!app || !fit) return;

    const prevTransform = app.style.transform;
    app.style.transform = 'none';

    let sizer = document.getElementById('appSizer');
    if (!sizer) {
      sizer = app.cloneNode(true);
      sizer.id = 'appSizer';
      document.body.appendChild(sizer);
    } else {
      sizer.innerHTML = app.innerHTML;
    }

    Object.assign(sizer.style, {
      position: 'absolute',
      left: '-99999px',
      top: '0',
      transform: 'none',
      visibility: 'hidden',
      pointerEvents: 'none',
      display: 'block'
    });

    const sMsg = sizer.querySelector('#msg');
    if (sMsg) {
      sMsg.textContent = 'Your certificate will be emailed within 10 minutes';
    }

    const NAT_W = sizer.offsetWidth;
    const NAT_H = sizer.offsetHeight;

    app.style.transform = prevTransform;

    const vw = window.innerWidth;
    const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
    const scale = Math.min(vw / NAT_W, vh / NAT_H, 1);

    app.style.transform = `scale(${scale})`;
    fit.style.height = Math.floor(Math.min(vh, NAT_H * scale)) + 'px';
    fit.style.width  = Math.floor(vw) + 'px';
  }

  window.addEventListener('load', applyScale);
  window.addEventListener('resize', applyScale);

  if (window.visualViewport) {
    visualViewport.addEventListener('resize', applyScale);
    visualViewport.addEventListener('scroll', applyScale);
  }
</script>

  <style>
  :root {
    --purple: #6600ff;
    --ink: #151515;
    --muted: #69718a;
    --track: #e8eaf0;
  }

  * {
    box-sizing: border-box;
  }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow: hidden;
    }

  #fit {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100dvh;
    width: 100%;
  }

  .box {
    width: min(calc(100% - 24px), 520px);
    max-width: 100%;
    min-width: 0;
    margin-inline: auto;
    padding: 20px 18px 28px;
    text-align: center;
  }

  #app {
    transform-origin: top center;
    will-change: transform;
  }

  .step {
    display: none;
  }

  .step.active {
    display: grid;
    grid-template-areas:
      "progress"
      "body"
      "nav";
    grid-template-rows: 28px minmax(0, 1fr) 48px;
    min-height: clamp(420px, 60dvh, 500px);
    align-items: stretch;
  }

  .progress {
    grid-area: progress;
    min-height: 28px;
    margin: 0;
    padding: 0;
    color: var(--purple);
    font-size: 13px;
    line-height: 28px;
    text-align: center;
  }

  .step-body {
    grid-area: body;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    min-width: 0;
    padding: 24px 0 0;
  }

  .step-body > label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 108px;
    margin: 0;
    color: var(--ink);
    font-size: clamp(22px, 5.4vw, 28px);
    font-weight: 700;
    line-height: 1.2;
    text-align: center;
  }

  .step-body > label small {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.35;
  }

  .step-body > input[type="text"],
  .step-body > input[type="email"] {
    display: block;
    width: 100%;
    min-width: 0;
    height: 50px;
    margin: 0 auto;
    padding: 0 4px;
    color: var(--ink);
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--ink);
    border-radius: 0;
    font: inherit;
    font-size: 20px;
    text-align: center;
    outline: none;
  }

  .step-body > input[type="text"]:focus,
  .step-body > input[type="email"]:focus {
    border-bottom-color: var(--ink);
  }

  .nav-row {
    grid-area: nav;
    display: flex;
    align-items: center;
    align-self: end;
    width: 100%;
    min-width: 0;
    min-height: 48px;
    margin: 0;
    padding: 0;
    gap: 10px;
  }

  button {
    font-family: inherit;
    cursor: pointer;
  }

  .nav-row .next,
  .nav-row #btn {
    flex: 1;
    min-height: 48px;
    padding: 0 18px;
    color: #fff;
    background: var(--ink);
    border: 0;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 700;
  }

  .nav-row .next:hover,
  .nav-row #btn:hover {
    background: #26324d;
  }

  .nav-row .back {
    flex: 0 0 64px;
    min-height: 48px;
    padding: 0 4px;
    color: var(--muted);
    background: transparent;
    border: 0;
    font-size: 14px;
  }

  .nav-row .next:only-child {
    width: 100%;
  }

  button:disabled,
  input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #msg {
    width: 100%;
    min-height: 0;
    margin: 14px auto 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
    text-align: left;
  }

  #msg:empty {
    display: none;
  }

  #msg.terminal-state {
    min-height: 0;
    margin: 28px auto 0;
    text-align: center;
  }

  .terminal-card {
    width: 100%;
    text-align: center;
  }

  .terminal-title {
    color: var(--ink);
    font-size: clamp(24px, 6vw, 30px);
    font-weight: 700;
    line-height: 1.2;
  }

  .terminal-subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
  }

  @media (max-width: 430px) {
    .box {
      width: calc(100% - 24px);
      padding: 18px 14px 26px;
    }

    .step.active {
      min-height: clamp(400px, 58dvh, 470px);
    }

    .step-body {
      padding-top: 20px;
    }

    .step-body > label {
      min-height: 100px;
    }
  }
  </style>
</head>

<body>
  <div id="fit">
    <div id="app" class="box">
      <form id="f">
        <div class="step active" data-step="1">
          <div class="step-body">
            <label for="eventId">
              Event ID
              <small>Shown during the presentation</small>
            </label>

            <input
              id="eventId"
              type="text"
              name="eventId"
              required
              maxlength="12"
              style="text-transform: uppercase"
              autocomplete="off"
              spellcheck="false"
              inputmode="text"
              enterkeyhint="next"
              pattern="[A-Za-z0-9]+"
              title="Letters and digits only"
            >
          </div>

          <div class="nav-row">
            <button type="button" class="next">Next</button>
          </div>

          <div class="progress"></div>
        </div>

        <div class="step" data-step="2">
          <div class="step-body">
            <label for="firstName">First name</label>

            <input
              id="firstName"
              type="text"
              name="firstName"
              required
              autocomplete="given-name"
              enterkeyhint="next"
            >
          </div>

          <div class="nav-row">
            <button type="button" class="back">Back</button>
            <button type="button" class="next">Next</button>
          </div>

          <div class="progress"></div>
        </div>

        <div class="step" data-step="3">
          <div class="step-body">
            <label for="lastName">Last name</label>

            <input
              id="lastName"
              type="text"
              name="lastName"
              required
              autocomplete="family-name"
              enterkeyhint="next"
            >
          </div>

          <div class="nav-row">
            <button type="button" class="back">Back</button>
            <button type="button" class="next">Next</button>
          </div>

          <div class="progress"></div>
        </div>

        <div class="step" data-step="4">
          <div class="step-body">
            <label for="ahpra">
              Ahpra registration number
              <small>e.g. OPT0001234567</small>
            </label>

            <input
              id="ahpra"
              type="text"
              name="ahpra"
              required
              inputmode="text"
              enterkeyhint="next"
              pattern="[A-Za-z0-9]+"
              title="Letters and digits only"
              autocomplete="off"
              spellcheck="false"
            >
          </div>

          <div class="nav-row">
            <button type="button" class="back">Back</button>
            <button type="button" class="next">Next</button>
          </div>

          <div class="progress"></div>
        </div>

        <div class="step" data-step="5">
          <div class="step-body">
            <label for="email">Email address</label>

            <input
              id="email"
              type="email"
              name="email"
              required
              inputmode="email"
              enterkeyhint="done"
              autocomplete="email"
            >
          </div>

          <div class="nav-row">
            <button type="button" class="back">Back</button>
            <button type="submit" id="btn">Submit</button>
          </div>

          <div class="progress"></div>
        </div>
      </form>

      <div id="msg" aria-live="polite"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxuCqIpTWWbbiUsOy3XbgimgIs2gvVMcsXINZbHcTQ0j8FL8YaN1pYRZtIlB_rHXkrNDQ/exec';

    // === Limit: 3 wrong Event IDs per day ===
    const FAIL_MAX_PER_DAY = 3;

    function capFirst(s) {
      s = (s || '').trim();
      return s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : '';
    }

    function todayStr_() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function getInt_(key, def = 0) {
      try { return parseInt(localStorage.getItem(key) || String(def), 10) || def; } catch { return def; }
    }

    function setInt_(key, v) {
      try { localStorage.setItem(key, String(v)); } catch {}
    }

    function failKey_() { return `cpd_fail_${todayStr_()}`; }
    function getFailCountToday() { return getInt_(failKey_(), 0); }
    function incFailCountToday() { setInt_(failKey_(), getFailCountToday() + 1); }
    function remainingFails() { return Math.max(0, FAIL_MAX_PER_DAY - getFailCountToday()); }
    function isFailLocked() { return remainingFails() <= 0; }

    const f   = document.getElementById('f');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    const steps = [...document.querySelectorAll('.step')];
    let cur = 0;
    let isTerminalState = false;

    function showTerminalState() {
      isTerminalState = true;

      steps.forEach(step => step.classList.remove('active'));

      msg.classList.add('terminal-state');
      msg.innerHTML = `
        <section class="terminal-card">
          <div class="terminal-title">Remember to log your CPD</div>
          <div class="terminal-subtitle">
            Your certificate will be emailed within 10 minutes
          </div>
        </section>
      `;

      applyScale();
    }

    function showStep(index, shouldFocus = true) {
      if (isTerminalState) return;

      steps.forEach((step, i) => {
        step.classList.toggle('active', i === index);
      });

      const progress = steps[index].querySelector('.progress');

      if (progress) {
        progress.textContent = `Q ${index + 1} of ${steps.length}`;
      }

      if (shouldFocus) {
        setTimeout(() => {
          const firstField = steps[index].querySelector('input, button');

          if (firstField && firstField.id !== 'btn' && !firstField.disabled) {
            firstField.focus();
          }
        }, 0);
      }
    }

    function stepValid(index) {
      const requiredFields = [
        ...steps[index].querySelectorAll('input[required], select[required]')
      ];

      const invalidField = requiredFields.find(field => !field.checkValidity());

      if (invalidField) {
        invalidField.reportValidity();
        return false;
      }

      return true;
    }

    function toNext() {
      if (isTerminalState || isFailLocked()) return;

      if (!stepValid(cur)) {
        navigator.vibrate?.(10);
        return;
      }

      if (cur < steps.length - 1) {
        cur++;
        showStep(cur);
      }
    }

    function toBack() {
      if (isTerminalState || isFailLocked()) return;

      if (cur > 0) {
        cur--;
        showStep(cur);
      }
    }

    document.addEventListener('click', event => {
      if (event.target.classList.contains('next')) toNext();
      if (event.target.classList.contains('back')) toBack();
    });

    document.addEventListener('keydown', event => {
      if (event.key !== 'Enter') return;

      const activeStep = event.target.closest('.step');

      if (!activeStep || !activeStep.classList.contains('active')) return;

      if (cur < steps.length - 1) {
        event.preventDefault();
        toNext();
      }
    });

    function updateUI() {
      const failLocked = isFailLocked();

      document.querySelectorAll('input, button').forEach(control => {
        control.disabled = failLocked;
      });

      msg.classList.remove('terminal-state');

      if (failLocked) {
        msg.textContent = 'No attempts remaining, try again tomorrow.';
      }

      applyScale();
    }

    function submitEntryViaJsonp(data) {
      return new Promise((resolve, reject) => {
        const callbackName = `cpdSubmitCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');

        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Request timed out.'));
        }, 15000);

        function cleanup() {
          window.clearTimeout(timeout);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = response => {
          cleanup();
          resolve(response);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Network error.'));
        };

        const params = new URLSearchParams({
          callback: callbackName,
          eventId: data.eventId,
          firstName: data.firstName,
          lastName: data.lastName,
          ahpra: data.ahpra,
          email: data.email
        });

        script.src = `${SCRIPT_URL}?${params.toString()}`;
        document.body.appendChild(script);
      });
    }

    updateUI();
    showStep(cur, false);

    f.addEventListener('submit', async function (e) {
      e.preventDefault();

      if (cur < steps.length - 1) {
        toNext();
        return;
      }

      if (!stepValid(cur)) return;

      if (isFailLocked()) {
        updateUI();
        return;
      }

      msg.textContent = 'Submitting...';
      btn.disabled = true;
      applyScale();

      const data = Object.fromEntries(new FormData(this).entries());

      data.eventId   = (data.eventId   || '').trim().toUpperCase();
      data.firstName = capFirst(data.firstName);
      data.lastName  = capFirst(data.lastName);
      data.ahpra     = (data.ahpra || '').replace(/\s+/g, '').toUpperCase();
      data.email     = (data.email || '').trim();

      try {
        const res = await submitEntryViaJsonp(data);

        if (res && res.ok) {
          f.reset();
          showTerminalState();
          return;
        }

        if (res && res.message === 'Event ID not found') {
          incFailCountToday();
          const rem = remainingFails();

          if (rem > 0) {
            msg.textContent = `Event ID not found, ${rem} attempt${rem === 1 ? '' : 's'} remaining`;
            btn.disabled = false;
          } else {
            updateUI();
            return;
          }

          applyScale();
          return;
        }

        if (res && res.message) {
          msg.textContent = res.message;
        } else {
          msg.textContent = 'Error – please try again.';
        }

        btn.disabled = false;
        applyScale();
      } catch (error) {
        msg.textContent = 'Error – please try again.';
        btn.disabled = false;
        applyScale();
      }
    });
  </script>
</body>
</html>
