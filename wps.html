<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workplace Promoter Score</title>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple: #6600ff;
      --purple-soft: #f4efff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #fit {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100dvh;
      width: 100%;
    }

    .box {
      width: min(calc(100% - 24px), 520px);
      max-width: 100%;
      min-width: 0;
      margin-inline: auto;
      padding: 20px 18px 28px;
      text-align: center;
    }

    .tracker-notice {
      width: 100%;
      margin: 0 0 8px;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--track);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    .tracker-notice p { margin: 0; }

    .tracker-notice p + p { margin-top: 2px; }

    .step { display: none; }

    .step.active {
      display: grid;
      grid-template-areas:
        "progress"
        "body"
        "nav";
      grid-template-rows: 28px minmax(0, 1fr) 48px;
      min-height: clamp(500px, 66dvh, 610px);
      align-items: stretch;
    }

    .progress {
      grid-area: progress;
      min-height: 28px;
      margin: 0;
      padding: 0;
      color: var(--purple);
      font-size: 13px;
      line-height: 28px;
      text-align: center;
    }

    .step-body {
      grid-area: body;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-width: 0;
      padding: 24px 0 18px;
    }

    .step-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      margin: 0 0 12px;
      color: var(--ink);
      font-size: clamp(22px, 5.4vw, 28px);
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
    }

    .step-title small,
    .checklist-title small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.35;
    }

    .employer-context {
      display: block;
      margin-bottom: 8px;
      color: var(--purple);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .score-input {
      display: block;
      width: 100%;
      height: 50px;
      margin: 0 auto 22px;
      padding: 0 4px;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--ink);
      border-radius: 0;
      font: inherit;
      font-size: 20px;
      text-align: center;
      outline: none;
    }

    .score-input:focus {
      border-bottom-color: var(--purple);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .checklist-title {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
    }

    .checklist {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 2px;
      width: 100%;
      margin: 0;
      text-align: left;
    }

    .check-option {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      align-items: center;
      gap: 7px;
      width: 100%;
      height: 28px;
      margin: 0;
      padding: 3px 8px;
      color: var(--ink);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
      text-align: left;
      white-space: nowrap;
      transition: background-color 120ms ease, border-color 120ms ease;
    }

    .check-option input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--purple);
    }

    .check-option.selected {
      background: var(--purple-soft);
      border-color: var(--purple);
    }

    .nav-row {
      grid-area: nav;
      display: flex;
      align-items: center;
      align-self: end;
      width: 100%;
      min-width: 0;
      min-height: 48px;
      margin: 0;
      padding: 0;
      gap: 10px;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    .nav-row button {
      flex: 1;
      min-height: 48px;
      padding: 0 18px;
      color: #fff;
      background: var(--ink);
      border: 0;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 700;
    }

    .nav-row button:hover {
      background: #26324d;
    }

    button:disabled,
    input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #out {
      width: 100%;
      min-height: 0;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
    }

    #out:empty { display: none; }

    .previous-submission {
      width: 100%;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--track);
      text-align: left;
    }

    .previous-submission-detail {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .previous-submission-detail span {
      margin-right: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .previous-submission-detail strong {
      color: var(--ink);
      font-weight: 700;
    }

    @media (max-width: 430px) {
      .box {
        width: calc(100% - 24px);
        padding: 18px 14px 26px;
      }

      .step.active {
        min-height: clamp(490px, 68dvh, 620px);
      }

      .step-body {
        padding: 20px 0 18px;
      }

      .step-title {
        font-size: clamp(21px, 5.2vw, 26px);
      }

      .checklist {
        gap: 2px;
      }

      .check-option {
        height: 26px;
        padding: 3px 7px;
        gap: 6px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div id="fit">
    <div id="app" class="box">
      <aside class="tracker-notice" role="note">
        <p>Best used in a non-Facebook browser</p>
        <p>Australian clinical employee optometrists only</p>
      </aside>

      <div id="step1" class="step active">
        <div class="step-body">
          <label class="step-title">
            Where have you worked in the last 3 years?
            <small>Select all that apply</small>
          </label>

          <div class="checklist" aria-label="Employers worked for">
            <label class="check-option" style="order: 1"><input type="checkbox" class="emp" value="1001"><span>1001 Optometry</span></label>
            <label class="check-option" style="order: 2"><input type="checkbox" class="emp" value="Bailey Nelson"><span>Bailey Nelson</span></label>
            <label class="check-option" style="order: 3"><input type="checkbox" class="emp" value="Bupa"><span>Bupa Optical</span></label>
            <label class="check-option" style="order: 4"><input type="checkbox" class="emp" value="Chemist/Optometrist Warehouse"><span>Chemist Warehouse Optometry</span></label>
            <label class="check-option" style="order: 5"><input type="checkbox" class="emp" value="Costco"><span>Costco Optical</span></label>
            <label class="check-option" style="order: 6"><input type="checkbox" class="emp" value="Dresden"><span>Dresden Vision</span></label>
            <label class="check-option" style="order: 7"><input type="checkbox" class="emp" value="George &amp; Matilda"><span>George &amp; Matilda Eyecare</span></label>
            <label class="check-option" style="order: 8"><input type="checkbox" class="emp" value="HCF"><span>HCF Eyecare</span></label>
            <label class="check-option" style="order: 9"><input type="checkbox" class="emp" value="Independent"><span>Independent</span></label>
            <label class="check-option" style="order: 17"><input type="checkbox" class="emp" value="NIB (incl. the Optical Company)"><span>The Optical Company (incl. NIB)</span></label>
            <label class="check-option" style="order: 10"><input type="checkbox" class="emp" value="Ophthalmologist"><span>Ophthalmologist</span></label>
            <label class="check-option" style="order: 11"><input type="checkbox" class="emp" value="OPSM (incl. L&amp;P, EyeQ)"><span>OPSM (incl. L&amp;P, EyeQ)</span></label>
            <label class="check-option" style="order: 12"><input type="checkbox" class="emp" value="Optical by National Pharmacies"><span>Optical by National Pharmacies</span></label>
            <label class="check-option" style="order: 13"><input type="checkbox" class="emp" value="Oscar Wylee"><span>Oscar Wylee</span></label>
            <label class="check-option" style="order: 14"><input type="checkbox" class="emp" value="Other (e.g., uni, hospital, govt, not-for-profit)"><span>Other (e.g., uni, hospital, govt, not-for-profit)</span></label>
            <label class="check-option" style="order: 15"><input type="checkbox" class="emp" value="Specsavers"><span>Specsavers</span></label>
            <label class="check-option" style="order: 16"><input type="checkbox" class="emp" value="Teacher’s Health Fund"><span>Teachers Health</span></label>
            <label class="check-option" style="order: 18"><input type="checkbox" class="emp" value="The Optical Superstore"><span>The Optical Superstore</span></label>
          </div>
        </div>

        <div class="nav-row">
          <button id="toStep2" type="button">Next</button>
        </div>

        <div class="progress">Q 1 of 2</div>
      </div>

      <div id="step2" class="step">
        <div class="step-body">
          <label for="q2_score" class="step-title">
            <span id="empContext" class="employer-context"></span>
            How likely are you to recommend working here?
            <small>0 = Not at all likely · 5 = Unsure · 10 = Extremely likely</small>
          </label>

          <input id="q2_score" class="score-input" type="number" min="0" max="10" step="1" inputmode="numeric" required>

          <div class="checklist-title">
            What positively influenced your score?
            <small>Select all that apply, or none</small>
          </div>

          <div class="checklist" aria-label="Positive influences">
            <label class="check-option"><input type="checkbox" class="q3" value="Pay/bonuses"><span>Pay/bonuses</span></label>
            <label class="check-option"><input type="checkbox" class="q3" value="Work-life flexibility"><span>Work-life flexibility</span></label>
            <label class="check-option"><input type="checkbox" class="q3" value="Clinical autonomy &amp; professional growth"><span>Clinical autonomy &amp; professional growth</span></label>
            <label class="check-option"><input type="checkbox" class="q3" value="Supportive team &amp; management"><span>Supportive team &amp; management</span></label>
            <label class="check-option"><input type="checkbox" class="q3" value="Staffing &amp; sustainable workload"><span>Staffing &amp; sustainable workload</span></label>
            <label class="check-option"><input type="checkbox" class="q3" value="Quality equipment &amp; technology"><span>Quality equipment &amp; technology</span></label>
          </div>
        </div>

        <div class="nav-row">
          <button id="nextOrSubmit" type="button">Save</button>
        </div>

        <div class="progress">Q 2 of 2</div>
      </div>

      <div id="out" aria-live="polite"></div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwT9nXpXx_gbsFjJTeTXbOzZ-xxF4_UmYfBfjYh5HvxH09kY8vQSK-SVc6QHpHRpDyNVg/exec';

    function callPromoterBackend(action, params = {}) {
      return new Promise((resolve, reject) => {
        if (!BACKEND_URL || BACKEND_URL === 'PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE') {
          reject(new Error('Backend URL has not been set.'));
          return;
        }

        const callbackName = `workplacePromoterCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');

        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Request timed out.'));
        }, 30000);

        function cleanup() {
          window.clearTimeout(timeout);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = response => {
          cleanup();

          if (!response || !response.ok) {
            reject(new Error(response?.message || 'Request failed.'));
            return;
          }

          resolve(response);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Network error.'));
        };

        const query = new URLSearchParams({
          callback: callbackName,
          action,
          ...params
        });

        script.src = `${BACKEND_URL}?${query.toString()}`;
        document.body.appendChild(script);
      });
    }

    const out = document.getElementById('out');
    const ENFORCE_SINGLE_SUBMISSION = true;
    const SUBMIT_KEY = 'promoterLastSubmit';

    let employers = [];
    let responses = [];
    let idx = 0;

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const empContext = document.getElementById('empContext');
    const toStep2 = document.getElementById('toStep2');
    const nextOrSubmit = document.getElementById('nextOrSubmit');

    function applyScale() {
      // Scaling intentionally disabled to match the other trackers.
    }

    function setSelectedState(input) {
      const option = input.closest('.check-option');
      if (option) option.classList.toggle('selected', input.checked);
    }

    function refreshSelectedStates() {
      document.querySelectorAll('.check-option input[type="checkbox"]').forEach(setSelectedState);
    }

    document.addEventListener('change', event => {
      if (event.target.matches('.check-option input[type="checkbox"]')) {
        setSelectedState(event.target);
      }
    });

    function lockSubmittedForm() {
      document.querySelectorAll('.box input, .box button').forEach(el => {
        el.disabled = true;
      });
    }

    function formatSubmissionDate(value) {
      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return 'Date unavailable';
      }

      return date.toLocaleDateString('en-GB', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      });
    }

    function showAlreadySubmitted(submittedAt) {
      out.innerHTML = `
        <section class="previous-submission">
          <div class="previous-submission-detail">
            <span>Already submitted:</span>
            <strong>${formatSubmissionDate(submittedAt)}</strong>
          </div>
        </section>
      `;
    }

    function initialiseSubmissionLock() {
      if (!ENFORCE_SINGLE_SUBMISSION) return;

      const last = localStorage.getItem(SUBMIT_KEY);
      if (!last) return;

      lockSubmittedForm();
      showAlreadySubmitted(last);
    }

    toStep2.addEventListener('click', () => {
      const selected = [...document.querySelectorAll('.emp')]
        .filter(input => input.checked)
        .map(input => input.value);

      if (!selected.length) {
        alert('Please select at least one employer.');
        return;
      }

      employers = selected;
      idx = 0;
      responses = [];

      step1.classList.remove('active');
      step2.classList.add('active');
      out.textContent = '';

      populateStep2();
    });

    nextOrSubmit.addEventListener('click', () => {
      const scoreRaw = document.getElementById('q2_score').value.trim();
      const score = scoreRaw === '' ? NaN : Number(scoreRaw);

      let boosters = [...document.querySelectorAll('.q3')]
        .filter(input => input.checked)
        .map(input => input.value);

      if (Number.isNaN(score) || score < 0 || score > 10) {
        alert('Please enter a 0–10 score.');
        return;
      }

      if (!boosters.length) boosters = ['None'];

      responses[idx] = {
        employer: employers[idx],
        score,
        boosters
      };

      if (idx < employers.length - 1) {
        idx++;
        populateStep2();
        return;
      }

      out.textContent = 'Saving…';
      nextOrSubmit.disabled = true;

      const batch = responses.map(response => ({
        employer: response.employer,
        score: response.score,
        boosters: response.boosters.join('; ')
      }));

      callPromoterBackend('saveAll', {
        batch: JSON.stringify(batch)
      })
        .then(() => {
          const count = batch.length;
          const submittedAt = new Date().toISOString();

          if (ENFORCE_SINGLE_SUBMISSION) {
            localStorage.setItem(SUBMIT_KEY, submittedAt);
            lockSubmittedForm();
            showAlreadySubmitted(submittedAt);
          } else {
            out.textContent = `Saved ${count} ${count === 1 ? 'entry!' : 'entries!'}`;
          }
        })
        .catch(error => {
          out.textContent = '⚠ ' + error.message;
          nextOrSubmit.disabled = false;
        });
    });

    function populateStep2() {
      empContext.textContent = `For ${employers[idx]}:`;
      document.getElementById('q2_score').value = responses[idx]?.score ?? '';

      document.querySelectorAll('.q3').forEach(input => {
        input.checked = responses[idx]?.boosters.includes(input.value) || false;
      });

      refreshSelectedStates();
      nextOrSubmit.textContent = idx < employers.length - 1 ? 'Next' : 'Save';
      nextOrSubmit.disabled = false;
      out.textContent = '';
    }

    initialiseSubmissionLock();
    refreshSelectedStates();
  </script>
</body>
</html>
