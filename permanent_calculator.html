<!DOCTYPE html>
<html>
<head>
  <script>
    /* --- Visual scale toggle (set true/false) --- */
    const ENABLE_SCALE = false;

    let scaleTimer = null;

    function scheduleApplyScale() {
      if (!ENABLE_SCALE) return;
      clearTimeout(scaleTimer);

      scaleTimer = setTimeout(() => {
        requestAnimationFrame(applyScale);
      }, 80);
    }

    function applyScale() {
      const app = document.getElementById('app');
      const fit = document.getElementById('fit');
      if (!app || !fit) return;

      if (!ENABLE_SCALE) {
        app.style.transform = 'none';
        fit.style.minHeight = '100vh';
        fit.style.width = '100%';
        return;
      }

      const prevTransform = app.style.transform;
      app.style.transform = 'none';

      let sizer = document.getElementById('appSizer');

      if (!sizer) {
        sizer = app.cloneNode(true);
        sizer.id = 'appSizer';
        document.body.appendChild(sizer);
      } else {
        sizer.innerHTML = app.innerHTML;
      }

      Object.assign(sizer.style, {
        position: 'absolute',
        left: '-99999px',
        top: '0',
        transform: 'none',
        visibility: 'hidden',
        pointerEvents: 'none',
        display: 'block',
        width: getComputedStyle(app).width
      });

      const sResults = sizer.querySelector('#results');
      const sOut = sizer.querySelector('#out');

      if (sResults) sResults.style.display = 'block';
      if (sOut) sOut.textContent = 'Calculating…';

      const NAT_W = sizer.offsetWidth || app.offsetWidth || 1;
      const NAT_H = sizer.offsetHeight || app.offsetHeight || 1;

      app.style.transform = prevTransform;

      const vw = document.documentElement.clientWidth || window.innerWidth;
      const vh = window.innerHeight;

      const scale = Math.min(vw / NAT_W, vh / NAT_H, 1);

      app.style.transform = `scale(${scale})`;
      fit.style.width = '100%';
      fit.style.minHeight = Math.max(Math.ceil(NAT_H * scale), vh) + 'px';
    }

    window.addEventListener('load', scheduleApplyScale);
    window.addEventListener('resize', scheduleApplyScale);
    window.addEventListener('orientationchange', scheduleApplyScale);
    window.addEventListener('pageshow', scheduleApplyScale);
  </script>

  <meta charset="utf-8">
  <title>Permanent Optom Income Estimator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #fit {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100dvh;
      width: 100%;
    }

    .box {
      width: min(calc(100% - 24px), 520px);
      max-width: 100%;
      min-width: 0;
      margin-inline: auto;
      padding: 20px 18px 28px;
      text-align: center;
    }

    #app {
      transform-origin: top center;
      will-change: transform;
    }

    .calculator-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(28px, 6.6vw, 36px);
      font-weight: 700;
      line-height: 1.2;
    }

    .calculator-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .calculator-notice {
      width: 100%;
      margin: 0 0 8px;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--track);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    .calculator-notice p {
      margin: 0;
    }

    .calculator-notice p + p {
      margin-top: 2px;
    }

    #modelMeta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .calculator-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 14px;
      text-align: left;
    }

    .field,
    .field:first-child,
    .field:nth-child(3) {
      grid-column: auto;
      margin: 0;
    }

    .field label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 0;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.25;
      text-align: center;
    }

    .field label small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.3;
    }

    .field label small a {
      color: var(--purple);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      text-decoration: underline;
    }

    .field input[type="number"],
    .field select {
      display: block;
      width: 100%;
      height: 38px;
      margin: 6px auto 0;
      padding: 0 3px;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--muted);
      border-radius: 0;
      font: inherit;
      font-size: 16px;
      text-align: center;
      outline: none;
    }

    .field input[type="number"]:focus,
    .field select:focus {
      border-bottom-color: var(--ink);
    }

    select {
      text-align-last: center;
      -moz-text-align-last: center;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    #estimateBtn,
    #toggleBtn {
      display: block;
      width: 100%;
      min-height: 48px;
      margin: 0 auto;
      padding: 0 18px;
      border-radius: 6px;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    #estimateBtn {
      align-self: end;
      min-height: 38px;
      padding: 0 12px;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      font-size: 14px;
      font-weight: 400;
    }

    #estimateBtn:hover {
      color: #fff;
      background: var(--ink);
    }

    #toggleBtn {
      margin-top: 16px;
      min-height: 38px;
      padding: 0 12px;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      font-size: 14px;
      font-weight: 400;
    }

    #toggleBtn:hover {
      color: #fff;
      background: var(--ink);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #out {
      grid-column: 1 / -1;
      min-height: 0;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      text-align: left;
    }

    #out:empty {
      display: none;
    }

    #results {
      position: relative;
      display: none;
      grid-column: 1 / -1;
      margin-top: 12px;
      padding-top: 22px;
      border-top: 1px solid var(--track);
      text-align: left;
    }
    
    #resultsStatus {
      display: none;
      position: absolute;
      top: -12px;
      right: 0;
      left: 0;
      color: var(--muted);
      background: #fff;
      font-size: 14px;
      line-height: 1.45;
      text-align: left;
    }
    
    #results.show-status {
      border-top-color: transparent;
    }
    
    #results.show-status #resultsStatus {
      display: block;
    }

    .results-section-label {
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
    }

    .scale {
      --trackY: 32px;
      --barH: 6px;
      --gapValue: 6px;
      --gapLabel: 7px;

      position: relative;
      margin-top: 16px;
      padding: 40px 0 46px;
    }

    .scale .track {
      position: absolute;
      top: var(--trackY);
      right: 0;
      left: 0;
      height: var(--barH);
      background: var(--track);
      border-radius: 0;
    }

    .scale .tick {
      --stemUp: 20px;
      --stemDown: 18px;

      position: absolute;
      top: calc(var(--trackY) + var(--barH) / 2);
      transform: translateX(-50%);
      text-align: center;
    }

    .scale .t20,
    .scale .t80 {
      --stemUp: 17px;
      --stemDown: 16px;
    }

    .scale .t5,
    .scale .t95 {
      --stemUp: 14px;
      --stemDown: 14px;
    }

    .scale .tick .stem {
      position: absolute;
      top: calc(-1 * var(--stemUp));
      left: 50%;
      width: 0;
      height: calc(var(--stemUp) + var(--stemDown));
      transform: translateX(-50%);
      border-left: 3px solid var(--muted);
    }

    .scale .t50 .stem {
      border-left-width: 4px;
      border-left-color: var(--purple);
    }

    .scale .t5 .stem,
    .scale .t95 .stem {
      border-left-width: 2px;
    }

    .scale .tick .value {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, calc(-100% - var(--stemUp) - var(--gapValue)));
      color: var(--ink);
      font-size: 13px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      white-space: nowrap;
    }

    .scale .tick .label {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, calc(var(--stemDown) + var(--gapLabel)));
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
    }

    .scale .t50 .value,
    .scale .t50 .label {
      color: var(--purple);
      font-size: 16px;
      font-weight: 700;
    }

    .scale .t20 .value,
    .scale .t80 .value {
      font-size: 12px;
    }

    .scale .t5 .value,
    .scale .t95 .value {
      font-size: 11px;
    }

    .caption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    .calculator-note {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    .warn {
      color: #b42318;
    }

    @media (max-width: 430px) {
      .box {
        width: calc(100% - 24px);
        padding: 18px 14px 26px;
      }

      .calculator-form {
        grid-template-columns: 1fr;
        gap: 16px;
        margin-top: 12px;
      }

      .field label {
        min-height: 0;
        font-size: 12px;
      }

      .field label small a {
        font-size: 12px;
      }

      .field input[type="number"],
      .field select {
        height: 36px;
        margin-top: 6px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div id="fit">
    <div id="app" class="box">

      <aside class="calculator-notice" role="note">
        <p>Shows what employers pay</p>

  <script>
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwimN0dzcx3KGmFa7drDmoZrkupY5qsN5JOs1Jhc5lq---ThAWIzSvSvMATmxbAdlo/exec';
    const WORK_PATTERN_SHEET_ID =
      '1D4EoCMnH_RbwbuzFtw92NOwnvR_r9zQV7dAaXtfnnd0';
    
    const WORK_PATTERN_SHEET_GID = '0';
    
    function callPermanentEstimatorBackend(action, params = {}) {
      return new Promise((resolve, reject) => {
        if (!BACKEND_URL || BACKEND_URL === 'PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE') {
          reject(new Error('Backend URL has not been set.'));
          return;
        }

        const callbackName = `permEstimatorCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');

        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Request timed out.'));
        }, 30000);

        function cleanup() {
          window.clearTimeout(timeout);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = response => {
          cleanup();

          if (!response || !response.ok) {
            reject(new Error(response?.message || 'Request failed.'));
            return;
          }

          resolve(response);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Network error.'));
        };

        const query = new URLSearchParams({
          callback: callbackName,
          action,
          ...params
        });

        script.src = `${BACKEND_URL}?${query.toString()}`;
        document.body.appendChild(script);
      });
    }

    function loadWorkPatternMedians() {
      return new Promise((resolve, reject) => {
        const callbackName =
          `workPatternCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
    
        const script = document.createElement('script');
    
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Work-pattern request timed out.'));
        }, 15000);
    
        function cleanup() {
          window.clearTimeout(timeout);
    
          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }
    
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
    
        window[callbackName] = response => {
          cleanup();
    
          if (!response || response.status === 'error') {
            reject(
              new Error(
                response?.errors?.[0]?.detailed_message ||
                'Could not load work-pattern medians.'
              )
            );
            return;
          }
    
          const rows = response?.table?.rows || [];
    
          const values = rows.slice(0, 3).map(row => {
            const cell = row?.c?.[0];
    
            return String(
              cell?.f ?? cell?.v ?? ''
            ).trim();
          });
    
          if (
            values.length < 3 ||
            values.some(value => value === '')
          ) {
            reject(
              new Error('AU11, AU12 or AU13 is blank or unavailable.')
            );
            return;
          }
    
          resolve({
            sat: values[0],
            sun: values[1],
            late: values[2]
          });
        };
    
        script.onerror = () => {
          cleanup();
          reject(new Error('Could not load work-pattern medians.'));
        };
    
        const params = new URLSearchParams({
          gid: WORK_PATTERN_SHEET_GID,
          range: 'AU11:AU13',
          headers: '0',
          tqx: `responseHandler:${callbackName}`
        });
    
        script.src =
          `https://docs.google.com/spreadsheets/d/` +
          `${WORK_PATTERN_SHEET_ID}/gviz/tq?${params.toString()}`;
    
        document.body.appendChild(script);
      });
    }    
    const out = document.getElementById('out');
    const estimateBtn = document.getElementById('estimateBtn');

    let viewMode = 'salary';
    let lastRes = null;
    let fteHours = null;
    let numberAnimationToken = 0;
    
    const NUMBER_ANIMATION_MS = 1000;

    const toggleBtn = document.getElementById('toggleBtn');
    const resultsHeading = document.getElementById('resultsHeading');
    const resultsStatus = document.getElementById('resultsStatus');

    const AUFMT = new Intl.NumberFormat('en-AU');

    function round0(x) {
      if (x === null || x === undefined || isNaN(x)) return '–';
      return AUFMT.format(Math.round(Number(x)));
    }

    function fmtDollarsInt(x) {
      if (x === null || x === undefined || isNaN(x)) return '–';
      return '$' + AUFMT.format(Math.round(Number(x)));
    }

    function toHourly(res) {
      if (!fteHours || !Number.isFinite(fteHours) || fteHours <= 0) {
        return null;
      }

      const f = x => Number(x) / 52 / fteHours;

      return {
        ...res,
        p05: f(res.p05),
        p20: f(res.p20),
        p50: f(res.p50),
        p80: f(res.p80),
        p95: f(res.p95),
        predLo: f(res.predLo),
        predHi: f(res.predHi)
      };
    }

    function updateView(animateNumbers = false) {
      if (!lastRes) return;
    
      const showHourly = viewMode === 'hourly';
      const displayRes = showHourly ? toHourly(lastRes) : lastRes;
    
      if (showHourly && !displayRes) {
        alert('Still fetching FTE hours… please try again in a moment.');
        return;
      }
    
      renderPercentileScale(displayRes, animateNumbers);
    
      resultsHeading.textContent = showHourly
        ? 'Estimated hourly rate'
        : 'Estimated salary';
    
      toggleBtn.textContent = showHourly
        ? 'Hourly rate; switch to Salary'
        : 'Salary; switch to Hourly rate';
    
      toggleBtn.style.display = 'inline-block';
    
      scheduleApplyScale();
    }
    
    function animateNumber(
      elementId,
      targetValue,
      formatter,
      animate,
      token
    ) {
      const element = document.getElementById(elementId);
      const target = Number(targetValue);
    
      if (!Number.isFinite(target)) {
        element.textContent = '–';
        delete element.dataset.numericValue;
        return;
      }
    
      const start = Number(element.dataset.numericValue);
      const reduceMotion =
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    
      const shouldAnimate =
        animate &&
        Number.isFinite(start) &&
        start !== target &&
        !reduceMotion;
    
      if (!shouldAnimate) {
        element.textContent = formatter(target);
        element.dataset.numericValue = String(target);
        return;
      }
    
      const startedAt = performance.now();
    
      function frame(now) {
        if (token !== numberAnimationToken) return;
    
        const progress = Math.min(
          (now - startedAt) / NUMBER_ANIMATION_MS,
          1
        );
    
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = start + (target - start) * eased;
    
        element.textContent = formatter(current);
        element.dataset.numericValue = String(current);
    
        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          element.textContent = formatter(target);
          element.dataset.numericValue = String(target);
        }
      }
    
      requestAnimationFrame(frame);
    }
    
    function renderPercentileScale(res, animateNumbers = false) {
      const [p05, p20, p50, p80, p95] =
        [res.p05, res.p20, res.p50, res.p80, res.p95].map(Number);
    
      const P_MIN = 5;
      const P_MAX = 95;
      const P_SPAN = P_MAX - P_MIN;
    
      const posPct = p => ((p - P_MIN) / P_SPAN) * 100;
      const token = ++numberAnimationToken;
    
      document.querySelector('.t5').style.left = posPct(5) + '%';
      document.querySelector('.t20').style.left = posPct(20) + '%';
      document.querySelector('.t50').style.left = posPct(50) + '%';
      document.querySelector('.t80').style.left = posPct(80) + '%';
      document.querySelector('.t95').style.left = posPct(95) + '%';
    
      animateNumber('p05v', p05, round0, animateNumbers, token);
      animateNumber('p20v', p20, round0, animateNumbers, token);
      animateNumber('p50v', p50, fmtDollarsInt, animateNumbers, token);
      animateNumber('p80v', p80, round0, animateNumbers, token);
      animateNumber('p95v', p95, round0, animateNumbers, token);
    }

    function loadModel() {
      callPermanentEstimatorBackend('summary')
        .then(() => {
          document.getElementById('modelMeta').textContent =
            'MLR (OLS) model loaded';
    
          scheduleApplyScale();
        })
        .catch(err => {
          document.getElementById('modelMeta').innerHTML =
            '<span class="warn">Model error: ' +
            err.message +
            '</span>';
    
          scheduleApplyScale();
        });
    
      callPermanentEstimatorBackend('fteHours')
        .then(response => {
          const n = Number(response.fteHours);
    
          if (Number.isFinite(n) && n > 0) {
            fteHours = n;
          }
        })
        .catch(err => {
          console.warn(
            'FTE hours fetch failed:',
            err.message
          );
        });
    
      loadWorkPatternMedians()
        .then(({ sat, sun, late }) => {
          document.getElementById('medianSat').textContent = sat;
          document.getElementById('medianSun').textContent = sun;
          document.getElementById('medianLate').textContent = late;
    
          document.getElementById('workPatternNote').hidden = false;
    
          scheduleApplyScale();
        })
        .catch(err => {
          console.warn(
            'Work-pattern medians fetch failed:',
            err.message
          );
        });
    }

    function estimate() {
      const years = parseFloat(
        document.getElementById('years').value
      );
    
      const mmm = parseInt(
        document.getElementById('mmm').value,
        10
      );
    
      const state =
        document.getElementById('state').value.trim();
    
      if (
        !isFinite(years) ||
        years < 0 ||
        !isFinite(mmm) ||
        mmm < 1 ||
        mmm > 7
      ) {
        alert('Please enter valid years and MMM (1–7).');
        return;
      }
    
      if (!state) {
        alert('Please select a State/territory.');
        return;
      }
    
      const payload = {
        years: String(years),
        mmm: String(mmm),
        state
      };
    
      const resultsEl = document.getElementById('results');
      const hadPreviousResults = Boolean(lastRes);
    
      if (!hadPreviousResults) {
        /*
         * The first calculation has no visible results section yet,
         * so use the normal message underneath the button.
         */
        resultsEl.style.display = 'none';
        out.textContent = 'Calculating…';
      } else {
        /*
         * On recalculation, replace the divider line with the status
         * without adding another row or moving the results.
         */
        out.textContent = '';
        resultsStatus.textContent = 'Recalculating…';
        resultsEl.classList.add('show-status');
      }
    
      estimateBtn.disabled = true;
    
      scheduleApplyScale();
    
      callPermanentEstimatorBackend('predict', payload)
        .then(res => {
          /*
           * Restore the divider line before displaying the new values.
           */
          resultsEl.classList.remove('show-status');
          resultsStatus.textContent = '';
          out.textContent = '';
    
          resultsEl.style.display = 'block';
    
          lastRes = res;
    
          /*
           * Animate only when replacing existing displayed values.
           */
          updateView(hadPreviousResults);
    
          estimateBtn.disabled = false;
          estimateBtn.textContent = 'Recalculate';
        })
        .catch(err => {
          if (hadPreviousResults) {
            /*
             * Keep the previous results stationary and show the error
             * where the divider line normally appears.
             */
            out.textContent = '';
            resultsStatus.textContent = '⚠ ' + err.message;
            resultsEl.classList.add('show-status');
          } else {
            out.textContent = '⚠ ' + err.message;
          }
    
          scheduleApplyScale();
    
          estimateBtn.disabled = false;
          estimateBtn.textContent = hadPreviousResults
            ? 'Recalculate'
            : 'Calculate';
        });
    }
    document
      .getElementById('estimateBtn')
      .addEventListener('click', estimate);

    toggleBtn.addEventListener('click', () => {
      viewMode = viewMode === 'salary' ? 'hourly' : 'salary';
      updateView();
    });

    loadModel();
  </script>
</body>
</html>
