<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>PFF Report Summary</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
      --live-red: #e53935;

      --blue-cone: rgba(74, 86, 255, 0.82);
      --green-cone: rgba(36, 210, 116, 0.78);
      --red-cone: rgba(255, 92, 48, 0.76);
    }


    * {
      box-sizing: border-box;
    }


    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow-x: auto;
      overflow-y: visible;
    }


    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
    }


    #fit {
      width: 100%;
      overflow: hidden;
    }


    #app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 2px 14px;
      text-align: center;
    }


    /*
     * Hide the table while its data is loading.
     */
    #app.is-loading .table-section {
      display: none;
    }


    /* ---------- Response summary ---------- */


    .response-summary {
      position: relative;
      width: 100%;
      padding: 0;
    }


    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      align-items: start;
    }


    .summary-item {
      min-width: 0;
      padding: 0 10px;
    }


    .summary-item:first-child .response-label,
    .summary-item:first-child .response-value {
      transform: translateX(8px);
    }


    .summary-item:last-child .response-label,
    .summary-item:last-child .response-value {
      transform: translateX(-8px);
    }


    .summary-item:first-child {
      border-right: 1px solid rgba(105, 113, 138, 0.16);
    }


    .response-label {
      color: var(--muted);
      font-size: clamp(13px, 3.8vw, 16px);
      font-weight: 400;
      line-height: 1.15;
      text-align: center;
      white-space: nowrap;
    }


    .response-value-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 31px;
      margin-top: 2px;
    }


    .response-value {
      margin-top: 2px;
      color: var(--ink);
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 400;
      line-height: 1.1;
      text-align: center;
      white-space: nowrap;
    }


    .response-value.is-loading {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 82px;
      min-height: 31px;
      font-size: inherit;
    }


    /* ---------- Mini loading cones ---------- */


    .cone-loader {
      position: relative;
      width: 42px;
      height: 20px;
      margin: 0;
      overflow: visible;
      isolation: isolate;
      flex: 0 0 42px;
    }


    .cone {
      position: absolute;
      bottom: 1px;
      width: 14px;
      height: 17px;
      opacity: 0;

      clip-path:
        polygon(
          50% 0%,
          100% 100%,
          0% 100%
        );

      -webkit-clip-path:
        polygon(
          50% 0%,
          100% 100%,
          0% 100%
        );

      filter:
        drop-shadow(
          0 1px 2px
          rgba(21, 21, 21, 0.07)
        );

      mix-blend-mode: multiply;
      will-change: opacity;
    }


    .cone.blue {
      left: 10px;
      background: var(--blue-cone);

      animation:
        blueConeCycle
        2.7s
        infinite
        cubic-bezier(0.45, 0, 0.25, 1);
    }


    .cone.green {
      left: 18px;
      background: var(--green-cone);

      animation:
        greenConeCycle
        2.7s
        infinite
        cubic-bezier(0.45, 0, 0.25, 1);
    }


    .cone.red {
      left: 23px;
      background: var(--red-cone);

      animation:
        redConeCycle
        2.7s
        infinite
        cubic-bezier(0.45, 0, 0.25, 1);
    }


    .loader-text {
      margin: 0;
      color: var(--muted);
      font-size: 8px;
      font-weight: 400;
      line-height: 1;
      text-align: left;

      animation:
        loadingTextPulse
        2.7s
        infinite
        cubic-bezier(0.45, 0, 0.25, 1);
    }


    @keyframes blueConeCycle {
      0% {
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }


    @keyframes greenConeCycle {
      0% {
        opacity: 0;
      }

      20% {
        opacity: 0;
      }

      32% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }


    @keyframes redConeCycle {
      0% {
        opacity: 0;
      }

      40% {
        opacity: 0;
      }

      52% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }


    @keyframes loadingTextPulse {
      0% {
        opacity: 0.45;
      }

      52% {
        opacity: 0.78;
      }

      76% {
        opacity: 0.78;
      }

      87% {
        opacity: 0.45;
      }

      100% {
        opacity: 0.45;
      }
    }


    /* ---------- LIVE data ---------- */


    .live-data {
      position: absolute;
      right: 1px;
      bottom: 4px;

      display: flex;
      align-items: center;
      gap: 4px;

      color: var(--muted);

      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;

      white-space: nowrap;
    }


    .live-data-dot {
      width: 6px;
      height: 6px;

      flex: 0 0 6px;

      border-radius: 50%;

      background:
        var(--live-red);
    }


    .response-summary::after {
      content: "";

      display: block;

      width: 100%;
      height: 1px;

      margin-top: 5px;

      background:
        linear-gradient(
          90deg,
          #fff 0%,
          rgba(102, 0, 255, 0.16) 24%,
          var(--purple) 50%,
          rgba(102, 0, 255, 0.16) 76%,
          #fff 100%
        );
    }


    /* ---------- Table ---------- */


    .table-section {
      width: 100%;
      margin-top: 30px;
    }


    .table-wrap {
      position: relative;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /*
     * Strong central divider between columns T and V.
     */


    .summary-table {
      width: max-content;
      min-width: 100%;
      max-width: none;
      margin: 0 auto;

      border-collapse:
        collapse;

      table-layout:
        auto;
    }


    .summary-table th,
    .summary-table td {
      position: relative;

      padding:
        8px 12px;

      line-height:
        1.2;

      text-align:
        center;

      white-space:
        nowrap;
    }

    .summary-table th:first-child,
    .summary-table td:first-child {
      padding-left: 8px;
      padding-right: 12px;
      text-align: left;
    }

    .summary-table th:nth-child(2),
    .summary-table td:nth-child(2) {
      padding-left: 12px;
      padding-right: 8px;
    }
    
    .summary-table th {
      color:
        var(--muted);

      font-size:
        clamp(
          11px,
          3.4vw,
          14px
        );

      font-weight:
        700;
    }


    .summary-table td {
      color:
        var(--ink);

      font-size:
        clamp(
          12px,
          3.6vw,
          15px
        );

      font-weight:
        400;
    }


    /*
     * Light row separators.
     */
    .summary-table tbody tr + tr td {
      border-top:
        1px solid
        var(--track);
    }


    /*
     * Do not add a normal column border because
     * the custom gradient divider handles it.
     */
    .summary-table th + th,
    .summary-table td + td {
      border-left:
        1px solid
        var(--track);
    }


    /*
     * Strong line beneath table headings.
     */
    .summary-table
    .table-major-separator
    td {
      height: 0;

      padding: 0;

      line-height: 0;

      background:
        transparent;

      border-top:
        1px solid
        var(--ink);
    }


    /*
     * A blank spreadsheet row becomes a subtle separator.
     */
    .summary-table
    .table-empty-separator
    td {
      height: 0;

      padding: 0;

      line-height: 0;

      background:
        transparent;

      border-top:
        1px solid
        var(--track);
    }


    .error {
      color:
        var(--muted);

      font-size:
        14px;
    }


    @media (
      prefers-reduced-motion:
      reduce
    ) {

      .cone.blue,
      .cone.green,
      .cone.red {
        animation: none;
        opacity: 1;
      }


      .loader-text {
        animation: none;
        opacity: 0.72;
      }

    }


    @media (
      max-width:
      430px
    ) {

      #app {
        padding:
          12px 1px
          12px;
      }


      .summary-item {
        padding:
          0 6px;
      }


      .response-label {
        font-size:
          13px;
      }


      .summary-table th,
      .summary-table td {
        padding:
          7px 4px;
      }


      .summary-table th {
        font-size:
          11px;
      }


      .summary-table td {
        font-size:
          12px;
      }

    }
  </style>
</head>


<body>

  <div id="fit">

    <main
      id="app"
      class="is-loading"
    >


      <!-- SUMMARY COUNTS -->

      <section
        class="response-summary"
        aria-live="polite"
      >

        <div class="summary-grid">


          <!-- LEFT -->

          <div class="summary-item">

            <div class="response-label">
              Reports
            </div>


            <div class="response-value-row">

              <div
                id="reports-value"
                class="response-value is-loading"
              >

                <div
                  class="cone-loader"
                  role="status"
                  aria-label="Loading"
                >

                  <div
                    class="cone blue"
                    aria-hidden="true"
                  ></div>

                  <div
                    class="cone green"
                    aria-hidden="true"
                  ></div>

                  <div
                    class="cone red"
                    aria-hidden="true"
                  ></div>

                </div>


                <div class="loader-text">
                  Loading...
                </div>

              </div>

            </div>

          </div>


          <!-- RIGHT -->

          <div class="summary-item">

            <div class="response-label">
              Supporting documents
            </div>


            <div class="response-value-row">

              <div
                id="documents-value"
                class="response-value is-loading"
              >

                <div
                  class="cone-loader"
                  role="status"
                  aria-label="Loading"
                >

                  <div
                    class="cone blue"
                    aria-hidden="true"
                  ></div>

                  <div
                    class="cone green"
                    aria-hidden="true"
                  ></div>

                  <div
                    class="cone red"
                    aria-hidden="true"
                  ></div>

                </div>


                <div class="loader-text">
                  Loading...
                </div>

              </div>


              <div
                class="live-data"
                aria-label="Live data"
              >

                <span
                  class="live-data-dot"
                  aria-hidden="true"
                ></span>

                <span>
                  LIVE data
                </span>

              </div>

            </div>

          </div>

        </div>

      </section>


      <!-- T / V TABLE -->

      <section
        class="table-section"
        aria-label="Report summary table"
      >

        <div class="table-wrap">

          <table
            id="summary-table"
            class="summary-table"
          >

            <thead></thead>

            <tbody></tbody>

          </table>

        </div>

      </section>

    </main>

  </div>


  <script>

    /************************************************************
     * SETTINGS
     ************************************************************/

    const SPREADSHEET_ID =
      '1hMjeY-Cg3ZJWYWrfx0Brxb1QvhDYpiDq6OR4F4g8zCE';

    const SHEET_GID =
      '0';


    /*
     * Summary counts.
     *
     * B1 = Reports
     * C1 = Supporting documents
     */
    const COUNT_RANGE =
      'B1:C1';


    /*
     * Table source:
     *
     * T2 = left-column heading
     * U is deliberately hidden
     * V2 = right-column heading
     *
     * Data:
     * T3:T14
     * V3:V14
     */
    const TABLE_HEADER_RANGE =
      'T2:V2';

    const TABLE_DATA_RANGE =
      'T3:V14';

    const TABLE_ROWS =
      12;


    /************************************************************
     * ELEMENTS
     ************************************************************/

    const app =
      document.getElementById(
        'app'
      );

    const reportsValue =
      document.getElementById(
        'reports-value'
      );

    const documentsValue =
      document.getElementById(
        'documents-value'
      );

    const summaryTable =
      document.getElementById(
        'summary-table'
      );


    /************************************************************
     * BASIC HELPERS
     ************************************************************/

    function getCellDisplayValue(
      cell
    ) {

      if (!cell) {
        return '';
      }


      return String(
        cell.f ??
        cell.v ??
        ''
      ).trim();

    }


    function showValue(
      element,
      value,
      isError = false
    ) {

      element
        .classList
        .remove(
          'is-loading'
        );


      element.textContent =
        value ||
        '—';


      element
        .classList
        .toggle(
          'error',
          isError
        );

    }


    function hideLoadingState() {

      app
        .classList
        .remove(
          'is-loading'
        );

    }


    /************************************************************
     * GOOGLE GVIZ REQUEST
     ************************************************************/

    function loadGvizRange(
      range,
      headers = 0
    ) {

      return new Promise(
        (
          resolve,
          reject
        ) => {

          const callbackName =
            'pffReportSummary_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );


          const script =
            document.createElement(
              'script'
            );


          const timeout =
            window.setTimeout(
              () => {

                cleanup();

                reject(
                  new Error(
                    'Could not load data'
                  )
                );

              },
              10000
            );


          function cleanup() {

            window.clearTimeout(
              timeout
            );


            try {

              delete window[
                callbackName
              ];

            } catch (_) {

              window[
                callbackName
              ] = undefined;

            }


            if (
              script.parentNode
            ) {

              script
                .parentNode
                .removeChild(
                  script
                );

            }

          }


          window[
            callbackName
          ] = response => {

            cleanup();


            if (
              response?.status ===
              'error'
            ) {

              reject(
                new Error(
                  response
                    ?.errors
                    ?.[0]
                    ?.detailed_message ||
                  'Could not load Google Sheet data'
                )
              );

              return;

            }


            resolve(
              response
            );

          };


          script.onerror =
            () => {

              cleanup();

              reject(
                new Error(
                  'Could not load data'
                )
              );

            };


          const params =
            new URLSearchParams({

              gid:
                SHEET_GID,

              range,

              headers:
                String(
                  headers
                ),

              tqx:
                `responseHandler:${callbackName}`

            });


          script.src =
            `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?` +
            params.toString();


          document.body
            .appendChild(
              script
            );

        }
      );

    }


    /************************************************************
     * NORMALISE COUNTS
     ************************************************************/

    function normaliseCounts(
      response
    ) {

      const row =
        response
          ?.table
          ?.rows
          ?.[0];


      return {

        reports:
          getCellDisplayValue(
            row?.c?.[0]
          ),

        documents:
          getCellDisplayValue(
            row?.c?.[1]
          )

      };

    }


    /************************************************************
     * NORMALISE TABLE
     *
     * Google returns:
     * T = index 0
     * U = index 1
     * V = index 2
     *
     * Only indexes 0 and 2 are retained.
     ************************************************************/

    function normaliseTable(
      headerResponse,
      dataResponse
    ) {

      const headerRow =
        headerResponse
          ?.table
          ?.rows
          ?.[0];

      const dataRows =
        dataResponse
          ?.table
          ?.rows ||
        [];


      const values = [];


      /*
       * Header:
       * T2 and V2 only.
       */
      values.push([

        getCellDisplayValue(
          headerRow?.c?.[0]
        ) || '—',

        getCellDisplayValue(
          headerRow?.c?.[2]
        ) || '—'

      ]);


      /*
       * Data:
       * T3:T14 and V3:V14 only.
       */
      for (
        let r = 0;
        r < TABLE_ROWS;
        r++
      ) {

        const sourceRow =
          dataRows?.[r];


        values.push([

          getCellDisplayValue(
            sourceRow?.c?.[0]
          ),

          getCellDisplayValue(
            sourceRow?.c?.[2]
          )

        ]);

      }


      return values;

    }


    /************************************************************
     * RENDER TABLE
     ************************************************************/

    function renderTable(
      values
    ) {

      const thead =
        summaryTable
          .querySelector(
            'thead'
          );

      const tbody =
        summaryTable
          .querySelector(
            'tbody'
          );


      thead.textContent =
        '';

      tbody.textContent =
        '';


      const headers =
        values?.[0] ||
        [
          '—',
          '—'
        ];


      const dataRows =
        values?.slice(1) ||
        [];


      /*
       * Header row.
       */
      const headerRow =
        document.createElement(
          'tr'
        );


      headers.forEach(
        value => {

          const th =
            document.createElement(
              'th'
            );


          th.scope =
            'col';


          th.textContent =
            value ||
            '—';


          headerRow
            .appendChild(
              th
            );

        }
      );


      thead
        .appendChild(
          headerRow
        );


      /*
       * Strong separator below headings.
       */
      const separatorRow =
        document.createElement(
          'tr'
        );


      separatorRow.className =
        'table-major-separator';


      const separatorCell =
        document.createElement(
          'td'
        );


      separatorCell.colSpan =
        2;


      separatorRow
        .appendChild(
          separatorCell
        );


      thead
        .appendChild(
          separatorRow
        );


      /*
       * Data rows.
       */
      dataRows.forEach(
        row => {

          const left =
            String(
              row?.[0] ??
              ''
            ).trim();

          const right =
            String(
              row?.[1] ??
              ''
            ).trim();


          /*
           * Preserve blank spreadsheet rows
           * as subtle separators.
           */
          if (
            !left &&
            !right
          ) {

            const blankRow =
              document.createElement(
                'tr'
              );


            blankRow.className =
              'table-empty-separator';


            const blankCell =
              document.createElement(
                'td'
              );


            blankCell.colSpan =
              2;


            blankRow
              .appendChild(
                blankCell
              );


            tbody
              .appendChild(
                blankRow
              );


            return;

          }


          const tr =
            document.createElement(
              'tr'
            );


          [
            left,
            right
          ].forEach(
            value => {

              const td =
                document.createElement(
                  'td'
                );


              td.textContent =
                value ||
                '—';


              tr.appendChild(
                td
              );

            }
          );


          tbody
            .appendChild(
              tr
            );

        }
      );

    }


    /************************************************************
     * ERROR STATE
     ************************************************************/

    function showError(
      error
    ) {

      console.error(
        error
      );


      showValue(
        reportsValue,
        '—',
        true
      );


      showValue(
        documentsValue,
        '—',
        true
      );


      renderTable([

        [
          '—',
          '—'
        ],

        ...Array.from(
          {
            length:
              TABLE_ROWS
          },
          () => [
            '—',
            '—'
          ]
        )

      ]);


      hideLoadingState();

    }


    /************************************************************
     * LOAD ALL DATA
     ************************************************************/

    async function loadDashboardData() {

      try {

        const [
          countData,
          tableHeaderData,
          tableData
        ] =
          await Promise.all([

            loadGvizRange(
              COUNT_RANGE,
              0
            ),

            loadGvizRange(
              TABLE_HEADER_RANGE,
              0
            ),

            loadGvizRange(
              TABLE_DATA_RANGE,
              0
            )

          ]);


        /*
         * Counts.
         */
        const counts =
          normaliseCounts(
            countData
          );


        showValue(
          reportsValue,
          counts.reports
        );


        showValue(
          documentsValue,
          counts.documents
        );


        /*
         * T / V table.
         */
        renderTable(
          normaliseTable(
            tableHeaderData,
            tableData
          )
        );


        hideLoadingState();

      } catch (
        error
      ) {

        showError(
          error
        );

      }

    }


    /*
     * Initial load.
     */
    loadDashboardData();


    /*
     * Refresh all live values every 60 seconds
     * while the page remains open.
     */
    window.setInterval(
      loadDashboardData,
      60000
    );

  </script>

</body>
</html>
