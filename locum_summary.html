<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Locum Rate Summary</title>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
      --live-red: #e53935;

      --blue-cone: rgba(74, 86, 255, 0.82);
      --green-cone: rgba(36, 210, 116, 0.78);
      --red-cone: rgba(255, 92, 48, 0.76);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow: hidden;
    }

    #fit {
      width: 100%;
      overflow: hidden;
    }

    #app {
      width: 100%;
      margin: 0;
      padding: 14px 2px 14px;
      text-align: center;
    }

    #app.is-loading .response-summary,
    #app.is-loading .percentile-section {
      display: none;
    }

    #app:not(.is-loading) .app-loading {
      display: none;
    }

    .app-loading {
      width: 100%;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .cone-loader {
      position: relative;
      width: 176px;
      height: 78px;
      margin: 0 auto;
      overflow: visible;
      isolation: isolate;
    }

    .cone {
      position: absolute;
      bottom: 8px;
      width: 58px;
      height: 68px;
      opacity: 0;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      -webkit-clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      filter: none;
      mix-blend-mode: normal;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
      will-change: opacity;
    }

    .cone.blue {
      left: 33px;
      background: var(--blue-cone);
      animation: blueConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.green {
      left: 69px;
      background: var(--green-cone);
      animation: greenConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.red {
      left: 85px;
      background: var(--red-cone);
      animation: redConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .loader-text {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      line-height: 1.35;
      text-align: center;
      animation: loadingTextPulse 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    @keyframes blueConeCycle {
      0% {
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes greenConeCycle {
      0% {
        opacity: 0;
      }

      20% {
        opacity: 0;
      }

      32% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes redConeCycle {
      0% {
        opacity: 0;
      }

      40% {
        opacity: 0;
      }

      52% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes loadingTextPulse {
      0% {
        opacity: 0.45;
      }

      52% {
        opacity: 0.78;
      }

      76% {
        opacity: 0.78;
      }

      87% {
        opacity: 0.45;
      }

      100% {
        opacity: 0.45;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cone.blue,
      .cone.green,
      .cone.red {
        animation: none;
        opacity: 1;
      }

      .loader-text {
        animation: none;
        opacity: 0.72;
      }
    }

    /* ---------- Response count ---------- */

    .response-summary {
      width: 100%;
      padding: 0;
    }

    .response-summary::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: 5px;
      background: linear-gradient(
        90deg,
        #fff 0%,
        rgba(102, 0, 255, 0.16) 24%,
        var(--purple) 50%,
        rgba(102, 0, 255, 0.16) 76%,
        #fff 100%
      );
    }

    .response-label {
      color: var(--muted);
      font-size: clamp(13px, 3.8vw, 16px);
      font-weight: 400;
      line-height: 1.15;
      white-space: nowrap;
    }

    .response-value-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 31px;
      margin-top: 2px;
    }

    .response-value {
      margin-top: 2px;
      color: var(--ink);
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 400;
      line-height: 1.1;
      white-space: nowrap;
    }

    .live-data {
      position: absolute;
      right: 1px;
      bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 0;
      padding: 0;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }

    .live-data-dot {
      width: 6px;
      height: 6px;
      flex: 0 0 6px;
      border-radius: 50%;
      background: var(--live-red);
    }

    /* ---------- Percentile table ---------- */

    .percentile-section {
      width: 100%;
      margin-top: 30px;
      padding-top: 0;
    }

    .percentile-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .percentile-table th,
    .percentile-table td {
      padding: 8px 6px;
      line-height: 1.2;
      text-align: center;
    }

    .percentile-table th {
      color: var(--muted);
      font-size: clamp(11px, 3.4vw, 14px);
      font-weight: 700;
      white-space: nowrap;
    }

    .percentile-table td {
      color: var(--ink);
      font-size: clamp(12px, 3.6vw, 15px);
      font-weight: 400;
    }

    /* Internal dividers only: no outside table border */
    .percentile-table th,
    .percentile-table td {
      position: relative;
    }

    .percentile-table th + th,
    .percentile-table td + td {
      border-left: 1px solid var(--track);
    }

    /* Black gradient separating the header row from the values */
    .percentile-table .table-major-separator td {
      height: 0;
      padding: 0;
      line-height: 0;
      background: transparent;
      border-top: 1px solid var(--ink);
    }

    /* Black gradient separating the first/header column */
    .percentile-table th:nth-child(2),
    .percentile-table td:nth-child(2) {
      border-left: 0;
    }

    .percentile-table thead tr:first-child th:nth-child(2)::before,
    .percentile-table tbody td:nth-child(2)::before {
      content: "";
      position: absolute;
      left: -1px;
      width: 1px;
      pointer-events: none;
    }

    .percentile-table thead tr:first-child th:nth-child(2)::before {
      top: 0;
      bottom: 0;
      background: linear-gradient(
        to bottom,
        #fff 0%,
        rgba(21, 21, 21, 0.16) 55%,
        var(--ink) 100%
      );
    }

    .percentile-table tbody td:nth-child(2)::before {
      top: 0;
      bottom: 0;
      background: linear-gradient(
        to bottom,
        var(--ink) 0%,
        rgba(21, 21, 21, 0.16) 45%,
        #fff 100%
      );
    }

    .percentile-table sup {
      font-size: 0.7em;
      line-height: 0;
      vertical-align: super;
    }

    .percentile-table th:first-child,
    .percentile-table td:first-child {
      width: 24%;
    }

    .percentile-table td:first-child {
      text-align: center;
      white-space: nowrap;
      font-weight: 700;
    }

    .error {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 430px) {
      #app {
        padding: 12px 1px 12px;
      }

      .percentile-table th,
      .percentile-table td {
        padding: 7px 3px;
      }

      .percentile-table th {
        font-size: 11px;
      }

      .percentile-table td {
        font-size: 12px;
      }
      .app-loading {
        min-height: 175px;
      }

      .cone-loader {
        width: 160px;
        height: 70px;
      }

      .cone {
        width: 52px;
        height: 61px;
      }

      .cone.blue {
        left: 30px;
      }

      .cone.green {
        left: 64px;
      }

      .cone.red {
        left: 78px;
      }

      .loader-text {
        font-size: 10px;
      }      
    }
  </style>
</head>

<body>
  <div id="fit">
    <main id="app" class="is-loading">
      <div id="loading-state" class="app-loading" role="status" aria-label="Loading">
        <div class="cone-loader">
          <div class="cone blue" aria-hidden="true"></div>
          <div class="cone green" aria-hidden="true"></div>
          <div class="cone red" aria-hidden="true"></div>
        </div>

        <div class="loader-text">Loading...</div>
      </div>

      <section class="response-summary" aria-live="polite">
        <div class="response-label">No. of responses</div>

        <div class="response-value-row">
          <div id="response-count" class="response-value"></div>
          <div class="live-data" aria-label="Live data">
            <span class="live-data-dot" aria-hidden="true"></span>
            <span>LIVE data</span>
          </div>
        </div>
      </section>

      <section class="percentile-section" aria-label="Hourly rate percentiles">
        <table id="percentile-table" class="percentile-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
  </div>

  <script>
    const SPREADSHEET_ID = '1wmrmNS4cz-_aPKnyBVg7-SShbhs6czMNh07UjyLo04s';
    const SHEET_GID = '0';
    const RESPONSE_CELL = 'H2';
    const PERCENTILE_RANGE = 'AC1:AH2';
    const EXPECTED_PERCENTILE_COLS = 6;

    const app = document.getElementById('app');
    const responseCount = document.getElementById('response-count');
    const percentileTable = document.getElementById('percentile-table');
    const loadingState = document.getElementById('loading-state');

    function hideLoadingState() {
      app.classList.remove('is-loading');
      loadingState.setAttribute('aria-hidden', 'true');
    }

    function renderPercentileTable(values) {
      const thead = percentileTable.querySelector('thead');
      const tbody = percentileTable.querySelector('tbody');

      thead.textContent = '';
      tbody.textContent = '';

      const headers = values?.[0] || [];
      const rowValues = values?.[1] || [];

      const headerRow = document.createElement('tr');

      headers.forEach(value => {
        const th = document.createElement('th');
        const headerText = String(value || '—');

        th.scope = 'col';

        const suffixMatch = headerText.match(/^(.*?)(th)$/i);

        if (suffixMatch) {
          th.appendChild(document.createTextNode(suffixMatch[1]));

          const superscript = document.createElement('sup');
          superscript.textContent = suffixMatch[2];
          th.appendChild(superscript);
        } else {
          th.textContent = headerText;
        }

        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);

      const separatorRow = document.createElement('tr');
      separatorRow.className = 'table-major-separator';

      const separatorCell = document.createElement('td');
      separatorCell.colSpan = Math.max(headers.length, 1);

      separatorRow.appendChild(separatorCell);
      thead.appendChild(separatorRow);

      const dataRow = document.createElement('tr');

      rowValues.forEach(value => {
        const td = document.createElement('td');
        td.textContent = value || '—';
        dataRow.appendChild(td);
      });

      tbody.appendChild(dataRow);
    }

    function getCellDisplayValue(cell) {
      if (!cell) return '';
      return String(cell.f ?? cell.v ?? '').trim();
    }

    function loadGvizRange(range, headers) {
      return new Promise((resolve, reject) => {
        const callbackName = `locumRateSummaryCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');

        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Could not load data'));
        }, 10000);

        function cleanup() {
          window.clearTimeout(timeout);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = response => {
          cleanup();

          if (response?.status === 'error') {
            reject(new Error(response?.errors?.[0]?.detailed_message || 'Could not load Google Sheet data'));
            return;
          }

          resolve(response);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Could not load data'));
        };

        const params = new URLSearchParams({
          gid: SHEET_GID,
          range,
          headers: String(headers),
          tqx: `responseHandler:${callbackName}`
        });

        script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
        document.body.appendChild(script);
      });
    }

    function normaliseResponseCount(response) {
      const cell = response?.table?.rows?.[0]?.c?.[0];
      return getCellDisplayValue(cell) || '—';
    }

    function normalisePercentileTable(response) {
      const rows = response?.table?.rows || [];
    
      const headerRow = [];
      const valueRow = [];
    
      for (let c = 0; c < EXPECTED_PERCENTILE_COLS; c++) {
        headerRow.push(getCellDisplayValue(rows?.[0]?.c?.[c]) || '—');
        valueRow.push(getCellDisplayValue(rows?.[1]?.c?.[c]) || '—');
      }
    
      return [headerRow, valueRow];
    }

    async function loadDashboardData() {
      try {
        const [responseCountData, percentileData] = await Promise.all([
          loadGvizRange(RESPONSE_CELL, 0),
          loadGvizRange(PERCENTILE_RANGE, 0)
        ]);

        responseCount.textContent = normaliseResponseCount(responseCountData);
        renderPercentileTable(normalisePercentileTable(percentileData));
        hideLoadingState();
      } catch (error) {
        console.error(error);

        responseCount.textContent = '—';
        responseCount.classList.add('error');

        renderPercentileTable([
          ['—', '—', '—', '—', '—', '—'],
          ['—', '—', '—', '—', '—', '—']
        ]);

        hideLoadingState();
      }
    }

    loadDashboardData();
  </script>
</body>
</html>
