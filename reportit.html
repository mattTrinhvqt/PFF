<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report to PFF/HSU</title>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  <style>
    :root {
      --purple: #6600ff;
      --purple-soft: #f4efff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
      --error: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #fit {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
    }

    .box {
      width: min(calc(100% - 24px), 520px);
      max-width: 100%;
      min-width: 0;
      margin-inline: auto;
      padding: 20px 18px 4px;
      text-align: center;
    }

    .report-header {
      width: 100%;
      margin: 0 0 8px;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--track);
      text-align: center;
    }

    .report-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(28px, 6.6vw, 36px);
      font-weight: 700;
      line-height: 1.2;
    }

    .report-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .purple-text {
      color: var(--purple);
    }

    .form-body {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 22px;
      padding: 0;
      text-align: left;
    }

    .field {
      margin: 0;
    }

    .field label,
    .field-label {
      display: block;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.35;
      text-align: left;
    }

    /*
     * Text inputs and employer dropdown share the same
     * minimal underline style.
     */
    input[type="text"],
    select {
      display: block;
      width: 100%;
      height: 38px;
      margin: 0;
      padding: 0 3px;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--muted);
      border-radius: 0;
      font: inherit;
      font-size: 16px;
      outline: none;
    }

    select {
      cursor: pointer;
    }

    /*
     * Keep focus neutral rather than adding a purple outline.
     */
    input[type="text"]:focus,
    select:focus {
      border-bottom-color: var(--muted);
      outline: none;
      box-shadow: none;
    }

    .short-input {
      width: 100% !important;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 140px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--track);
      border-radius: 5px;
      font: inherit;
      font-size: 15px;
      line-height: 1.45;
      resize: vertical;
      outline: none;
    }

    /*
     * No purple border or glow when the textarea is selected.
     */
    textarea:focus {
      border-color: var(--track);
      outline: none;
      box-shadow: none;
    }

    .dropzone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 118px;
      padding: 16px;
      color: var(--ink);
      background: transparent;
      border: 1px dashed var(--muted);
      border-radius: 5px;
      text-align: center;
      cursor: pointer;
      outline: none;
      transition:
        background-color 120ms ease,
        border-color 120ms ease;
    }

    .dropzone:hover,
    .dropzone.is-dragover {
      background: var(--purple-soft);
      border-color: var(--purple);
    }

    /*
     * Keyboard/click focus does not create a purple outline.
     */
    .dropzone:focus,
    .dropzone:focus-visible {
      outline: none;
    }

    .dropzone.is-disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .upload-icon {
      width: 30px;
      height: 30px;
      margin-bottom: 7px;
      color: var(--muted);
    }

    .browse-label {
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .drop-hint {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .upload-limits {
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    #fileInput {
      display: none;
    }

    /*
     * Fixed-height selected-files area.
     * This space is always reserved so selecting files does not
     * push the rest of the form further down.
     */
    .file-list-panel {
      display: grid;
      grid-template-rows: 25px minmax(0, 1fr);
      width: 100%;
      height: 92px;
      margin-top: 8px;
      overflow: hidden;
      background: #fff;
      border: 1px solid var(--track);
      border-radius: 5px;
    }

    .file-list-meta {
      display: flex;
      align-items: center;
      min-width: 0;
      padding: 0 7px;
      color: var(--muted);
      background: #fff;
      border-bottom: 1px solid var(--track);
      font-size: 10px;
      line-height: 1;
      white-space: nowrap;
    }

    .file-list {
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .file-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
      text-align: center;
    }

    /*
     * Compact one-line file rows inside the fixed panel.
     */
    .file-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto 20px;
      align-items: center;
      gap: 6px;
      width: 100%;
      min-height: 25px;
      padding: 2px 6px 2px 7px;
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--track);
      border-radius: 0;
      font-size: 11px;
      line-height: 1.2;
    }

    .file-row:last-child {
      border-bottom: 0;
    }

    .file-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-size {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }

    .remove-file {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 3px;
      font: inherit;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    .remove-file:hover {
      color: var(--ink);
      background: var(--track);
    }

    .submit-area {
      width: 100%;
      margin-top: 34px;
      padding: 22px 0 0;
      border-top: 1px solid var(--track);
      text-align: center;
    }

    .submit-note {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }

    #submitBtn {
      width: 100%;
      min-height: 48px;
      padding: 0 18px;
      color: #fff;
      background: var(--ink);
      border: 0;
      border-radius: 6px;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    #submitBtn:hover {
      background: #26324d;
    }

    #submitBtn:disabled,
    input:disabled,
    select:disabled,
    textarea:disabled,
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .progress-wrap {
      display: none;
      width: 100%;
      margin: 14px auto 0;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      overflow: hidden;
      background: var(--track);
      border-radius: 999px;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: var(--purple);
      transition: width 120ms linear;
    }

    #out {
      width: 100%;
      min-height: 1.6em;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      text-align: left;
      white-space: pre-line;
    }

    #out:empty {
      display: none;
    }

    #out.is-error {
      color: var(--error);
    }

    @media (max-width: 430px) {
      .box {
        width: calc(100% - 24px);
        padding: 18px 14px 4px;
      }

      .report-title {
        font-size: clamp(26px, 6.4vw, 32px);
      }

      .form-body {
        gap: 22px;
        margin-top: 20px;
      }

      .field label,
      .field-label {
        font-size: 12px;
      }

      input[type="text"],
      select {
        height: 36px;
        font-size: 15px;
      }

      textarea {
        min-height: 132px;
        font-size: 14px;
      }

      .dropzone {
        min-height: 112px;
      }

      .file-list-panel {
        height: 88px;
      }
    }
  </style>
</head>

<body>
  <div id="fit">
    <main class="box">
      <section id="formView">

        <header class="report-header">
          <h1 class="report-title">Report to PFF/HSU</h1>

          <p class="report-subtitle">
            All questions (except the first) are
            <span class="purple-text">optional</span>
          </p>
        </header>

        <form id="reportForm" novalidate>

          <div class="form-body">

            <!-- Employer -->
            <div class="field">
              <label for="employer">
                Name the employer
              </label>

              <select id="employer" required>
                <option value="" selected disabled>Select employer…</option>

                <option value="1001 Optometry">
                  1001 Optometry
                </option>

                <option value="Bailey Nelson">
                  Bailey Nelson
                </option>

                <option value="Bupa Optical">
                  Bupa Optical
                </option>

                <option value="Chemist Warehouse Optometry">
                  Chemist Warehouse Optometry
                </option>

                <option value="Costco Optical">
                  Costco Optical
                </option>

                <option value="Dresden Vision">
                  Dresden Vision
                </option>

                <option value="George & Matilda Eyecare">
                  George &amp; Matilda Eyecare
                </option>

                <option value="HCF Eyecare">
                  HCF Eyecare
                </option>

                <option value="Independent">
                  Independent
                </option>

                <option value="Ophthalmologist">
                  Ophthalmologist
                </option>

                <option value="OPSM (incl. L&P, EyeQ)">
                  OPSM (incl. L&amp;P, EyeQ)
                </option>

                <option value="Optical by National Pharmacies">
                  Optical by National Pharmacies
                </option>

                <option value="Oscar Wylee">
                  Oscar Wylee
                </option>

                <option value="Other (name them below)">
                  Other (name them below)
                </option>

                <option value="Specsavers">
                  Specsavers
                </option>

                <option value="Teachers Health">
                  Teachers Health
                </option>

                <option value="The Optical Company (incl. NIB)">
                  The Optical Company (incl. NIB)
                </option>

                <option value="The Optical Superstore">
                  The Optical Superstore
                </option>
              </select>
            </div>

            <!-- Issue -->
            <div class="field">
              <label for="issue">
                Describe the issue (include where &amp; when; the more detail the better)
              </label>

              <textarea
                id="issue"
                maxlength="50000"
              ></textarea>
            </div>

            <!-- Evidence -->
            <div class="field">
              <div class="field-label">
                Upload your evidence (max 100MB total)
              </div>

              <div
                id="dropzone"
                class="dropzone"
                role="button"
                tabindex="0"
                aria-controls="fileInput"
              >
                <svg
                  class="upload-icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M19.35 10.04A7.49 7.49 0 0 0 5.27 8.08 5.994 5.994 0 0 0 6 20h13a5 5 0 0 0 .35-9.96ZM13 13v4h-2v-4H8l4-4 4 4h-3Z"
                  />
                </svg>

                <div class="browse-label">
                  Browse Files
                </div>

                <div class="drop-hint">
                  Drag and drop files here
                </div>

                <div class="upload-limits">
                  Maximum 10 files · 100MB total
                </div>
              </div>

              <input
                id="fileInput"
                type="file"
                multiple
              >

              <!--
                Fixed-height area reserved for selected files.
                This prevents the rest of the form moving downward.
              -->
              <div class="file-list-panel">
                <div
                  id="fileListMeta"
                  class="file-list-meta"
                >
                  0 files · 0 MB / 100 MB
                </div>

                <div
                  id="fileList"
                  class="file-list"
                  aria-live="polite"
                ></div>
              </div>
            </div>

            <!-- Optional contact -->
            <div class="field">
              <label for="contact">
                Please share your name and email so we can follow up if needed
              </label>

              <input
                id="contact"
                class="short-input"
                type="text"
                maxlength="1000"
              >
            </div>

          </div>

          <div class="submit-area">

            <p class="submit-note">
              Common identifying metadata is removed; files are renamed alphabetically
            </p>

            <button
              id="submitBtn"
              type="submit"
            >
              Submit
            </button>

            <div
              id="progressWrap"
              class="progress-wrap"
              aria-hidden="true"
            >
              <div class="progress-track">
                <div
                  id="progressBar"
                  class="progress-bar"
                ></div>
              </div>
            </div>

            <div
              id="out"
              aria-live="polite"
            ></div>

          </div>

        </form>
      </section>
    </main>
  </div>

  <script>
    const BACKEND_URL =
      'https://script.google.com/macros/s/AKfycbzmFEEVhwuIDnm6wh4eoO-f6bw8PS4dTa_pT8EpOPZKG6bX0C1UK4EhgLsogkeQvFgnWw/exec';

    const MAX_FILES = 10;

    const MAX_TOTAL_FILE_BYTES =
      100 * 1024 * 1024;

    /*
     * 8 MiB = 32 × 256 KiB.
     */
    const CHUNK_BYTES =
      8 * 1024 * 1024;

    const reportForm =
      document.getElementById('reportForm');

    const employerInput =
      document.getElementById('employer');

    const issueInput =
      document.getElementById('issue');

    const contactInput =
      document.getElementById('contact');

    const fileInput =
      document.getElementById('fileInput');

    const fileList =
      document.getElementById('fileList');

    const fileListMeta =
      document.getElementById('fileListMeta');

    const dropzone =
      document.getElementById('dropzone');

    const submitBtn =
      document.getElementById('submitBtn');

    const progressWrap =
      document.getElementById('progressWrap');

    const progressBar =
      document.getElementById('progressBar');

    const out =
      document.getElementById('out');

    let selectedFiles = [];
    let isSubmitting = false;
    let currentProgress = 0;

    function newId() {
      if (
        window.crypto &&
        typeof crypto.randomUUID === 'function'
      ) {
        return crypto.randomUUID();
      }

      return (
        Date.now().toString(36) +
        '-' +
        Math.random().toString(36).slice(2) +
        '-' +
        Math.random().toString(36).slice(2)
      );
    }

    function formatBytes(bytes) {
      if (bytes < 1024) {
        return `${bytes} B`;
      }

      if (bytes < 1024 * 1024) {
        return `${(bytes / 1024).toFixed(1)} KB`;
      }

      return (
        `${(bytes / 1024 / 1024).toFixed(1)} MB`
      );
    }

    function formatTotalMb(bytes) {
      if (!bytes) return '0';

      const value =
        bytes / 1024 / 1024;

      if (value < 10) {
        return value.toFixed(1);
      }

      return Math.round(value).toString();
    }

    function setMessage(
      message = '',
      isError = false
    ) {
      out.textContent = message;

      out.classList.toggle(
        'is-error',
        Boolean(message) && isError
      );
    }

    function showProgress(percent) {
      const whole =
        Math.round(
          Math.max(
            0,
            Math.min(100, percent)
          )
        );

      progressWrap.style.display =
        'block';

      progressWrap.setAttribute(
        'aria-hidden',
        'false'
      );

      progressBar.style.width =
        `${whole}%`;
    }

    function setProgressStatus(
      message,
      percent
    ) {
      const requested =
        Math.round(
          Math.max(
            0,
            Math.min(100, percent)
          )
        );
    
      /*
       * Submission progress can only move forwards.
       */
      currentProgress =
        Math.max(
          currentProgress,
          requested
        );
    
      showProgress(
        currentProgress
      );
    
      setMessage(
        `${message} — ${currentProgress}%`
      );
    }

    function hideProgress() {
      progressWrap.style.display =
        'none';

      progressWrap.setAttribute(
        'aria-hidden',
        'true'
      );

      progressBar.style.width =
        '0%';
    }

    function setSubmitting(value) {
      isSubmitting = value;

      employerInput.disabled = value;
      issueInput.disabled = value;
      contactInput.disabled = value;
      fileInput.disabled = value;
      submitBtn.disabled = value;

      document
        .querySelectorAll('.remove-file')
        .forEach(button => {
          button.disabled = value;
        });

      dropzone.classList.toggle(
        'is-disabled',
        value
      );
    }

    function addFiles(files) {
      if (isSubmitting) return;

      const incoming =
        Array.from(files || []);

      if (!incoming.length) return;

      if (
        selectedFiles.length +
        incoming.length >
        MAX_FILES
      ) {
        setMessage(
          `⚠ Maximum ${MAX_FILES} files per submission`,
          true
        );

        fileInput.value = '';
        return;
      }

      for (const file of incoming) {
        if (file.size <= 0) {
          setMessage(
            `⚠ ${file.name} is empty and cannot be uploaded`,
            true
          );

          fileInput.value = '';
          return;
        }
      }

      const currentBytes =
        selectedFiles.reduce(
          (sum, file) =>
            sum + file.size,
          0
        );

      const incomingBytes =
        incoming.reduce(
          (sum, file) =>
            sum + file.size,
          0
        );

      if (
        currentBytes +
        incomingBytes >
        MAX_TOTAL_FILE_BYTES
      ) {
        setMessage(
          '⚠ Evidence files must be 100MB or less in total',
          true
        );

        fileInput.value = '';
        return;
      }

      selectedFiles.push(...incoming);

      /*
       * Keep the displayed and submitted order based on the
       * original filenames using natural numeric sorting.
       */
      selectedFiles.sort(
        (a, b) =>
          a.name.localeCompare(
            b.name,
            undefined,
            {
              numeric: true,
              sensitivity: 'base'
            }
          )
      );

      fileInput.value = '';

      setMessage();

      renderFiles();
    }

    function renderFiles() {
      fileList.innerHTML = '';

      const totalBytes =
        selectedFiles.reduce(
          (sum, file) =>
            sum + file.size,
          0
        );

      const count =
        selectedFiles.length;

      fileListMeta.textContent =
        `${count} ${count === 1 ? 'file' : 'files'} · ` +
        `${formatTotalMb(totalBytes)} MB / 100 MB`;

      if (!count) {
        const placeholder =
          document.createElement('div');

        placeholder.className =
          'file-placeholder';

        placeholder.textContent =
          'No files selected';

        fileList.appendChild(
          placeholder
        );

        return;
      }

      selectedFiles.forEach(
        (file, index) => {
          const row =
            document.createElement('div');

          row.className =
            'file-row';

          const name =
            document.createElement('div');

          name.className =
            'file-name';

          name.textContent =
            file.name;

          name.title =
            file.name;

          const size =
            document.createElement('div');

          size.className =
            'file-size';

          size.textContent =
            formatBytes(file.size);

          const remove =
            document.createElement('button');

          remove.className =
            'remove-file';

          remove.type =
            'button';

          remove.setAttribute(
            'aria-label',
            `Remove ${file.name}`
          );

          remove.textContent =
            '×';

          remove.addEventListener(
            'click',
            () => {
              selectedFiles.splice(
                index,
                1
              );

              renderFiles();
            }
          );

          row.append(
            name,
            size,
            remove
          );

          fileList.appendChild(row);
        }
      );
    }

    dropzone.addEventListener(
      'click',
      () => {
        if (!isSubmitting) {
          fileInput.click();
        }
      }
    );

    dropzone.addEventListener(
      'keydown',
      event => {
        if (
          (
            event.key === 'Enter' ||
            event.key === ' '
          ) &&
          !isSubmitting
        ) {
          event.preventDefault();
          fileInput.click();
        }
      }
    );

    fileInput.addEventListener(
      'change',
      () =>
        addFiles(fileInput.files)
    );

    [
      'dragenter',
      'dragover'
    ].forEach(type => {
      dropzone.addEventListener(
        type,
        event => {
          event.preventDefault();

          if (!isSubmitting) {
            dropzone.classList.add(
              'is-dragover'
            );
          }
        }
      );
    });

    [
      'dragleave',
      'drop'
    ].forEach(type => {
      dropzone.addEventListener(
        type,
        event => {
          event.preventDefault();

          dropzone.classList.remove(
            'is-dragover'
          );
        }
      );
    });

    dropzone.addEventListener(
      'drop',
      event => {
        if (!isSubmitting) {
          addFiles(
            event.dataTransfer.files
          );
        }
      }
    );

    reportForm.addEventListener(
      'input',
      () => {
        if (
          !isSubmitting &&
          out.textContent
        ) {
          setMessage();
        }
      }
    );

    reportForm.addEventListener(
      'change',
      () => {
        if (
          !isSubmitting &&
          out.textContent
        ) {
          setMessage();
        }
      }
    );

    async function postNoCors(params) {
      if (
        !BACKEND_URL ||
        BACKEND_URL.includes(
          'PASTE_YOUR_'
        )
      ) {
        throw new Error(
          'Backend URL has not been set.'
        );
      }

      await fetch(
        BACKEND_URL,
        {
          method: 'POST',
          mode: 'no-cors',
          cache: 'no-store',
          body:
            new URLSearchParams(
              params
            )
        }
      );
    }

    function callStatusBackend(
      action,
      params = {}
    ) {
      return new Promise(
        (resolve, reject) => {
          if (
            !BACKEND_URL ||
            BACKEND_URL.includes(
              'PASTE_YOUR_'
            )
          ) {
            reject(
              new Error(
                'Backend URL has not been set.'
              )
            );

            return;
          }

          const callbackName =
            `pffStatus_${Date.now()}_` +
            `${Math.floor(
              Math.random() *
              1000000
            )}`;

          const script =
            document.createElement(
              'script'
            );

          const timeout =
            window.setTimeout(
              () => {
                cleanup();

                reject(
                  new Error(
                    'Status request timed out.'
                  )
                );
              },
              30000
            );

          function cleanup() {
            window.clearTimeout(
              timeout
            );

            try {
              delete window[
                callbackName
              ];
            } catch (_) {
              window[
                callbackName
              ] = undefined;
            }

            if (
              script.parentNode
            ) {
              script.parentNode
                .removeChild(
                  script
                );
            }
          }

          window[
            callbackName
          ] = response => {
            cleanup();

            if (
              !response ||
              !response.ok
            ) {
              reject(
                new Error(
                  response?.message ||
                  'Request failed.'
                )
              );

              return;
            }

            resolve(response);
          };

          script.onerror = () => {
            cleanup();

            reject(
              new Error(
                'Could not contact the server.'
              )
            );
          };

          const query =
            new URLSearchParams({
              callback:
                callbackName,
              action,
              ...params
            });

          script.src =
            `${BACKEND_URL}?` +
            `${query.toString()}`;

          document.body
            .appendChild(script);
        }
      );
    }

    function sleep(ms) {
      return new Promise(
        resolve =>
          setTimeout(
            resolve,
            ms
          )
      );
    }

    async function waitForUpload(
      uploadId,
      predicate,
      timeoutMs = 120000
    ) {
      const started =
        Date.now();

      while (
        Date.now() -
        started <
        timeoutMs
      ) {
        const state =
          await callStatusBackend(
            'uploadStatus',
            { uploadId }
          );

        if (
          state.status ===
          'error'
        ) {
          throw new Error(
            state.message ||
            'Evidence upload failed.'
          );
        }

        if (
          predicate(state)
        ) {
          return state;
        }

        await sleep(500);
      }

      throw new Error(
        'Evidence upload timed out.'
      );
    }

    async function waitForSubmission(
      submissionId,
      timeoutMs = 120000
    ) {
      const started =
        Date.now();

      while (
        Date.now() -
        started <
        timeoutMs
      ) {
        const state =
          await callStatusBackend(
            'submissionStatus',
            {
              submissionId
            }
          );

        if (
          state.status ===
          'saved'
        ) {
          return state;
        }

        if (
          state.status ===
          'error'
        ) {
          throw new Error(
            state.message ||
            'Submission could not be saved.'
          );
        }

        await sleep(500);
      }

      throw new Error(
        'Submission timed out.'
      );
    }

    function blobToBase64WebSafe(
      blob
    ) {
      return new Promise(
        (resolve, reject) => {
          const reader =
            new FileReader();

          reader.onload = () => {
            const result =
              String(
                reader.result ||
                ''
              );

            const comma =
              result.indexOf(',');

            const base64 =
              comma >= 0
                ? result.slice(
                    comma + 1
                  )
                : result;

            resolve(
              base64
                .replace(
                  /\+/g,
                  '-'
                )
                .replace(
                  /\//g,
                  '_'
                )
                .replace(
                  /=+$/g,
                  ''
                )
            );
          };

          reader.onerror =
            () =>
              reject(
                reader.error ||
                new Error(
                  'Could not read file.'
                )
              );

          reader.readAsDataURL(
            blob
          );
        }
      );
    }

    function canvasToBlob(
      canvas,
      type,
      quality
    ) {
      return new Promise(
        (resolve, reject) => {
          canvas.toBlob(
            blob => {
              if (!blob) {
                reject(
                  new Error(
                    'Could not sanitise image metadata.'
                  )
                );

                return;
              }

              resolve(blob);
            },
            type,
            quality
          );
        }
      );
    }

    async function sanitiseImageMetadata(
      file
    ) {
      const supportedTypes =
        new Set([
          'image/jpeg',
          'image/png',
          'image/webp'
        ]);

      if (
        !supportedTypes.has(
          file.type
        )
      ) {
        return file;
      }

      const objectUrl =
        URL.createObjectURL(
          file
        );

      try {
        const image =
          new Image();

        image.decoding =
          'async';

        await new Promise(
          (resolve, reject) => {
            image.onload =
              resolve;

            image.onerror =
              () =>
                reject(
                  new Error(
                    `Could not read ${file.name} for metadata removal.`
                  )
                );

            image.src =
              objectUrl;
          }
        );

        const canvas =
          document.createElement(
            'canvas'
          );

        canvas.width =
          image.naturalWidth;

        canvas.height =
          image.naturalHeight;

        const context =
          canvas.getContext(
            '2d'
          );

        if (!context) {
          throw new Error(
            'Could not prepare image sanitisation.'
          );
        }

        context.drawImage(
          image,
          0,
          0
        );

        const quality =
          file.type ===
          'image/jpeg'
            ? 0.95
            : undefined;

        const blob =
          await canvasToBlob(
            canvas,
            file.type,
            quality
          );

        return new File(
          [blob],
          file.name,
          {
            type:
              blob.type ||
              file.type,
            lastModified:
              Date.now()
          }
        );
      } finally {
        URL.revokeObjectURL(
          objectUrl
        );
      }
    }

    async function sanitisePdfMetadata(
      file
    ) {
      if (
        file.type !==
          'application/pdf' &&
        !/\.pdf$/i.test(
          file.name
        )
      ) {
        return file;
      }

      if (
        !window.PDFLib ||
        !window.PDFLib
          .PDFDocument
      ) {
        throw new Error(
          'PDF metadata cleaner could not be loaded.'
        );
      }

      const bytes =
        await file.arrayBuffer();

      const pdfDoc =
        await window.PDFLib
          .PDFDocument
          .load(bytes);

      pdfDoc.setTitle('');
      pdfDoc.setAuthor('');
      pdfDoc.setSubject('');
      pdfDoc.setKeywords([]);
      pdfDoc.setCreator('');
      pdfDoc.setProducer('');

      pdfDoc.setCreationDate(
        new Date(0)
      );

      pdfDoc.setModificationDate(
        new Date(0)
      );

      const cleanedBytes =
        await pdfDoc.save();

      return new File(
        [cleanedBytes],
        file.name,
        {
          type:
            'application/pdf',
          lastModified:
            Date.now()
        }
      );
    }

    async function sanitiseFileMetadata(
      file
    ) {
      if (
        [
          'image/jpeg',
          'image/png',
          'image/webp'
        ].includes(
          file.type
        )
      ) {
        return sanitiseImageMetadata(
          file
        );
      }

      if (
        file.type ===
          'application/pdf' ||
        /\.pdf$/i.test(
          file.name
        )
      ) {
        return sanitisePdfMetadata(
          file
        );
      }

      /*
       * Other file formats are uploaded unchanged because
       * reliable metadata removal is format-specific.
       */
      return file;
    }

    async function prepareFilesForUpload(
      files
    ) {
      const ordered =
        [...files].sort(
          (a, b) =>
            a.name.localeCompare(
              b.name,
              undefined,
              {
                numeric: true,
                sensitivity:
                  'base'
              }
            )
        );
    
      const cleaned = [];
    
      for (
        let i = 0;
        i < ordered.length;
        i++
      ) {
        const startPercent =
          ordered.length
            ? (
                i /
                ordered.length
              ) *
              15
            : 15;
    
        /*
         * Keep metadata processing and uploading presented
         * as one continuous stage.
         */
        setProgressStatus(
          `Removing metadata and uploading evidence 1 of ${ordered.length}`,
          startPercent
        );
    
        cleaned.push(
          await sanitiseFileMetadata(
            ordered[i]
          )
        );
    
        const endPercent =
          (
            (i + 1) /
            ordered.length
          ) *
          15;
    
        setProgressStatus(
          `Removing metadata and uploading evidence 1 of ${ordered.length}`,
          endPercent
        );
      }
    
      return cleaned;
    }

    async function uploadFile(
      submissionId,
      file,
      order,
      completedBytes,
      totalBytes,
      fileCount
    ) {
      const uploadId =
        newId();
      
      const progressMessage =
        `Removing metadata and uploading evidence ${order} of ${fileCount}`;
      
      setProgressStatus(
        progressMessage,
        15
      );

      await postNoCors({
        action:
          'startUpload',

        submissionId,

        uploadId,

        fileName:
          file.name,

        mimeType:
          file.type ||
          'application/octet-stream',

        size:
          String(
            file.size
          ),

        order:
          String(order)
      });

      let state =
        await waitForUpload(
          uploadId,
          value =>
            [
              'ready',
              'uploading',
              'complete'
            ].includes(
              value.status
            )
        );

      let start =
        Number(
          state.nextByte ||
          0
        );

      while (
        start <
        file.size
      ) {
        const endExclusive =
          Math.min(
            start +
            CHUNK_BYTES,
            file.size
          );

        const chunk =
          file.slice(
            start,
            endExclusive
          );

        const base64 =
          await blobToBase64WebSafe(
            chunk
          );

        const overallBeforeChunk =
          15 +
          (
            (
              completedBytes +
              Math.min(
                start,
                file.size
              )
            ) /
            totalBytes
          ) *
          77;

        setProgressStatus(
          progressMessage,
          overallBeforeChunk
        );

        await postNoCors({
          action:
            'uploadChunk',

          uploadId,

          start:
            String(start),

          end:
            String(
              endExclusive -
              1
            ),

          total:
            String(
              file.size
            ),

          chunkBase64:
            base64
        });

        state =
          await waitForUpload(
            uploadId,
            value =>
              value.status ===
                'complete' ||
              Number(
                value.nextByte ||
                0
              ) >=
                endExclusive
          );

        start =
          Number(
            state.nextByte ||
            endExclusive
          );

        const overall =
          totalBytes > 0
            ? 15 +
              (
                (
                  completedBytes +
                  Math.min(
                    start,
                    file.size
                  )
                ) /
                totalBytes
              ) *
              77
            : 92;

        setProgressStatus(
          progressMessage,
          overall
        );
      }

      return file.size;
    }

    function resetAfterSubmitted() {
      reportForm.reset();

      selectedFiles = [];

      renderFiles();

      hideProgress();

      setSubmitting(false);

      setMessage(
        'Submitted'
      );

      employerInput.focus();
    }

    reportForm.addEventListener(
      'submit',
      async event => {
        event.preventDefault();

        if (isSubmitting) {
          return;
        }

        const employer =
          employerInput
            .value
            .trim();

        if (!employer) {
          setMessage(
            '⚠ Please select the employer',
            true
          );

          employerInput.focus();

          return;
        }

        if (
          selectedFiles.length >
          MAX_FILES
        ) {
          setMessage(
            `⚠ Maximum ${MAX_FILES} files per submission`,
            true
          );

          return;
        }

        const totalBytes =
          selectedFiles.reduce(
            (sum, file) =>
              sum +
              file.size,
            0
          );

        if (
          totalBytes >
          MAX_TOTAL_FILE_BYTES
        ) {
          setMessage(
            '⚠ Evidence files must be 100MB or less in total',
            true
          );

          return;
        }

        const submissionId =
          newId();
        
        let completedBytes =
          0;
        
        /*
         * Start each new submission from zero.
         */
        currentProgress = 0;
        
        setSubmitting(true);

        if (
          selectedFiles.length
        ) {
          setProgressStatus(
            `Removing metadata and uploading evidence 1 of ${selectedFiles.length}`,
            0
          );
        } else {
          setProgressStatus(
            'Submitting report',
            5
          );
        }

        try {
          const uploadFiles =
            selectedFiles.length
              ? await prepareFilesForUpload(
                  selectedFiles
                )
              : [];

          const sanitisedTotalBytes =
            uploadFiles.reduce(
              (sum, file) =>
                sum +
                file.size,
              0
            );

          if (
            sanitisedTotalBytes >
            MAX_TOTAL_FILE_BYTES
          ) {
            throw new Error(
              'Evidence files exceed 100MB after metadata removal.'
            );
          }

          for (
            let i = 0;
            i <
            uploadFiles.length;
            i++
          ) {
            const uploaded =
              await uploadFile(
                submissionId,
                uploadFiles[i],
                i + 1,
                completedBytes,
                sanitisedTotalBytes,
                uploadFiles.length
              );

            completedBytes +=
              uploaded;
          }

          setProgressStatus(
            uploadFiles.length
              ? 'Renaming files and saving report'
              : 'Saving report',
            95
          );

          await postNoCors({
            action:
              'saveSubmission',

            submissionId,

            employer,

            issue:
              issueInput
                .value
                .trim(),

            contact:
              contactInput
                .value
                .trim()
          });

          setProgressStatus(
            'Finalising submission',
            99
          );

          await waitForSubmission(
            submissionId
          );

          setProgressStatus(
            'Submitted',
            100
          );

          resetAfterSubmitted();

        } catch (error) {
          console.error(
            error
          );

          setMessage(
            '⚠ ' +
            String(
              error?.message ||
              'Unable to submit right now, please try again'
            ).replace(
              /\.+$/,
              ''
            ),
            true
          );

          hideProgress();

          setSubmitting(false);
        }
      }
    );

    window.addEventListener(
      'beforeunload',
      event => {
        if (!isSubmitting) {
          return;
        }

        event.preventDefault();

        event.returnValue =
          '';
      }
    );

    /*
     * Initialise the permanently reserved selected-file panel.
     */
    renderFiles();
  </script>
</body>
</html>
