<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="referrer"
    content="strict-origin-when-cross-origin"
  >

  <title>PFF Admin</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <!-- Google Identity Services -->
  <script
    src="https://accounts.google.com/gsi/client"
    async
    defer>
  </script>

  <style>
    :root {
      --purple: #6600ff;
      --purple-soft: #f4efff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
      --error: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #fit {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
    }

    .box {
      width: min(calc(100% - 24px), 520px);
      max-width: 100%;
      min-width: 0;
      margin-inline: auto;
      padding: 20px 18px 4px;
      text-align: center;
    }

    .admin-header {
      width: 100%;
      margin: 0 0 8px;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--track);
      text-align: center;
    }

    .admin-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(28px, 6.6vw, 36px);
      font-weight: 700;
      line-height: 1.2;
    }

    #loginCard,
    #adminContent {
      width: 100%;
    }

    #googleSignInButton {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-top: 28px;
    }

    #loadingMessage {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    #errorMessage {
      display: none;
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      color: var(--error);
      background: #fff5f5;
      border: 1px solid #f2d5d5;
      border-radius: 5px;
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
    }

    #adminContent {
      display: none;
    }

    .admin-body {
      margin-top: 22px;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      text-align: left;
    }

    @media (max-width: 430px) {
      .box {
        width: calc(100% - 24px);
        padding: 18px 14px 4px;
      }

      .admin-title {
        font-size: clamp(26px, 6.4vw, 32px);
      }

      #loadingMessage,
      #errorMessage {
        font-size: 12px;
      }
    }
  </style>
</head>


<body>

  <div id="fit">

    <main class="box">

      <!-- LOGIN SCREEN -->
      <section id="loginCard">

        <header class="admin-header">
          <h1 class="admin-title">
            PFF Admin
          </h1>
        </header>

        <div id="loadingMessage">
          Loading Google Sign-In...
        </div>

        <div id="googleSignInButton"></div>

        <div id="errorMessage"></div>

      </section>


      <!-- ADMIN PAGE -->
      <section id="adminContent">

        <header class="admin-header">
          <h1 class="admin-title">
            PFF Admin
          </h1>
        </header>

        <div class="admin-body">
          Hello
        </div>

      </section>

    </main>

  </div>


  <script>

    /************************************************************
     * SETTINGS
     ************************************************************/

    /*
     * Google OAuth Web Client ID.
     */

    const GOOGLE_CLIENT_ID =
      "924407223095-b974a5mdsr9th6mt9lltqmb2p8s4eg8f.apps.googleusercontent.com";


    /*
     * For this first test, ONLY this Google account is allowed.
     */

    const ALLOWED_EMAIL =
      "matthew.vqt@gmail.com";


    /************************************************************
     * LOAD GOOGLE SIGN-IN
     ************************************************************/

    window.addEventListener(
      "load",
      waitForGoogle
    );


    function waitForGoogle() {

      /*
       * The Google Identity script loads asynchronously,
       * so wait until it is ready.
       */

      if (
        typeof google === "undefined" ||
        !google.accounts ||
        !google.accounts.id
      ) {

        setTimeout(
          waitForGoogle,
          250
        );

        return;
      }


      initialiseGoogleSignIn();

    }


    function initialiseGoogleSignIn() {

      document
        .getElementById(
          "loadingMessage"
        )
        .style
        .display = "none";


      /*
       * Initialise Google Identity Services.
       */

      google.accounts.id.initialize({

        client_id:
          GOOGLE_CLIENT_ID,

        callback:
          handleGoogleCredential,

        auto_select:
          false,

        ux_mode:
          "popup",

        /*
         * Keep FedCM disabled for now because this page
         * will eventually be embedded cross-origin
         * inside a Google Site.
         */

        use_fedcm_for_button:
          false

      });


      /*
       * Display Google's official sign-in button.
       */

      google.accounts.id.renderButton(

        document.getElementById(
          "googleSignInButton"
        ),

        {
          type:
            "standard",

          theme:
            "outline",

          size:
            "large",

          text:
            "signin_with",

          shape:
            "rectangular",

          logo_alignment:
            "left",

          width:
            280
        }

      );

    }


    /************************************************************
     * HANDLE GOOGLE LOGIN
     ************************************************************/

    function handleGoogleCredential(response) {

      hideError();


      try {

        /*
         * Google returns an ID token in:
         *
         * response.credential
         *
         * For this prototype we decode the token in the browser.
         */

        const payload =
          decodeJwtPayload(
            response.credential
          );


        if (!payload) {

          showError(
            "Unable to read your Google account."
          );

          return;

        }


        /*
         * Read the email address returned by Google.
         */

        const email =
          String(
            payload.email || ""
          )
          .trim()
          .toLowerCase();


        /*
         * Check that Google says the email is verified.
         */

        const emailVerified =
          payload.email_verified === true;


        if (!emailVerified) {

          showError(
            "Your Google email address could not be verified."
          );

          return;

        }


        /*
         * Check that the token was issued for this OAuth client.
         */

        if (
          payload.aud !==
          GOOGLE_CLIENT_ID
        ) {

          showError(
            "This login could not be validated for this website."
          );

          return;

        }


        /*
         * Check token issuer.
         */

        if (
          payload.iss !== "https://accounts.google.com" &&
          payload.iss !== "accounts.google.com"
        ) {

          showError(
            "Invalid Google login."
          );

          return;

        }


        /*
         * Check token has not expired.
         */

        const currentTime =
          Math.floor(
            Date.now() / 1000
          );


        if (
          !payload.exp ||
          payload.exp < currentTime
        ) {

          showError(
            "Your Google login has expired. Please sign in again."
          );

          return;

        }


        /*
         * TEMPORARY ACCESS RULE:
         *
         * Allow ONLY:
         *
         * matthew.vqt@gmail.com
         */

        if (
          email !==
          ALLOWED_EMAIL.toLowerCase()
        ) {

          showError(
            "Access denied. " +
            email +
            " is not authorised to access PFF Admin."
          );

          return;

        }


        /*
         * Login successful.
         */

        showAdminPage();

      }

      catch (error) {

        console.error(
          "Google login error:",
          error
        );


        showError(
          "There was a problem signing you in."
        );

      }

    }


    /************************************************************
     * DECODE GOOGLE ID TOKEN
     *
     * This is sufficient for the initial frontend test.
     *
     * For the real admin system, the token should instead be
     * verified securely by a backend.
     ************************************************************/

    function decodeJwtPayload(token) {

      const parts =
        token.split(".");


      if (
        parts.length !== 3
      ) {

        throw new Error(
          "Invalid Google ID token."
        );

      }


      let base64 =
        parts[1]
          .replace(/-/g, "+")
          .replace(/_/g, "/");


      /*
       * Restore Base64 padding.
       */

      while (
        base64.length % 4
      ) {

        base64 += "=";

      }


      const binary =
        atob(base64);


      const bytes =
        Uint8Array.from(

          binary,

          character =>
            character.charCodeAt(0)

        );


      const json =
        new TextDecoder(
          "utf-8"
        ).decode(bytes);


      return JSON.parse(json);

    }


    /************************************************************
     * SHOW ADMIN PAGE
     ************************************************************/

    function showAdminPage() {

      document
        .getElementById(
          "loginCard"
        )
        .style
        .display = "none";


      document
        .getElementById(
          "adminContent"
        )
        .style
        .display = "block";

    }


    /************************************************************
     * ERROR MESSAGES
     ************************************************************/

    function showError(message) {

      const errorBox =
        document.getElementById(
          "errorMessage"
        );


      errorBox.textContent =
        message;


      errorBox.style.display =
        "block";

    }


    function hideError() {

      const errorBox =
        document.getElementById(
          "errorMessage"
        );


      errorBox.textContent =
        "";


      errorBox.style.display =
        "none";

    }

  </script>

</body>

</html>
