<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PFF Forums</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      overflow: hidden;
      font-family: 'Lato', sans-serif;
      color: var(--ink);
    }

    #fit {
      width: 100%;
    }

    #app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 12px 4px 16px;
    }

    .forums {
      display: grid;
      gap: 24px;
      width: 100%;
      margin-top: 2px;
    }

    .forum-item {
      width: 100%;
      text-align: center;
    }

    .forum-button {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      width: 100%;
      min-height: 38px;
      padding: 0 12px;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.2;
      text-align: left;
      text-decoration: none;
      transition: background-color 120ms ease, color 120ms ease;
    }

    .forum-button:hover,
    .forum-button:focus-visible {
      color: #fff;
      background: var(--ink);
      outline: none;
    }

    .forum-icon {
      color: var(--purple);
      font-size: 20px;
      font-weight: 400;
      line-height: 1;
      text-align: center;
      transition: color 120ms ease;
    }

    .forum-button:hover .forum-icon,
    .forum-button:focus-visible .forum-icon {
      color: #fff;
    }

    .forum-label {
      min-width: 0;
    }

    .forum-member-count {
      color: var(--muted);
      font-size: 12px;
    }

    .forum-button:hover .forum-member-count,
    .forum-button:focus-visible .forum-member-count {
      color: #d8dbe5;
    }

    .forum-description {
      max-width: 430px;
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
    }

    .forum-description + .forum-description {
      margin-top: 2px;
    }

    .forum-link {
      color: var(--purple);
      text-decoration: none;
    }

    .forum-link:hover,
    .forum-link:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    @media (max-width: 430px) {
      #app {
        padding: 10px 2px 14px;
      }

      .forums {
        gap: 22px;
      }

      .forum-button {
        min-height: 38px;
        font-size: 14px;
      }

      .forum-description {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div id="fit">
    <main id="app">
      <section class="forums" aria-label="PFF forum links">

        <div class="forum-item">
          <a
            class="forum-button"
            href="https://shorturl.at/SUU3j"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="forum-icon" aria-hidden="true">✦</span>
            <span class="forum-label">
              Join PFF forum
              <span class="forum-member-count">(2.5k+ active members)</span>
            </span>
          </a>

          <p class="forum-description">
            Open to employees and most independents
          </p>
        </div>

        <div class="forum-item">
          <a
            class="forum-button"
            href="https://www.facebook.com/share/g/181HgXPuzD/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="forum-icon" aria-hidden="true">◎</span>
            <span class="forum-label">Join AEIOU forum</span>
          </a>

          <p class="forum-description">
            HSU member optometrists only
          </p>
        </div>

      </section>
    </main>
  </div>
</body>
</html>
