<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Best Optometry Workplaces</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
      --live-red: #e53935;
      --track: #e8eaf0;

      --blue-cone: rgba(74, 86, 255, 0.82);
      --green-cone: rgba(36, 210, 116, 0.78);
      --red-cone: rgba(255, 92, 48, 0.76);

      --gold-bg: #fff7d9;
      --gold-border: #ead58a;
      --gold-ink: #78600a;

      --silver-bg: #f3f5f8;
      --silver-border: #d9dee6;
      --silver-ink: #657084;

      --bronze-bg: #faeee5;
      --bronze-border: #e8c9af;
      --bronze-ink: #8b5635;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow: hidden;
    }

    #fit {
      width: 100%;
      overflow: hidden;
    }

    #app {
      width: 100%;
      margin: 0;
      padding: 14px 2px 14px;
      text-align: center;
    }

    #app.is-loading .response-summary,
    #app.is-loading h1,
    #app.is-loading .podium-list,
    #app.is-loading #status {
      display: none;
    }

    #app:not(.is-loading) .app-loading {
      display: none;
    }

    .app-loading {
      width: 100%;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .cone-loader {
      position: relative;
      width: 176px;
      height: 78px;
      margin: 0 auto;
      overflow: visible;
      isolation: isolate;
    }

    .cone {
      position: absolute;
      bottom: 8px;
      width: 58px;
      height: 68px;
      opacity: 0;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      -webkit-clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      filter: none;
      mix-blend-mode: normal;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
      will-change: opacity;
    }

    .cone.blue {
      left: 33px;
      background: var(--blue-cone);
      animation: blueConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.green {
      left: 69px;
      background: var(--green-cone);
      animation: greenConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.red {
      left: 85px;
      background: var(--red-cone);
      animation: redConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .loader-text {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      line-height: 1.35;
      text-align: center;
      animation: loadingTextPulse 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    @keyframes blueConeCycle {
      0% { opacity: 0; }
      12% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes greenConeCycle {
      0% { opacity: 0; }
      20% { opacity: 0; }
      32% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes redConeCycle {
      0% { opacity: 0; }
      40% { opacity: 0; }
      52% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes loadingTextPulse {
      0% { opacity: 0.45; }
      52% { opacity: 0.78; }
      76% { opacity: 0.78; }
      87% { opacity: 0.45; }
      100% { opacity: 0.45; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cone.blue,
      .cone.green,
      .cone.red {
        animation: none;
        opacity: 1;
      }

      .loader-text {
        animation: none;
        opacity: 0.72;
      }
    }

    .response-summary {
      width: 100%;
      padding: 0;
    }

    .response-summary::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: 5px;
      background: linear-gradient(
        90deg,
        #fff 0%,
        rgba(102, 0, 255, 0.16) 24%,
        var(--purple) 50%,
        rgba(102, 0, 255, 0.16) 76%,
        #fff 100%
      );
    }

    .response-label {
      color: var(--muted);
      font-size: clamp(13px, 3.8vw, 16px);
      font-weight: 400;
      line-height: 1.15;
      white-space: nowrap;
    }

    .response-value {
      margin-top: 2px;
      color: var(--ink);
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 400;
      line-height: 1.1;
      white-space: nowrap;
    }

    .response-value-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 31px;
      margin-top: 2px;
    }

    .live-data {
      position: absolute;
      bottom: 4px;
      right: 1px;
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 0;
      padding: 0;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      text-transform: none;
      transform: none;
      white-space: nowrap;
    }

    .live-data-dot {
      width: 6px;
      height: 6px;
      flex: 0 0 6px;
      border-radius: 50%;
      background: var(--live-red);
    }

    h1 {
      margin: 28px 12px 14px;
      color: var(--ink);
      font-size: clamp(15px, 3.8vw, 18px);
      font-weight: 700;
      line-height: 1.2;
    }

    .podium-list {
      display: grid;
      gap: 8px;
      width: 100%;
    }

    .podium-row {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      min-height: 60px;
      overflow: hidden;
      border: 1px solid var(--track);
      border-radius: 7px;
      text-align: left;
    }

    .medal {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .result {
      display: flex;
      align-items: center;
      min-width: 0;
      padding: 10px 14px;
      color: var(--ink);
      background: #fff;
      font-size: clamp(15px, 3.8vw, 18px);
      font-weight: 400;
      line-height: 1.25;
      overflow-wrap: anywhere;
      white-space: pre-line;
    }

    .gold {
      border-color: var(--gold-border);
    }

    .gold .medal {
      color: var(--gold-ink);
      background: var(--gold-bg);
    }

    .silver {
      border-color: var(--silver-border);
    }

    .silver .medal {
      color: var(--silver-ink);
      background: var(--silver-bg);
    }

    .bronze {
      border-color: var(--bronze-border);
    }

    .bronze .medal {
      color: var(--bronze-ink);
      background: var(--bronze-bg);
    }

    #status {
      margin: 12px 8px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    #status[hidden] {
      display: none;
    }

    @media (max-width: 430px) {
      #app {
        padding: 12px 1px 12px;
      }

      .podium-row {
        grid-template-columns: 70px minmax(0, 1fr);
        min-height: 56px;
      }

      .result {
        padding: 9px 12px;
      }

      .app-loading {
        min-height: 175px;
      }

      .cone-loader {
        width: 160px;
        height: 70px;
      }

      .cone {
        width: 52px;
        height: 61px;
      }

      .cone.blue {
        left: 30px;
      }

      .cone.green {
        left: 64px;
      }

      .cone.red {
        left: 78px;
      }

      .loader-text {
        font-size: 10px;
      }      
    }
  </style>
</head>

<body>
  <div id="fit">
    <main id="app" class="is-loading">
      <div id="loading-state" class="app-loading" role="status" aria-label="Loading">
        <div class="cone-loader">
          <div class="cone blue" aria-hidden="true"></div>
          <div class="cone green" aria-hidden="true"></div>
          <div class="cone red" aria-hidden="true"></div>
        </div>

        <div class="loader-text">Loading...</div>
      </div>

      <section class="response-summary" aria-live="polite">
        <div class="response-label">No. of responses</div>

        <div class="response-value-row">
          <div id="response-count" class="response-value"></div>
          <div class="live-data" aria-label="Live data">
            <span class="live-data-dot" aria-hidden="true"></span>
            <span>LIVE data</span>
          </div>
        </div>
      </section>

      <h1>Best optometry workplaces</h1>

      <div class="podium-list">
        <section class="podium-row gold">
          <div class="medal">Gold</div>
          <div id="gold-text" class="result"></div>
        </section>

        <section class="podium-row silver">
          <div class="medal">Silver</div>
          <div id="silver-text" class="result"></div>
        </section>

        <section class="podium-row bronze">
          <div class="medal">Bronze</div>
          <div id="bronze-text" class="result"></div>
        </section>
      </div>

      <p id="status" role="alert" hidden></p>
    </main>
  </div>

  <script>
    const SPREADSHEET_ID = '1G3BV5lA_jaRPRR3ZmFWL-j8nRVWk5k01D-gOeO5nVgQ';
    const SHEET_GID = '0';
    const RESPONSE_CELL = 'BU2';
    const PODIUM_RANGE = 'AL64:AL66';

    const app = document.getElementById('app');
    const loadingState = document.getElementById('loading-state');
    const responseCount = document.getElementById('response-count');

    function hideLoadingState() {
      app.classList.remove('is-loading');
      loadingState.setAttribute('aria-hidden', 'true');
    }

    const podiumRows = [
      { key: 'gold' },
      { key: 'silver' },
      { key: 'bronze' }
    ];

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function formatWorkplaceResult(value) {
      let text = (value || '').trim();

      text = text.replace(/^#(?:1|2|3)\s*/, '');

      const protectedNames = [
        ['George & Matilda', '__GEORGE_MATILDA__']
      ];

      protectedNames.forEach(([name, token]) => {
        text = text.replaceAll(name, token);
      });

      const employers = text
        .split(/\s+&\s+/)
        .map(name => name.trim())
        .filter(Boolean)
        .map(name => {
          protectedNames.forEach(([originalName, token]) => {
            name = name.replaceAll(token, originalName);
          });

          const visualNames = [
            ['Chemist/Optometrist Warehouse', 'Chemist Warehouse Optometry'],
            ['NIB (incl. the Optical Company)', 'The Optical Company (incl. NIB)'],
            ['Teacher’s Health Fund', 'Teachers Health'],
            ['Teachers Health Fund', 'Teachers Health'],
            ['George & Matilda', 'George & Matilda Eyecare'],
            ['1001', '1001 Optometry'],
            ['Bupa', 'Bupa Optical'],
            ['Costco', 'Costco Optical'],
            ['Dresden', 'Dresden Vision'],
            ['HCF', 'HCF Eyecare']
          ];

          visualNames.forEach(([storedName, displayName]) => {
            name = name.replace(
              new RegExp(escapeRegExp(storedName), 'g'),
              displayName
            );
          });

          return name;
        });

      if (!employers.length) {
        return 'No result available';
      }

      return employers
        .map((employer, index) =>
          index < employers.length - 1 ? `${employer};` : employer
        )
        .join('\n');
    }

    function getCellDisplayValue(cell) {
      if (!cell) return '';
      return String(cell.f ?? cell.v ?? '').trim();
    }

    function loadGvizRange(range) {
      return new Promise((resolve, reject) => {
        const callbackName = `bestWorkplacesCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');

        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Could not load data'));
        }, 10000);

        function cleanup() {
          window.clearTimeout(timeout);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = response => {
          cleanup();

          if (response?.status === 'error') {
            reject(new Error(response?.errors?.[0]?.detailed_message || 'Could not load Google Sheet data'));
            return;
          }

          resolve(response);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Could not load data'));
        };

        const params = new URLSearchParams({
          gid: SHEET_GID,
          range,
          headers: '0',
          tqx: `responseHandler:${callbackName}`
        });

        script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
        document.body.appendChild(script);
      });
    }

    function normaliseDashboard(responseData, podiumData) {
      const responseCell = responseData?.table?.rows?.[0]?.c?.[0];

      const podiumRows = podiumData?.table?.rows || [];

      return {
        responseCount: getCellDisplayValue(responseCell) || '—',
        gold: getCellDisplayValue(podiumRows?.[0]?.c?.[0]) || '',
        silver: getCellDisplayValue(podiumRows?.[1]?.c?.[0]) || '',
        bronze: getCellDisplayValue(podiumRows?.[2]?.c?.[0]) || ''
      };
    }

    function renderDashboard(data) {
      responseCount.textContent = data.responseCount || '—';

      podiumRows.forEach(({ key }) => {
        const target = document.getElementById(`${key}-text`);
        target.textContent = formatWorkplaceResult(data[key]);
      });

      hideLoadingState();
    }

    function showError(error) {
      console.error(error);

      responseCount.textContent = '—';

      podiumRows.forEach(({ key }) => {
        const target = document.getElementById(`${key}-text`);
        target.textContent = '—';
      });

      const status = document.getElementById('status');
      status.hidden = false;
      status.textContent = `Unable to load results: ${error.message || error}`;

      hideLoadingState();
    }

    async function loadDashboard() {
      try {
        const [responseData, podiumData] = await Promise.all([
          loadGvizRange(RESPONSE_CELL),
          loadGvizRange(PODIUM_RANGE)
        ]);

        renderDashboard(normaliseDashboard(responseData, podiumData));
      } catch (error) {
        showError(error);
      }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
