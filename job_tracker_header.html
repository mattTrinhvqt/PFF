<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --purple: #6600ff;
      --purple-soft: #f4efff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;

      --blue-cone: rgba(74, 86, 255, 0.82);
      --green-cone: rgba(36, 210, 116, 0.78);
      --red-cone: rgba(255, 92, 48, 0.76);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    #fit {
      width: 100%;
    }

    #app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 2px 14px;
      text-align: center;
    }

    .response-summary {
      width: 100%;
      padding: 0;
    }

    .response-label {
      color: var(--muted);
      font-size: clamp(13px, 3.8vw, 16px);
      font-weight: 400;
      line-height: 1.15;
      text-align: center;
      white-space: nowrap;
    }

    .response-value-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 31px;
      margin-top: 2px;
    }

    .response-value {
      margin-top: 2px;
      color: var(--ink);
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 400;
      line-height: 1.1;
      text-align: center;
      white-space: nowrap;
    }

    .response-value.is-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      min-height: 31px;
      margin-top: 2px;
      font-size: inherit;
    }

    .cone-loader {
      position: relative;
      width: 52px;
      height: 22px;
      margin: 0 auto;
      overflow: visible;
      isolation: isolate;
    }

    .cone {
      position: absolute;
      bottom: 1px;
      width: 16px;
      height: 19px;
      opacity: 0;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      filter: drop-shadow(0 1px 2px rgba(21, 21, 21, 0.07));
      mix-blend-mode: multiply;
      will-change: opacity;
    }

    .cone.blue {
      left: 13px;
      background: var(--blue-cone);
      animation: blueConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }
    
    .cone.green {
      left: 23px;
      background: var(--green-cone);
      animation: greenConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }
    
    .cone.red {
      left: 28px;
      background: var(--red-cone);
      animation: redConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .loader-text {
      margin: 0;
      color: var(--muted);
      font-size: 9px;
      font-weight: 400;
      line-height: 1.05;
      text-align: center;
      animation: loadingTextPulse 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    @keyframes blueConeCycle {
      0% { opacity: 0; }
      12% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes greenConeCycle {
      0% { opacity: 0; }
      20% { opacity: 0; }
      32% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes redConeCycle {
      0% { opacity: 0; }
      40% { opacity: 0; }
      52% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes loadingTextPulse {
      0% { opacity: 0.45; }
      52% { opacity: 0.78; }
      76% { opacity: 0.78; }
      87% { opacity: 0.45; }
      100% { opacity: 0.45; }
    }

    .response-summary::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: 5px;
      background: linear-gradient(
        90deg,
        #fff 0%,
        rgba(102, 0, 255, 0.16) 24%,
        var(--purple) 50%,
        rgba(102, 0, 255, 0.16) 76%,
        #fff 100%
      );
    }



    .error {
      color: var(--muted);
      font-size: 18px;
    }

    @media (prefers-reduced-motion: reduce) {
      .cone.blue,
      .cone.green,
      .cone.red {
        animation: none;
        opacity: 1;
      }

      .loader-text {
        animation: none;
        opacity: 0.72;
      }
    }

    @media (max-width: 430px) {
      #app {
        padding: 12px 1px 12px;
      }

      .response-value.is-loading {
        min-width: 76px;
        min-height: 50px;
      }

      .cone-loader {
        width: 76px;
        height: 33px;
      }

      .cone {
        width: 24px;
        height: 28px;
      }

      .cone.blue {
        left: 17px;
      }

      .cone.green {
        left: 32px;
      }

      .cone.red {
        left: 39px;
      }

      .loader-text {
        font-size: 8.5px;
      }


    }
  </style>
</head>

<body>
  <div id="fit">
    <main id="app">
      <section class="response-summary" aria-live="polite">
        <div class="response-label">
          Last updated
        </div>

        <div class="response-value-row">
          <div id="second-date" class="response-value is-loading">
            <div class="cone-loader" role="status" aria-label="Loading">
              <div class="cone blue" aria-hidden="true"></div>
              <div class="cone green" aria-hidden="true"></div>
              <div class="cone red" aria-hidden="true"></div>
            </div>

            <div class="loader-text">Loading...</div>
          </div>
        </div>

      
      </section>
    </main>
  </div>

  <script>
    const SPREADSHEET_ID = '1gdLoeP2VKwv6ctpLsmXKZiMWybCgc987ucFgTIU4jEc';
    const SHEET_GID = '0';
    const DATE_RANGE = 'D:D';

    const secondDate = document.getElementById('second-date');

    function showSecondDate(value, isError = false) {
      secondDate.classList.remove('is-loading');
      secondDate.textContent = value || '—';
      secondDate.classList.toggle('error', isError);
    }

    function parseDisplayedDate(value) {
      const text = String(value || '').trim();

      if (!text) return null;

      const match = text.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);

      if (!match) return null;

      const day = Number(match[1]);
      const month = Number(match[2]);
      let year = Number(match[3]);

      if (year < 100) {
        year += 2000;
      }

      if (
        !Number.isInteger(day) ||
        !Number.isInteger(month) ||
        !Number.isInteger(year) ||
        day < 1 ||
        day > 31 ||
        month < 1 ||
        month > 12
      ) {
        return null;
      }

      const date = new Date(year, month - 1, day);

      if (
        date.getFullYear() !== year ||
        date.getMonth() !== month - 1 ||
        date.getDate() !== day
      ) {
        return null;
      }

      return {
        text,
        time: date.getTime()
      };
    }

    function getCellDisplayValue(cell) {
      if (!cell) return '';

      return String(cell.f ?? cell.v ?? '').trim();
    }

    function getSecondMostRecentDate(response) {
      const rows = response?.table?.rows || [];

      const dates = rows
        .map(row => getCellDisplayValue(row?.c?.[0]))
        .map(parseDisplayedDate)
        .filter(Boolean)
        .sort((a, b) => b.time - a.time);

      if (dates.length < 2) {
        return '—';
      }

      return dates[1].text;
    }

    function loadSecondMostRecentDate() {
      const callbackName = `pffSecondDateCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
      const script = document.createElement('script');

      const timeout = window.setTimeout(() => {
        cleanup();
        showSecondDate('—', true);
      }, 10000);

      function cleanup() {
        window.clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      window[callbackName] = response => {
        cleanup();

        if (response?.status === 'error') {
          showSecondDate('—', true);
          return;
        }

        showSecondDate(getSecondMostRecentDate(response));
      };

      script.onerror = () => {
        cleanup();
        showSecondDate('—', true);
      };

      const params = new URLSearchParams({
        gid: SHEET_GID,
        range: DATE_RANGE,
        headers: '0',
        tqx: `responseHandler:${callbackName}`
      });

      script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
      document.body.appendChild(script);
    }

    loadSecondMostRecentDate();

    // Refresh while the embedded Google Sites page remains open.
    window.setInterval(loadSecondMostRecentDate, 60000);
  </script>
</body>
</html>
