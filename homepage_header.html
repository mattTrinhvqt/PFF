<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --purple: #6600ff;
      --purple-soft: #f4efff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
      --live-red: #e53935;

      --blue-cone: rgba(74, 86, 255, 0.82);
      --green-cone: rgba(36, 210, 116, 0.78);
      --red-cone: rgba(255, 92, 48, 0.76);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    #fit {
      width: 100%;
      height: auto;
      overflow: hidden;
    }

    #app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 12px 4px 0;
    }

    /* ---------- Live contribution count ---------- */

    .response-summary {
      width: 100%;
      padding: 0;
    }

    .response-label {
      color: var(--muted);
      font-size: clamp(13px, 3.8vw, 16px);
      font-weight: 400;
      line-height: 1.15;
      text-align: center;
      white-space: nowrap;
    }
    .response-value-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      margin-top: 4px;
    }

    .response-value {
      color: var(--ink);
      font-size: clamp(30px, 8vw, 42px);
      font-weight: 400;
      line-height: 1.1;
      text-align: center;
      white-space: nowrap;
    }
    .response-value.is-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      min-height: 31px;
      margin-top: 2px;
      font-size: inherit;
    }

    .cone-loader {
      position: relative;
      width: 82px;
      height: 34px;
      margin: 0 auto;
      overflow: visible;
      isolation: isolate;
    }

    .cone {
      position: absolute;
      bottom: 2px;
      width: 26px;
      height: 30px;
      opacity: 0;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      filter: drop-shadow(0 1px 2px rgba(21, 21, 21, 0.07));
      mix-blend-mode: multiply;
      will-change: opacity;
    }

    .cone.blue {
      left: 18px;
      background: var(--blue-cone);
      animation: blueConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.green {
      left: 34px;
      background: var(--green-cone);
      animation: greenConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.red {
      left: 42px;
      background: var(--red-cone);
      animation: redConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .loader-text {
      margin: -1px 0 0;
      color: var(--muted);
      font-size: 7.5px;
      font-weight: 400;
      line-height: 1;
      text-align: center;
      animation: loadingTextPulse 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    @keyframes blueConeCycle {
      0% {
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes greenConeCycle {
      0% {
        opacity: 0;
      }

      20% {
        opacity: 0;
      }

      32% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes redConeCycle {
      0% {
        opacity: 0;
      }

      40% {
        opacity: 0;
      }

      52% {
        opacity: 1;
      }

      76% {
        opacity: 1;
      }

      87% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes loadingTextPulse {
      0% {
        opacity: 0.45;
      }

      52% {
        opacity: 0.78;
      }

      76% {
        opacity: 0.78;
      }

      87% {
        opacity: 0.45;
      }

      100% {
        opacity: 0.45;
      }
    }
    .gradient-line {
      width: 100%;
      height: 1px;
      margin-top: 10px;
      background: linear-gradient(
        90deg,
        #fff 0%,
        rgba(102, 0, 255, 0.14) 24%,
        var(--purple) 50%,
        rgba(102, 0, 255, 0.14) 76%,
        #fff 100%
      );
    }

    .live-data {
      position: absolute;
      right: 1px;
      bottom: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 0;
      padding: 0;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }

    .live-data-dot {
      width: 6px;
      height: 6px;
      flex: 0 0 6px;
      border-radius: 50%;
      background: var(--live-red);
    }

    /* ---------- Contribution buttons ---------- */

    .actions {
      display: grid;
      gap: 12px;
      width: 100%;
      margin-top: 24px;
    }

    .contribute-button {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      width: 100%;
      min-height: 38px;
      padding: 0 12px;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.2;
      text-align: left;
      text-decoration: none;
      transition: background-color 120ms ease, color 120ms ease;
    }

    .contribute-button:hover,
    .contribute-button:focus-visible {
      color: #fff;
      background: var(--ink);
      outline: none;
    }

    .button-icon {
      color: var(--purple);
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      text-align: center;
      transition: color 120ms ease;
    }

    .button-label {
      min-width: 0;
    }



    .contribute-button:hover .button-icon,
    .contribute-button:focus-visible .button-icon {
      color: #fff;
    }
    .anonymous-note {
      max-width: 430px;
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
    }

    .error {
      color: var(--muted);
      font-size: 18px;
    }

    @media (max-width: 430px) {
      #app {
        padding: 10px 2px 0;
      }

      .response-value {
        font-size: 36px;
      }

      .contribute-button {
        min-height: 38px;
        font-size: 14px;
      }
      .anonymous-note {
        font-size: 13px;
      }      
      .response-value.is-loading {
        min-width: 76px;
        min-height: 50px;
      }

      .cone-loader {
        width: 76px;
        height: 33px;
      }

      .cone {
        width: 24px;
        height: 28px;
      }

      .cone.blue {
        left: 17px;
      }

      .cone.green {
        left: 32px;
      }

      .cone.red {
        left: 39px;
      }

      .loader-text {
        font-size: 8.5px;
      }
    }
  </style>
</head>

<body>
  <div id="fit">
    <main id="app">
      <section class="response-summary" aria-live="polite">
        <div class="response-label">
          ♡ Data contributions and counting...
        </div>

        <div class="response-value-row">
          <div id="contribution-count" class="response-value is-loading">
            <div class="cone-loader" role="status" aria-label="Loading">
              <div class="cone blue" aria-hidden="true"></div>
              <div class="cone green" aria-hidden="true"></div>
              <div class="cone red" aria-hidden="true"></div>
            </div>

            <div class="loader-text">Loading...</div>
          </div>

          <div class="live-data" aria-label="Live data">
            <span class="live-data-dot" aria-hidden="true"></span>
            <span>LIVE data</span>
          </div>
        </div>

        <div class="gradient-line" aria-hidden="true"></div>
      </section>

      <nav class="actions" aria-label="Contribution options">
        <a
          class="contribute-button"
          href="https://www.phoropterfreefridays.org/Income"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="button-icon" aria-hidden="true">$</span>
          <span class="button-label">Contribute income data</span>
        </a>

        <a
          class="contribute-button"
          href="https://www.phoropterfreefridays.org/WorkplacePromoterScore"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="button-icon" aria-hidden="true">☆</span>
          <span class="button-label">Workplace Promoter Score</span>
        </a>
      </nav>

      <p class="anonymous-note">Your data is anonymous</p>
    </main>
  </div>

  <script>
    const SPREADSHEET_ID = '1G3BV5lA_jaRPRR3ZmFWL-j8nRVWk5k01D-gOeO5nVgQ';
    const SHEET_GID = '0';
    const CONTRIBUTION_CELL = 'BU14';

    const contributionCount = document.getElementById('contribution-count');

    function showContributionCount(value, isError = false) {
      contributionCount.classList.remove('is-loading');
      contributionCount.textContent = value || '—';
      contributionCount.classList.toggle('error', isError);
    }

    function getCellDisplayValue(response) {
      const cell = response?.table?.rows?.[0]?.c?.[0];

      if (!cell) {
        return '—';
      }

      return String(cell.f ?? cell.v ?? '').trim() || '—';
    }

    function loadContributionCount() {
      const callbackName = `pffContributionCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
      const script = document.createElement('script');

      const timeout = window.setTimeout(() => {
        cleanup();
        showContributionCount('—', true);
      }, 10000);

      function cleanup() {
        window.clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      window[callbackName] = response => {
        cleanup();

        if (response?.status === 'error') {
          showContributionCount('—', true);
          return;
        }

        showContributionCount(getCellDisplayValue(response));
      };

      script.onerror = () => {
        cleanup();
        showContributionCount('—', true);
      };

      const params = new URLSearchParams({
        gid: SHEET_GID,
        range: CONTRIBUTION_CELL,
        headers: '0',
        tqx: `responseHandler:${callbackName}`
      });

      script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
      document.body.appendChild(script);
    }

    loadContributionCount();

    // Refresh while the embedded Google Sites page remains open.
    window.setInterval(loadContributionCount, 60000);
  </script>
</body>
</html>
