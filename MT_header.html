<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --blue: #2596be;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
      --live-red: #e53935;

      --blue-cone: rgba(74, 86, 255, 0.82);
      --green-cone: rgba(36, 210, 116, 0.78);
      --red-cone: rgba(255, 92, 48, 0.76);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow: hidden;
    }

    #fit {
      width: 100%;
      overflow: hidden;
    }

    #app {
      width: 100%;
      margin: 0;
      padding: 0 2px;
    }

    #app.is-loading .metrics-grid,
    #app.is-loading #status {
      display: none;
    }

    #app:not(.is-loading) .app-loading {
      display: none;
    }

    .app-loading {
      width: 100%;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .cone-loader {
      position: relative;
      width: 176px;
      height: 78px;
      margin: 0 auto;
      overflow: visible;
      isolation: isolate;
    }

    .cone {
      position: absolute;
      bottom: 8px;
      width: 58px;
      height: 68px;
      opacity: 0;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      -webkit-clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      filter: none;
      mix-blend-mode: normal;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
      will-change: opacity;
    }

    .cone.blue {
      left: 33px;
      background: var(--blue-cone);
      animation: blueConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.green {
      left: 69px;
      background: var(--green-cone);
      animation: greenConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.red {
      left: 85px;
      background: var(--red-cone);
      animation: redConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .loader-text {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      line-height: 1.35;
      text-align: center;
      animation: loadingTextPulse 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    @keyframes blueConeCycle {
      0% { opacity: 0; }
      12% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes greenConeCycle {
      0% { opacity: 0; }
      20% { opacity: 0; }
      32% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes redConeCycle {
      0% { opacity: 0; }
      40% { opacity: 0; }
      52% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes loadingTextPulse {
      0% { opacity: 0.45; }
      52% { opacity: 0.78; }
      76% { opacity: 0.78; }
      87% { opacity: 0.45; }
      100% { opacity: 0.45; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cone.blue,
      .cone.green,
      .cone.red {
        animation: none;
        opacity: 1;
      }

      .loader-text {
        animation: none;
        opacity: 0.72;
      }
    }
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 40px 28px;
      width: 100%;
      margin-top: 30px;
    }

    .metric-card {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-width: 0;
      min-height: 0;
      padding: 0;
      text-align: center;
    }

    .metric-card::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: 5px;
      background: linear-gradient(
        90deg,
        #fff 0%,
        rgba(37, 150, 190, 0.18) 24%,
        var(--blue) 50%,
        rgba(37, 150, 190, 0.18) 76%,
        #fff 100%
      );
    }

    .years-card {
      grid-column: 1 / -1;
    }

    .years-card::after {
      background: linear-gradient(
        90deg,
        #fff 0%,
        rgba(21, 21, 21, 0.16) 24%,
        var(--ink) 50%,
        rgba(21, 21, 21, 0.16) 76%,
        #fff 100%
      );
    }

    .metric-label {
      color: var(--muted);
      font-size: clamp(13px, 3.8vw, 16px);
      font-weight: 400;
      line-height: 1.15;
      text-align: center;
    }

    .metric-value {
      margin-top: 2px;
      color: var(--ink);
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 400;
      line-height: 1.1;
      white-space: nowrap;
    }

    .metric-card:not(.years-card) .metric-value {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 31px;
    }

    .metric-value.loading {
      margin-top: 2px;
      color: var(--ink);
      font-size: 10px;
      font-weight: 400;
      line-height: 1;
    }

    .metric-value-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 31px;
      margin-top: 2px;
    }

    .live-data {
      position: absolute;
      right: 1px;
      bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 0;
      padding: 0;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }

    .live-data-dot {
      width: 6px;
      height: 6px;
      flex: 0 0 6px;
      border-radius: 50%;
      background: var(--live-red);
    }

    #status {
      margin: 14px 8px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    #status[hidden] {
      display: none;
    }

    @media (max-width: 430px) {
      #app {
        padding: 0 1px;
      }

      .metrics-grid {
        gap: 20px 16px;
        margin-top: 30px;
      }

      .app-loading {
        min-height: 175px;
      }

      .cone-loader {
        width: 160px;
        height: 70px;
      }

      .cone {
        width: 52px;
        height: 61px;
      }

      .cone.blue {
        left: 30px;
      }

      .cone.green {
        left: 64px;
      }

      .cone.red {
        left: 78px;
      }

      .loader-text {
        font-size: 10px;
      }      
    }
  </style>
</head>

<body>
  <div id="fit">
    <main id="app" class="is-loading">
      <div id="loading-state" class="app-loading" role="status" aria-label="Loading">
        <div class="cone-loader">
          <div class="cone blue" aria-hidden="true"></div>
          <div class="cone green" aria-hidden="true"></div>
          <div class="cone red" aria-hidden="true"></div>
        </div>

        <div class="loader-text">Loading...</div>
      </div>

      <section class="metrics-grid" aria-live="polite">

        <article class="metric-card years-card">
          <div class="metric-label">Post-doc research years (FTE):</div>

          <div class="metric-value-row">
            <div id="postdoc-years" class="metric-value loading"></div>

            <div class="live-data" aria-label="Live data">
              <span class="live-data-dot" aria-hidden="true"></span>
              <span>LIVE data</span>
            </div>
          </div>
        </article>

        <article class="metric-card">
          <div class="metric-label">Total papers:</div>
          <div id="total-papers" class="metric-value loading"></div>
        </article>

        <article class="metric-card">
          <div class="metric-label">Invited seminars:</div>
          <div id="invited-seminars" class="metric-value loading"></div>
        </article>

        <article class="metric-card">
          <div class="metric-label">Q1 ophthalmology papers:</div>
          <div id="q1-ophthalmology-papers" class="metric-value loading"></div>
        </article>

        <article class="metric-card">
          <div class="metric-label">Conference abstracts:</div>
          <div id="conference-abstracts" class="metric-value loading"></div>
        </article>

        <article class="metric-card">
          <div class="metric-label">Lead or senior author papers:</div>
          <div id="lead-or-senior-papers" class="metric-value loading"></div>
        </article>

        <article class="metric-card">
          <div class="metric-label">Students supervised to completion:</div>
          <div id="students-supervised" class="metric-value loading"></div>
        </article>

      </section>

      <p id="status" role="alert" hidden></p>
    </main>
  </div>

  <script>
    const SPREADSHEET_ID = '1q178iloV2pfuMX08heHgGMU96cZkg_Yv-Z6KD1PajPM';
    const SHEET_GID = '0';
    const MIN_LOADING_MS = 3000;
  
    const loadingStartedAt = Date.now();
  
    const app = document.getElementById('app');
    const loadingState = document.getElementById('loading-state');
  
    function hideLoadingState() {
      app.classList.remove('is-loading');
      loadingState.setAttribute('aria-hidden', 'true');
    }
  
    function hideLoadingStateAfterMinimum() {
      const elapsed = Date.now() - loadingStartedAt;
      const remaining = Math.max(0, MIN_LOADING_MS - elapsed);
  
      window.setTimeout(() => {
        hideLoadingState();
      }, remaining);
    }
  
    const metricIds = {
      postDocYears: 'postdoc-years',
      totalPapers: 'total-papers',
      q1OphthalmologyPapers: 'q1-ophthalmology-papers',
      leadOrSeniorPapers: 'lead-or-senior-papers',
      invitedSeminars: 'invited-seminars',
      conferenceAbstracts: 'conference-abstracts',
      studentsSupervised: 'students-supervised'
    };
  
    function getCellDisplayValue(cell) {
      if (!cell) return '';
      return String(cell.f ?? cell.v ?? '').trim();
    }
  
    function getCellNumericValue(cell) {
      if (!cell) return NaN;
      return Number(cell.v ?? cell.f);
    }
  
    function loadGvizRange(range) {
      return new Promise((resolve, reject) => {
        const callbackName = `academicMetricsCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');
  
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Could not load data'));
        }, 10000);
  
        function cleanup() {
          window.clearTimeout(timeout);
  
          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }
  
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
  
        window[callbackName] = response => {
          cleanup();
  
          if (response?.status === 'error') {
            reject(new Error(response?.errors?.[0]?.detailed_message || 'Could not load Google Sheet data'));
            return;
          }
  
          resolve(response);
        };
  
        script.onerror = () => {
          cleanup();
          reject(new Error('Could not load data'));
        };
  
        const params = new URLSearchParams({
          gid: SHEET_GID,
          range,
          headers: '0',
          tqx: `responseHandler:${callbackName}`
        });
  
        script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
        document.body.appendChild(script);
      });
    }
  
    function normaliseDashboard(postDocResponse, metricsResponse) {
      const postDocCell = postDocResponse?.table?.rows?.[0]?.c?.[0];
      const postDocNumeric = getCellNumericValue(postDocCell);
  
      const metricRows = metricsResponse?.table?.rows || [];
  
      const valueFromMetricRow = index => {
        return getCellDisplayValue(metricRows?.[index]?.c?.[0]) || '—';
      };
  
      return {
        postDocYears: Number.isFinite(postDocNumeric)
          ? postDocNumeric.toFixed(2)
          : getCellDisplayValue(postDocCell) || '—',
  
        q1OphthalmologyPapers: valueFromMetricRow(0), // O4
        totalPapers: valueFromMetricRow(1),           // O5
        leadOrSeniorPapers: valueFromMetricRow(2),    // O6
        conferenceAbstracts: valueFromMetricRow(3),   // O7
        invitedSeminars: valueFromMetricRow(4),       // O8
        studentsSupervised: valueFromMetricRow(6)     // O10
      };
    }
  
    function renderDashboard(data) {
      Object.entries(metricIds).forEach(([key, id]) => {
        const target = document.getElementById(id);
  
        target.textContent = data[key] || '—';
        target.classList.remove('loading');
      });
  
      hideLoadingStateAfterMinimum();
    }
  
    function showError(error) {
      Object.values(metricIds).forEach(id => {
        const target = document.getElementById(id);
  
        target.textContent = '—';
        target.classList.remove('loading');
      });
  
      const status = document.getElementById('status');
      status.hidden = false;
      status.textContent =
        `Unable to load metrics: ${error.message || error}`;
  
      hideLoadingStateAfterMinimum();
    }
  
    async function loadDashboard() {
      try {
        const [postDocResponse, metricsResponse] = await Promise.all([
          loadGvizRange('U2'),
          loadGvizRange('O4:O10')
        ]);
  
        renderDashboard(
          normaliseDashboard(postDocResponse, metricsResponse)
        );
      } catch (error) {
        showError(error);
      }
    }
  
    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
