<!DOCTYPE html>
<html>
<head>
  <script>
    /* --- Visual scale toggle (set true/false) --- */
    const ENABLE_SCALE = false;

    let scaleTimer = null;

    function scheduleApplyScale() {
      if (!ENABLE_SCALE) return;
      clearTimeout(scaleTimer);

      scaleTimer = setTimeout(() => {
        requestAnimationFrame(applyScale);
      }, 80);
    }

    function applyScale() {
      const app = document.getElementById('app');
      const fit = document.getElementById('fit');
      if (!app || !fit) return;

      if (!ENABLE_SCALE) {
        app.style.transform = 'none';
        fit.style.minHeight = '100vh';
        fit.style.width = '100%';
        return;
      }

      const prevTransform = app.style.transform;
      app.style.transform = 'none';

      let sizer = document.getElementById('appSizer');
      if (!sizer) {
        sizer = app.cloneNode(true);
        sizer.id = 'appSizer';
        document.body.appendChild(sizer);
      } else {
        sizer.innerHTML = app.innerHTML;
      }

      Object.assign(sizer.style, {
        position: 'absolute',
        left: '-99999px',
        top: '0',
        transform: 'none',
        visibility: 'hidden',
        pointerEvents: 'none',
        display: 'block',
        width: getComputedStyle(app).width
      });

      const sResults = sizer.querySelector('#results');
      const sOut = sizer.querySelector('#out');

      if (sResults) sResults.style.display = 'block';
      if (sOut) sOut.textContent = 'Calculating…';

      const NAT_W = sizer.offsetWidth || app.offsetWidth || 1;
      const NAT_H = sizer.offsetHeight || app.offsetHeight || 1;

      app.style.transform = prevTransform;

      const vw = document.documentElement.clientWidth || window.innerWidth;
      const vh = window.innerHeight;

      const scale = Math.min(vw / NAT_W, vh / NAT_H, 1);

      app.style.transform = `scale(${scale})`;
      fit.style.width = '100%';
      fit.style.minHeight = Math.max(Math.ceil(NAT_H * scale), vh) + 'px';
    }

    window.addEventListener('load', scheduleApplyScale);
    window.addEventListener('resize', scheduleApplyScale);
    window.addEventListener('orientationchange', scheduleApplyScale);
    window.addEventListener('pageshow', scheduleApplyScale);
  </script>

  <meta charset="utf-8">
  <title>Casual Optom Income Estimator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
      --track: #e8eaf0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
      background: #fff;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #fit {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100dvh;
      width: 100%;
    }

    .box {
      width: min(calc(100% - 24px), 520px);
      max-width: 100%;
      min-width: 0;
      margin-inline: auto;
      padding: 20px 18px 28px;
      text-align: center;

    #app {

    .calculator-notice {

      margin: 0 0 8px;

      line-height: 1.45;
      text-align: center;
    }

    .calculator-notice p {

    }

    .calculator-notice p + p {
      margin-top: 2px;
    }

    #modelMeta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .calculator-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 14px;
      text-align: left;
    }

    .field {
      margin: 0;
    }

    .field label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.25;
      text-align: center;
    }

    .field label small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.3;
    }

    .field label small a {
      color: var(--purple);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      text-decoration: underline;
    }

    .field input[type="number"],
    .field select {
      display: block;
      width: 100%;
      height: 38px;
      margin: 6px auto 0;
      padding: 0 3px;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--muted);
      border-radius: 0;
      font: inherit;
      font-size: 16px;
      text-align: center;

    }

    .field input[type="number"]:focus,

      border-bottom-color: var(--ink);
    }

    select {
      text-align-last: center;
      -moz-text-align-last: center;

    input[type="number"]::-webkit-inner-spin-button,

      margin: 0;
      -webkit-appearance: none;
    }

    #estimateBtn {
      display: block;
      width: 100%;
      min-height: 38px;
      margin: 0 auto;
      padding: 0 12px;
      color: var(--ink);
      background: transparent;

      border-radius: 6px;
      font: inherit;
      font-size: 14px;
      font-weight: 400;

    #estimateBtn:hover {

      background: var(--ink);
    }

    button:disabled {

    }

    #out {
      min-height: 0;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      text-align: left;
    }

    #out:empty {
      display: none;
    }

    #results {
      position: relative;
      display: none;
      grid-column: 1 / -1;
      margin-top: 12px;
      padding-top: 22px;
      border-top: 1px solid var(--track);
      text-align: left;
    }
    
    #resultsStatus {
      display: none;
      position: absolute;
      top: -12px;
      right: 0;
      left: 0;
      color: var(--muted);
      background: #fff;
      font-size: 14px;
      line-height: 1.45;
      text-align: left;
    }
    
    #results.show-status {
      border-top-color: transparent;
    }
    
    #results.show-status #resultsStatus {
      display: block;
    }

    .results-section-label {
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
    }

    .scale {
      --trackY: 32px;
      --barH: 6px;
      --gapValue: 6px;
      --gapLabel: 7px;

      position: relative;
      margin-top: 16px;
      padding: 40px 0 46px;
    }

    .scale .track {
      position: absolute;
      top: var(--trackY);
      right: 0;
      left: 0;
      height: var(--barH);
      background: var(--track);
      border-radius: 0;
    }

    .scale .tick {
      --stemUp: 20px;
      --stemDown: 18px;

      position: absolute;
      top: calc(var(--trackY) + var(--barH) / 2);
      transform: translateX(-50%);
      text-align: center;
    }

    .scale .t20,
    .scale .t80 {
      --stemUp: 17px;
      --stemDown: 16px;
    }

    .scale .t5,
    .scale .t95 {
      --stemUp: 14px;
      --stemDown: 14px;
    }

    .scale .tick .stem {
      position: absolute;
      top: calc(-1 * var(--stemUp));
      left: 50%;
      width: 0;
      height: calc(var(--stemUp) + var(--stemDown));
      transform: translateX(-50%);
      border-left: 3px solid var(--muted);
    }

    .scale .t50 .stem {
      border-left-width: 4px;
      border-left-color: var(--purple);
    }

    .scale .t5 .stem,
    .scale .t95 .stem {
      border-left-width: 2px;
    }

    .scale .tick .value {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, calc(-100% - var(--stemUp) - var(--gapValue)));
      color: var(--ink);
      font-size: 13px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      white-space: nowrap;
    }

    .scale .tick .label {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, calc(var(--stemDown) + var(--gapLabel)));
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
    }

    .scale .t50 .value,
    .scale .t50 .label {
      color: var(--purple);
      font-size: 16px;
      font-weight: 700;
    }

    .scale .t20 .value,
    .scale .t80 .value {
      font-size: 12px;
    }

    .scale .t5 .value,
    .scale .t95 .value {
      font-size: 11px;
    }

    .caption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    .warn {
      color: #b42318;
    }

    @media (max-width: 430px) {
      .box {
        width: calc(100% - 24px);
        padding: 18px 14px 26px;
      }

      .calculator-form {
        gap: 16px;
        margin-top: 12px;
      }

      .field label {
        font-size: 12px;
      }

      .field label small a {
        font-size: 12px;
      }

      .field input[type="number"],
      .field select {
        height: 36px;
        margin-top: 6px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <script>
    /**********************
     * CONFIG
     **********************/
    const SPREADSHEET_ID = '1UZizMV2CNlyNbKytN4QCSc4HcsKCx-PxOrboJyMCN1E';
    const SHEET_NAME = 'Data';

    const MMM_TREAT_AS_CATEGORICAL = false;
    const STATE_LEVELS = ['NSW', 'QLD', 'ACT', 'VIC', 'SA', 'NT', 'WA', 'TAS'];

    const Z_TWO_SIDED_95 = 1.96;

    const Z_P05 = -1.64485;
    const Z_P20 = -0.84162;
    const Z_P50 = 0.00000;
    const Z_P80 = 0.84162;
    const Z_P95 = 1.64485;

    const out = document.getElementById('out');
    const estimateBtn = document.getElementById('estimateBtn');
    const resultsStatus = document.getElementById('resultsStatus');
    const AUFMT = new Intl.NumberFormat('en-AU');
    
    let cachedModel = null;
    let hasPreviousResults = false;
    let numberAnimationToken = 0;
    
    const NUMBER_ANIMATION_MS = 500;

    function round0(x) {
      if (x === null || x === undefined || isNaN(x)) return '–';
      return AUFMT.format(Math.round(Number(x)));
    }

    function fmtDollarsInt(x) {
      if (x === null || x === undefined || isNaN(x)) return '–';
      return '$' + AUFMT.format(Math.round(Number(x)));
    }

    function animateNumber(
      elementId,
      targetValue,
      formatter,
      animate,
      token
    ) {
      const element = document.getElementById(elementId);
      const target = Number(targetValue);
    
      if (!Number.isFinite(target)) {
        element.textContent = '–';
        delete element.dataset.numericValue;
        return;
      }
    
      const start = Number(element.dataset.numericValue);
    
      const reduceMotion =
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    
      const shouldAnimate =
        animate &&
        Number.isFinite(start) &&
        start !== target &&
        !reduceMotion;
    
      if (!shouldAnimate) {
        element.textContent = formatter(target);
        element.dataset.numericValue = String(target);
        return;
      }
    
      const startedAt = performance.now();
    
      function frame(now) {
        if (token !== numberAnimationToken) return;
    
        const progress = Math.min(
          (now - startedAt) / NUMBER_ANIMATION_MS,
          1
        );
    
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = start + (target - start) * eased;
    
        element.textContent = formatter(current);
        element.dataset.numericValue = String(current);
    
        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          element.textContent = formatter(target);
          element.dataset.numericValue = String(target);
        }
      }
    
      requestAnimationFrame(frame);
    }
    
    function renderPercentileScale(res, animateNumbers = false) {
      const [p05, p20, p50, p80, p95] =
        [res.p05, res.p20, res.p50, res.p80, res.p95].map(Number);
    
      const P_MIN = 5;
      const P_MAX = 95;
      const P_SPAN = P_MAX - P_MIN;
    
      const posPct = p => ((p - P_MIN) / P_SPAN) * 100;
      const token = ++numberAnimationToken;
    
      document.querySelector('.t5').style.left = posPct(5) + '%';
      document.querySelector('.t20').style.left = posPct(20) + '%';
      document.querySelector('.t50').style.left = posPct(50) + '%';
      document.querySelector('.t80').style.left = posPct(80) + '%';
      document.querySelector('.t95').style.left = posPct(95) + '%';
    
      animateNumber('p05v', p05, round0, animateNumbers, token);
      animateNumber('p20v', p20, round0, animateNumbers, token);
      animateNumber('p50v', p50, fmtDollarsInt, animateNumbers, token);
      animateNumber('p80v', p80, round0, animateNumbers, token);
      animateNumber('p95v', p95, round0, animateNumbers, token);
    }

    function loadGvizData() {
      return new Promise((resolve, reject) => {
        const callbackName = `casualEstimatorSheetCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');

        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Could not load Google Sheet data'));
        }, 15000);

        function cleanup() {
          window.clearTimeout(timeout);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = response => {
          cleanup();

          if (response?.status === 'error') {
            reject(new Error(response?.errors?.[0]?.detailed_message || 'Could not load Google Sheet data'));
            return;
          }

          resolve(response);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Could not load Google Sheet data'));
        };

        // Pull only the needed columns:
        // B = rate, C = years, E = MMM, I = state.
        const tq = 'select B,C,E,I where B is not null';

        const params = new URLSearchParams({
          sheet: SHEET_NAME,
          headers: '1',
          tq,
          tqx: `responseHandler:${callbackName}`
        });

        script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
        document.body.appendChild(script);
      });
    }

    function getCellDisplayValue(cell) {
      if (!cell) return '';
      return String(cell.f ?? cell.v ?? '').trim();
    }

    function getCellRawValue(cell) {
      if (!cell) return '';
      return cell.v ?? cell.f ?? '';
    }

    function normaliseRowsFromGviz(response) {
      const rows = response?.table?.rows || [];

      return rows.map(row => {
        const cells = row?.c || [];

        return {
          rate: toNum(getCellRawValue(cells[0])),
          yearsRaw: toNum(getCellRawValue(cells[1])),
          mmm: toInt(getCellRawValue(cells[2])),
          state: getCellDisplayValue(cells[3]).trim().toUpperCase()
        };
      });
    }

    function loadModel() {
      document.getElementById('modelMeta').textContent = 'Loading model…';

      loadGvizData()
        .then(response => {
          const rawRows = normaliseRowsFromGviz(response);
          cachedModel = buildModel(rawRows);

          document.getElementById('modelMeta').textContent = 'MLR (OLS) model loaded';
          scheduleApplyScale();
        })
        .catch(err => {
          cachedModel = null;

          document.getElementById('modelMeta').innerHTML =
            '<span class="warn">Model error: ' + err.message + '</span>';

          scheduleApplyScale();
        });
    }

    async function estimate() {
      const years = parseFloat(
        document.getElementById('years').value
      );
    
      const mmm = parseInt(
        document.getElementById('mmm').value,
        10
      );
    
      const state =
        document.getElementById('state').value.trim();
    
      if (
        !isFinite(years) ||
        years < 0 ||
        !isFinite(mmm) ||
        mmm < 1 ||
        mmm > 7
      ) {
        alert('Please enter valid years and MMM (1–7).');
        return;
      }
    
      if (!state) {
        alert('Please select a State/territory.');
        return;
      }
    
      const resultsEl = document.getElementById('results');
      const hadPreviousResults = hasPreviousResults;
    
      if (!hadPreviousResults) {
        resultsEl.style.display = 'none';
        out.textContent = 'Calculating…';
      } else {
        out.textContent = '';
        resultsStatus.textContent = 'Calculating…';
        resultsEl.classList.add('show-status');
      }
    
      estimateBtn.disabled = true;
    
      scheduleApplyScale();
    
      try {
        /*
         * Allow the browser to display Calculating… before running
         * the local prediction.
         */
        await new Promise(resolve => {
          requestAnimationFrame(() => {
            requestAnimationFrame(resolve);
          });
        });
    
        if (!cachedModel) {
          throw new Error('Model has not loaded yet.');
        }
    
        const res = predict({
          years,
          mmm,
          state
        }, cachedModel);
    
        resultsEl.classList.remove('show-status');
        resultsStatus.textContent = '';
        out.textContent = '';
    
        resultsEl.style.display = 'block';
    
        renderPercentileScale(res, hadPreviousResults);
        hasPreviousResults = true;
    
        scheduleApplyScale();
    
        estimateBtn.disabled = false;
        estimateBtn.textContent = 'Calculate';
      } catch (err) {
        if (hadPreviousResults) {
          out.textContent = '';
          resultsStatus.textContent = '⚠ ' + err.message;
          resultsEl.classList.add('show-status');
        } else {
          out.textContent = '⚠ ' + err.message;
        }
    
        scheduleApplyScale();
    
        estimateBtn.disabled = false;
        estimateBtn.textContent = 'Calculate';
      }
    }
    /**********************
     * MODEL
     **********************/
    function buildModel(rawRows) {
      const rows = [];

      rawRows.forEach(r => {
        const rate = toNum(r.rate);

        const yearsRaw = toNum(r.yearsRaw);
        const yearsLog = Number.isFinite(yearsRaw) && yearsRaw >= 0
          ? Math.log(1 + yearsRaw)
          : NaN;

        const mmm = toInt(r.mmm);
        const state = String(r.state ?? '').trim().toUpperCase();

        const numericOk =
          [rate, yearsLog, mmm].every(Number.isFinite) &&
          mmm >= 1 &&
          mmm <= 7;

        const stateOk = STATE_LEVELS.includes(state);

        if (numericOk && stateOk) {
          rows.push({
            rate,
            years: yearsLog,
            mmm,
            state
          });
        }
      });

      if (rows.length < 10) {
        throw new Error('Not enough valid rows (need ≥10).');
      }

      const n = rows.length;

      const stateCounts = countBy(
        rows.map(r => r.state).filter(s => s && s !== STATE_LEVELS[0])
      );

      let stateKeep = sortKeysByCountDesc(stateCounts);

      function baseP() {
        return 1 + 1 + (MMM_TREAT_AS_CATEGORICAL ? 6 : 1);
      }

      let p = baseP() + stateKeep.length;

      while (n <= p && stateKeep.length > 0) {
        stateKeep.pop();
        p = baseP() + stateKeep.length;
      }

      if (n <= p) {
        throw new Error(`Insufficient data (n=${n}, p=${p}) after pruning states.`);
      }

      const designInfo = makeDesignInfo(stateKeep);

      const X = [];
      const y = [];

      rows.forEach(r => {
        y.push(r.rate);
        X.push(buildXRow(r, designInfo));
      });

      const nFinal = y.length;
      const pFinal = X[0].length;

      if (nFinal <= pFinal) {
        throw new Error(`Insufficient data (n=${nFinal}, p=${pFinal}).`);
      }

      const Xt = transpose(X);
      const XtX = multiply(Xt, X);
      const XtX_inv = invert(XtX);
      const Xty = multiplyVec(Xt, y);
      const beta = multiplyMatVec(XtX_inv, Xty);

      const yhat = X.map(row => dot(row, beta));
      const resid = y.map((v, i) => v - yhat[i]);

      const sse = dot(resid, resid);
      const ybar = y.reduce((a, b) => a + b, 0) / n;
      const sst = y.reduce((acc, v) => acc + Math.pow(v - ybar, 2), 0);

      const r2 = 1 - (sse / sst);
      const df = n - p;
      const s2 = sse / df;

      return {
        beta,
        XtX_inv,
        s2,
        r2,
        n,
        p,
        df,
        designInfo
      };
    }

    function predict(input, model) {
      const x0 = buildX0(input, model.designInfo);

      const yhat = dot(x0, model.beta);
      const h = quadForm(model.XtX_inv, x0);

      const se_pred = Math.sqrt(model.s2 * (1 + h));

      const p05 = yhat + Z_P05 * se_pred;
      const p20 = yhat + Z_P20 * se_pred;
      const p50 = yhat + Z_P50 * se_pred;
      const p80 = yhat + Z_P80 * se_pred;
      const p95 = yhat + Z_P95 * se_pred;

      const predLo = yhat - Z_TWO_SIDED_95 * se_pred;
      const predHi = yhat + Z_TWO_SIDED_95 * se_pred;

      return {
        yhat,
        p05,
        p20,
        p50,
        p80,
        p95,
        predLo,
        predHi,
        n: model.n,
        r2: model.r2
      };
    }

    function makeDesignInfo(stateKeep) {
      const terms = ['Intercept', 'logYears'];

      if (MMM_TREAT_AS_CATEGORICAL) {
        for (let k = 2; k <= 7; k++) {
          terms.push(`MMM${k}`);
        }
      } else {
        terms.push('MMM_ordinal');
      }

      const stateRef = STATE_LEVELS[0];
      const stateDummies = (stateKeep || []).slice();

      stateDummies.forEach(s => {
        terms.push(`State_${s}`);
      });

      return {
        terms,
        mmmCategorical: MMM_TREAT_AS_CATEGORICAL,
        stateRef,
        stateDummies
      };
    }

    function buildXRow(r, designInfo) {
      const row = [1, r.years];

      if (designInfo.mmmCategorical) {
        for (let k = 2; k <= 7; k++) {
          row.push(r.mmm === k ? 1 : 0);
        }
      } else {
        row.push(r.mmm);
      }

      designInfo.stateDummies.forEach(s => {
        row.push(r.state === s ? 1 : 0);
      });

      return row;
    }

    function buildX0(input, designInfo) {
      const yearsRaw = toNum(input.years);
      const yearsLog = Number.isFinite(yearsRaw) && yearsRaw >= 0
        ? Math.log(1 + yearsRaw)
        : NaN;

      const mmm = Math.max(1, Math.min(7, Math.round(toNum(input.mmm))));

      const stateIn = String(input.state || designInfo.stateRef)
        .trim()
        .toUpperCase();

      const row = [1, yearsLog];

      if (designInfo.mmmCategorical) {
        for (let k = 2; k <= 7; k++) {
          row.push(mmm === k ? 1 : 0);
        }
      } else {
        row.push(mmm);
      }

      designInfo.stateDummies.forEach(s => {
        row.push(stateIn === s ? 1 : 0);
      });

      return row;
    }

    /**********************
     * MATRIX HELPERS
     **********************/
    function toNum(v) {
      const n = typeof v === 'string' ? parseFloat(v) : Number(v);
      return Number.isFinite(n) ? n : NaN;
    }

    function toInt(v) {
      const n = typeof v === 'string' ? parseInt(v, 10) : Math.floor(Number(v));
      return Number.isFinite(n) ? n : NaN;
    }

    function transpose(A) {
      return A[0].map((_, i) => A.map(r => r[i]));
    }

    function multiply(A, B) {
      const r = A.length;
      const c = B[0].length;
      const m = B.length;

      const out = Array.from({ length: r }, () => Array(c).fill(0));

      for (let i = 0; i < r; i++) {
        for (let k = 0; k < m; k++) {
          const aik = A[i][k];

          for (let j = 0; j < c; j++) {
            out[i][j] += aik * B[k][j];
          }
        }
      }

      return out;
    }

    function multiplyVec(A, v) {
      const r = A.length;
      const c = A[0].length;

      const out = Array(r).fill(0);

      for (let i = 0; i < r; i++) {
        let s = 0;

        for (let j = 0; j < c; j++) {
          s += A[i][j] * v[j];
        }

        out[i] = s;
      }

      return out;
    }

    function multiplyMatVec(A, v) {
      return multiplyVec(A, v);
    }

    function dot(a, b) {
      let s = 0;

      for (let i = 0; i < a.length; i++) {
        s += a[i] * b[i];
      }

      return s;
    }

    function identity(n) {
      const I = Array.from({ length: n }, () => Array(n).fill(0));

      for (let i = 0; i < n; i++) {
        I[i][i] = 1;
      }

      return I;
    }

    function invert(A) {
      const n = A.length;
      const M = A.map(r => r.slice());
      const I = identity(n);

      for (let c = 0; c < n; c++) {
        let pivot = c;
        let maxAbs = Math.abs(M[c][c]);

        for (let r = c + 1; r < n; r++) {
          const v = Math.abs(M[r][c]);

          if (v > maxAbs) {
            maxAbs = v;
            pivot = r;
          }
        }

        if (maxAbs === 0) {
          throw new Error('Design matrix is singular (perfect multicollinearity).');
        }

        if (pivot !== c) {
          [M[c], M[pivot]] = [M[pivot], M[c]];
          [I[c], I[pivot]] = [I[pivot], I[c]];
        }

        const diag = M[c][c];

        for (let j = 0; j < n; j++) {
          M[c][j] /= diag;
          I[c][j] /= diag;
        }

        for (let r = 0; r < n; r++) {
          if (r !== c) {
            const f = M[r][c];

            for (let j = 0; j < n; j++) {
              M[r][j] -= f * M[c][j];
              I[r][j] -= f * I[c][j];
            }
          }
        }
      }

      return I;
    }

    function quadForm(invXtX, x) {
      const tmp = multiplyMatVec(invXtX, x);
      return dot(x, tmp);
    }

    function countBy(arr) {
      const c = Object.create(null);

      arr.forEach(v => {
        c[v] = (c[v] || 0) + 1;
      });

      return c;
    }

    function sortKeysByCountDesc(counts) {
      return Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
    }

    document.getElementById('estimateBtn').addEventListener('click', estimate);

    loadModel();
  </script>
</body>
</html>
