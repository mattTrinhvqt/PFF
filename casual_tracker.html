<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Casual & Locum Optom Income Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --purple: #6600ff;
  --ink: #151515;
  --muted: #69718a;
  --track: #e8eaf0;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  min-height: 100%;
}

body {
  font-family: 'Lato', sans-serif;
  color: var(--ink);
  background: #fff;
  overflow-x: hidden;
  overflow-y: auto;
}

#fit {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100dvh;
  width: 100%;
}

.box {
  width: min(calc(100% - 24px), 520px);
  max-width: 100%;
  min-width: 0;
  margin-inline: auto;
  padding: 20px 18px 28px;
  text-align: center;
}

.tracker-notice {
  width: 100%;
  margin: 0 0 8px;
  padding: 0 0 14px;
  border-bottom: 1px solid var(--track);
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
  text-align: center;
}

.tracker-notice p {
  margin: 0;
}

.tracker-notice p + p {
  margin-top: 2px;
}

.step {
  display: none;
}

.step.active {
  display: grid;
  grid-template-areas:
    "progress"
    "body"
    "nav";
  grid-template-rows: 28px minmax(0, 1fr) 48px;
  min-height: clamp(420px, 60dvh, 500px);
  align-items: stretch;
}

.progress {
  grid-area: progress;
  min-height: 28px;
  margin: 0;
  padding: 0;
  color: var(--purple);
  font-size: 13px;
  line-height: 28px;
  text-align: center;
}

.progress::before {
  display: none;
}

.step-body {
  grid-area: body;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  min-width: 0;
  padding: 24px 0 0;
}

.step-body > label {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 108px;
  margin: 0;
  color: var(--ink);
  font-size: clamp(22px, 5.4vw, 28px);
  font-weight: 700;
  line-height: 1.2;
  text-align: center;
}

.step-body > label small {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 400;
  line-height: 1.35;
}

.step[data-step="1"] .question-title {
  font-size: clamp(28px, 6.6vw, 36px);
}

.step[data-step="4"] .step-body > label {
  font-size: clamp(21px, 5.2vw, 27px);
}

.step-body > input[type="number"],
.step-body > select {
  display: block;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  height: 50px;
  margin: 0 auto;
  padding: 0 4px;
  color: var(--ink);
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--ink);
  border-radius: 0;
  font: inherit;
  font-size: 20px;
  text-align: center;
  outline: none;
}

.step-body > input[type="number"]:focus,
.step-body > select:focus {
  border-bottom-color: var(--ink);
}

select {
  text-align-last: center;
  -moz-text-align-last: center;
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  margin: 0;
  -webkit-appearance: none;
}

.rate-field {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  min-width: 0;
  height: 50px;
  margin-top: 0;
  border-bottom: 1px solid var(--ink);
}

.rate-prefix {
  color: var(--purple);
  font-size: 32px;
  font-weight: 400;
  line-height: 1;
}

.rate-field input[type="number"] {
  flex: 1;
  width: auto;
  min-width: 0;
  height: 100%;
  margin: 0;
  padding: 0;
  color: var(--ink);
  background: transparent;
  border: 0;
  border-radius: 0;
  font: inherit;
  font-size: 26px;
  text-align: left;
  outline: none;
}

.rate-suffix {
  color: var(--muted);
  font-size: 18px;
}

.nav-row {
  grid-area: nav;
  display: flex;
  align-items: center;
  align-self: end;
  width: 100%;
  min-width: 0;
  min-height: 48px;
  margin-top: 0;
  padding: 0;
  gap: 10px;
}

button {
  font-family: inherit;
  cursor: pointer;
}

.nav-row .next,
.nav-row #submit,
.nav-row #submit-another {
  flex: 1;
  min-height: 48px;
  padding: 0 18px;
  color: #fff;
  background: var(--ink);
  border: 0;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 700;
}

.nav-row .next:hover,
.nav-row #submit:hover,
.nav-row #submit-another:hover {
  background: #26324d;
}

.nav-row .back {
  flex: 0 0 64px;
  min-height: 48px;
  padding: 0 4px;
  color: var(--muted);
  background: transparent;
  border: 0;
  font-size: 14px;
}

.nav-row .next:only-child {
  width: 100%;
}

#out {
  width: 100%;
  min-height: 1.6em;
  margin: 14px auto 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.55;
  text-align: left;
  white-space: pre-line;
}

#last-submitted {
  width: 100%;
  margin-top: 12px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.45;
  text-align: left;
}

#last-submitted:empty,
#rate-warning:empty,
.field-warning:empty {
  display: none;
}

#last-submitted .last-submitted-note {
  padding-top: 0;
}

#last-submitted .last-submitted-date {
  color: var(--ink);
  font-size: 14px;
}

#last-submitted .last-submitted-date span {
  margin-right: 8px;
  color: var(--muted);
  font-weight: 700;
}

#last-submitted .last-submitted-details {
  margin-top: 4px;
  color: var(--muted);
  font-size: 14px;
}

#rate-warning,
.field-warning {
  width: 100%;
  margin-top: 10px;
  color: #b42318;
  font-size: 14px;
  line-height: 1.45;
  text-align: left;
}

#rate-warning button,
.field-warning button,
.step-body > label small a {
  color: var(--purple);
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.45;
  text-decoration: underline;
}

#rate-warning button,
.field-warning button {
  display: block;
  margin: 8px 0 0;
  padding: 0;
  background: transparent;
  border: 0;
}

@media (max-width: 430px) {
  .box {
    width: calc(100% - 24px);
    padding: 18px 14px 26px;
  }

  .step.active {
    min-height: clamp(400px, 58dvh, 470px);
  }

  .step-body {
    padding-top: 20px;
  }

  .step-body > label {
    min-height: 100px;
  }

  .rate-field {
    height: 48px;
  }

  .rate-prefix {
    font-size: 30px;
  }

  .rate-field input[type="number"] {
    font-size: 24px;
  }
}
</style>
</head>

<body>
<div id="fit">
<div id="app" class="box">

  <aside class="tracker-notice" role="note">
    <p>Best used in a non-Facebook browser</p>
    <p>Australian casual optometrists only</p>
    <p>Submit per workplace per financial year</p>
  </aside>

  <div class="step active" data-step="1">
    <div class="step-body">
      <label for="q1_rate" class="question-title">
        Hourly weekday rate
        <small>Exclude super and bonuses</small>
      </label>

      <div class="rate-field">
        <span class="rate-prefix">$</span>
        <input
          id="q1_rate"
          type="number"
          inputmode="numeric"
          enterkeyhint="next"
          step="1"
          required
          aria-label="Hourly weekday rate"
        >
        <span class="rate-suffix">/hour</span>
      </div>

      <div id="rate-warning" role="alert" aria-live="polite"></div>
      <div id="last-submitted"></div>
    </div>

    <div class="nav-row">
      <button type="button" class="next">Next</button>
    </div>

    <div class="progress"></div>
  </div>

  <div class="step" data-step="2">
    <div class="step-body">
      <label for="q2_exp">Years since graduating</label>
      <input
        id="q2_exp"
        type="number"
        inputmode="decimal"
        enterkeyhint="next"
        step="0.5"
        required
      >
    </div>

    <div class="nav-row">
      <button type="button" class="back">Back</button>
      <button type="button" class="next">Next</button>
    </div>

    <div class="progress"></div>
  </div>

  <div class="step" data-step="3">
    <div class="step-body">
      <label for="q4_state">State/territory of practice</label>
      <select id="q4_state" required>
        <option value="" selected disabled>Select…</option>
        <option>NSW</option>
        <option>QLD</option>
        <option>ACT</option>
        <option>VIC</option>
        <option>SA</option>
        <option>NT</option>
        <option>WA</option>
        <option>TAS</option>
      </select>
    </div>

    <div class="nav-row">
      <button type="button" class="back">Back</button>
      <button type="button" class="next">Next</button>
    </div>

    <div class="progress"></div>
  </div>

  <div class="step" data-step="4">
    <div class="step-body">
      <label for="q4_mmm">
        Rurality of practice (MMM)
        <small>
          <a
            href="https://www.health.gov.au/resources/apps-and-tools/health-workforce-locator/health-workforce-locator"
            target="_blank"
            rel="noopener"
          >Find my MMM</a>
        </small>
      </label>

      <select id="q4_mmm" required>
        <option value="" selected disabled>Select MMM…</option>
        <option value="1">MM1 (Metropolitan areas)</option>
        <option value="2">MM2 (Regional centres)</option>
        <option value="3">MM3 (Large rural towns)</option>
        <option value="4">MM4 (Medium rural towns)</option>
        <option value="5">MM5 (Small rural towns)</option>
        <option value="6">MM6 (Remote communities)</option>
        <option value="7">MM7 (Very remote communities)</option>
      </select>
    </div>

    <div class="nav-row">
      <button type="button" class="back">Back</button>
      <button type="button" class="next">Next</button>
    </div>

    <div class="progress"></div>
  </div>

  <div class="step" data-step="5">
    <div class="step-body">
      <label for="q5_employer">Employer</label>

      <select id="q5_employer" required>
        <option value="" selected disabled>Select employer…</option>

        <option value="1001">1001 Optometry</option>
        <option value="Bailey Nelson">Bailey Nelson</option>
        <option value="Bupa">Bupa Optical</option>
        <option value="Chemist/Optometrist Warehouse">Chemist Warehouse Optometry</option>
        <option value="Costco">Costco Optical</option>
        <option value="Dresden">Dresden Vision</option>
        <option value="George &amp; Matilda">George &amp; Matilda Eyecare</option>
        <option value="HCF">HCF Eyecare</option>
        <option value="Independent">Independent</option>
        <option value="Ophthal practice">Ophthalmologist</option>
        <option value="OPSM (incl. L&amp;P, EyeQ)">OPSM (incl. L&amp;P, EyeQ)</option>
        <option value="Optical by National Pharmacies">Optical by National Pharmacies</option>
        <option value="Oscar Wylee">Oscar Wylee</option>
        <option value="Other (e.g., uni, hospital, govt, not-for-profit)">Other (e.g., uni, hospital, govt, not-for-profit)</option>
        <option value="Specsavers">Specsavers</option>
        <option value="Teacher’s Health Fund">Teachers Health</option>
        <option value="NIB (incl. the Optical Company)">The Optical Company (incl. NIB)</option>
        <option value="The Optical Superstore">The Optical Superstore</option>
      </select>
    </div>

    <div class="nav-row">
      <button type="button" class="back">Back</button>
      <button id="submit" type="button">Submit</button>
    </div>

    <div class="progress"></div>
  </div>

  <div id="out"></div>
</div>
</div>

<script>
  const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbytWac46jT_u62zwXfNmJJqmnxA9Zvf-_K7Qfz-_GbjdcW0t60KU1fhgiUtl0BLlasd/exec';

  function callCasualTrackerBackend(action, params = {}) {
    return new Promise((resolve, reject) => {
      if (!BACKEND_URL || BACKEND_URL === 'PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE') {
        reject(new Error('Backend URL has not been set.'));
        return;
      }

      const callbackName = `casualTrackerCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
      const script = document.createElement('script');

      const timeout = window.setTimeout(() => {
        cleanup();
        reject(new Error('Request timed out.'));
      }, 30000);

      function cleanup() {
        window.clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      window[callbackName] = response => {
        cleanup();

        if (!response || !response.ok) {
          reject(new Error(response?.message || 'Request failed.'));
          return;
        }

        resolve(response);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error('Network error.'));
      };

      const query = new URLSearchParams({
        callback: callbackName,
        action,
        ...params
      });

      script.src = `${BACKEND_URL}?${query.toString()}`;
      document.body.appendChild(script);
    });
  }

  const steps = [...document.querySelectorAll('.step')];
  const out = document.getElementById('out');
  const btn = document.getElementById('submit');
  const lastNavRow = document.querySelector('.step[data-step="5"] .nav-row');
  const lastBackBtn = lastNavRow.querySelector('.back');

  let cur = 0;
  let isSaving = false;

  const confirmedUnusualValues = new Map();

  function showStep(index) {
    steps.forEach((step, i) => step.classList.toggle('active', i === index));

    const progress = steps[index].querySelector('.progress');
    if (progress) {
      progress.textContent = `Q ${index + 1} of ${steps.length}`;
    }

    if (index === 0) {
      showLastSubmissionNote();
      out.textContent = '';
    }

    setTimeout(() => {
      const first = steps[index].querySelector('input, select, textarea, button');
      if (first && first.id !== 'submit') first.focus();
    }, 0);
  }

  function getHistory() {
    try {
      const raw = JSON.parse(localStorage.getItem('optomCasHistory') || '[]');
      return Array.isArray(raw)
        ? raw.map(item => (typeof item === 'string' ? { ts: item } : item))
        : [];
    } catch {
      return [];
    }
  }

  function showLastSubmissionNote() {
    const lastEl = document.getElementById('last-submitted');
    const history = getHistory();

    if (!history.length) {
      lastEl.textContent = '';
      return;
    }

    const latest = history.reduce((a, b) =>
      new Date(a.ts) > new Date(b.ts) ? a : b
    );

    const dt = new Date(latest.ts);

    if (Number.isNaN(+dt)) {
      lastEl.textContent = '';
      return;
    }

    const dd = String(dt.getDate()).padStart(2, '0');
    const mm = String(dt.getMonth() + 1).padStart(2, '0');
    const yyyy = dt.getFullYear();

    const parts = [];

    if (Number.isFinite(latest.rate)) parts.push(`$${Math.round(latest.rate)}/h`);
    if (Number.isFinite(latest.expYears)) parts.push(`${latest.expYears} yrs`);
    if (latest.state) parts.push(latest.state);
    if (Number.isFinite(latest.mmm)) parts.push(`MM${latest.mmm}`);
    if (latest.employer) parts.push(latest.employer);

    const summary = parts.join(' · ');

    lastEl.innerHTML = `
      <div class="last-submitted-note">
        <div class="last-submitted-date">
          <span>Last submitted:</span>
          <strong>${dd}/${mm}/${yyyy}</strong>
        </div>
        ${summary ? `<div class="last-submitted-details">${summary}</div>` : ''}
      </div>
    `;
  }

  function stepValid(index) {
    const required = [
      ...steps[index].querySelectorAll('input[required], select[required], textarea[required]')
    ];

    return required.every(el => {
      if (el.tagName === 'SELECT') return el.value !== '';
      return el.value.trim() !== '';
    });
  }

  function formatWarningNumber(value) {
    return Number(value).toLocaleString('en-AU', {
      maximumFractionDigits: 2
    });
  }

  const FIELD_RULES = {
    q1_rate: {
      hardInvalid: value => value < 0,
      hardMessage: '⚠️ Enter an hourly rate of $0 or more',
      unusual: value => value > 150,
      unusualMessage: value =>
        `⚠️ $${formatWarningNumber(value)}/hour seems unusual, please check`
    },

    q2_exp: {
      hardInvalid: value => value < 0,
      hardMessage: '⚠️ Enter 0 or more years since graduating',
      unusual: value => value > 50,
      unusualMessage: value =>
        `⚠️ ${formatWarningNumber(value)} years since graduating seems unusual, please check`
    }
  };

  function getWarningElement(field) {
    if (field.id === 'q1_rate') {
      return document.getElementById('rate-warning');
    }

    const stepEl = field.closest('.step');
    let warning = stepEl.querySelector('.field-warning');

    if (warning) return warning;

    warning = document.createElement('div');
    warning.className = 'field-warning';
    warning.setAttribute('role', 'alert');
    warning.setAttribute('aria-live', 'polite');

    field.insertAdjacentElement('afterend', warning);

    return warning;
  }

  function clearFieldWarning(field) {
    const stepEl = field.closest('.step');

    const warning = field.id === 'q1_rate'
      ? document.getElementById('rate-warning')
      : stepEl.querySelector('.field-warning');

    if (warning) {
      warning.textContent = '';
    }
  }

  function showFieldWarning(field, message, allowContinue = false) {
    const warning = getWarningElement(field);

    warning.textContent = '';
    warning.appendChild(document.createTextNode(message));

    if (!allowContinue) return;

    const continueButton = document.createElement('button');
    continueButton.type = 'button';
    continueButton.textContent = 'Continue anyway';

    continueButton.addEventListener('click', () => {
      confirmedUnusualValues.set(field.id, field.value.trim());
      clearFieldWarning(field);

      if (cur < steps.length - 1) {
        cur++;
        showStep(cur);
      }
    });

    warning.appendChild(continueButton);
  }

  function validateFieldRule(field) {
    const rule = FIELD_RULES[field.id];

    if (!rule) return true;

    const value = Number(field.value);

    if (!Number.isFinite(value)) {
      showFieldWarning(field, '⚠️ Enter a valid number');
      return false;
    }

    if (rule.hardInvalid && rule.hardInvalid(value)) {
      showFieldWarning(field, rule.hardMessage);
      return false;
    }

    const alreadyConfirmed =
      confirmedUnusualValues.get(field.id) === field.value.trim();

    if (rule.unusual && rule.unusual(value) && !alreadyConfirmed) {
      showFieldWarning(field, rule.unusualMessage(value), true);
      return false;
    }

    clearFieldWarning(field);
    return true;
  }

  document.addEventListener('input', event => {
    const field = event.target;

    if (!field.matches('input, select')) return;

    confirmedUnusualValues.delete(field.id);
    clearFieldWarning(field);
  });

  document.addEventListener('change', event => {
    const field = event.target;

    if (!field.matches('input, select')) return;

    confirmedUnusualValues.delete(field.id);
    clearFieldWarning(field);
  });

  function toNext() {
    if (!stepValid(cur)) {
      return;
    }

    const stepEl = steps[cur];
    const field = stepEl.querySelector('input[required], select[required]');

    if (field && !validateFieldRule(field)) {
      return;
    }

    if (cur < steps.length - 1) {
      cur++;
      showStep(cur);
    }
  }

  function toBack() {
    if (cur > 0) {
      cur--;
      showStep(cur);
    }
  }

  document.addEventListener('click', event => {
    if (event.target.classList.contains('next')) toNext();
    if (event.target.classList.contains('back')) toBack();
  });

  document.addEventListener('keydown', event => {
    if (event.key !== 'Enter') return;

    const isActive = event.target.closest('.step')?.classList.contains('active');

    if (isActive && event.target.tagName !== 'SELECT') {
      event.preventDefault();
      toNext();
    }
  });

  document.addEventListener('change', event => {
    const isActive = event.target.closest('.step')?.classList.contains('active');

    if (isActive && event.target.tagName === 'SELECT') {
      toNext();
    }
  });

  btn.addEventListener('click', save);

  function resetForm() {
    document.querySelectorAll('#app input, #app select').forEach(el => {
      el.value = '';
    });

    confirmedUnusualValues.clear();
    clearFieldWarning(document.getElementById('q1_rate'));

    document.querySelectorAll('.field-warning').forEach(warning => {
      warning.textContent = '';
    });

    cur = 0;
    showStep(cur);
  }

  function getOrCreateRespondentId() {
    const storageKey = 'optomCasRespondentId';
    let id = localStorage.getItem(storageKey);

    if (!id) {
      id = window.crypto?.randomUUID?.() ||
        `oc_${Date.now().toString(36)}_${Math.random().toString(36).slice(2)}`;

      localStorage.setItem(storageKey, id);
    }

    return id;
  }

  function save() {
    if (isSaving) return;

    const employerField = document.getElementById('q5_employer');

    if (!employerField.value.trim()) {
      showFieldWarning(employerField, '⚠️ Please select an employer');
      return;
    }

    const employerRaw = employerField.value.trim();
    const rateRaw = document.getElementById('q1_rate').value.trim();
    const expRaw = document.getElementById('q2_exp').value.trim();
    const stateRaw = document.getElementById('q4_state').value.trim();
    const mmmRaw = document.getElementById('q4_mmm').value.trim();

    const employer = employerRaw || 'x';
    const rate = rateRaw === '' ? 'x' : Number(rateRaw);
    const expYears = expRaw === '' ? 'x' : Number(expRaw);
    const state = stateRaw || 'x';
    const mmm = mmmRaw === '' ? 'x' : Number(mmmRaw);

    let invalidQuestion = null;

    if (!Number.isFinite(rate) || rate < 0) {
      invalidQuestion = 1;
    } else if (!Number.isFinite(expYears) || expYears < 0) {
      invalidQuestion = 2;
    } else if (state === 'x') {
      invalidQuestion = 3;
    } else if (!Number.isInteger(mmm) || mmm < 1 || mmm > 7) {
      invalidQuestion = 4;
    } else if (employer === 'x') {
      invalidQuestion = 5;
    }

    if (invalidQuestion !== null) {
      out.textContent = `⚠️ Please complete Q ${invalidQuestion}`;
      return;
    }

    const workplace = {
      rate,
      expYears,
      patientsPerDay: '',
      state,
      mmm,
      services: '',
      employer
    };

    const respondentId = getOrCreateRespondentId();

    isSaving = true;
    btn.disabled = true;
    lastBackBtn.disabled = true;
    out.textContent = 'Submitting…';

    callCasualTrackerBackend('saveSurvey', {
      workplaces: JSON.stringify([workplace]),
      respondentId
    })
      .then(() => {
        const snapshot = {
          ts: new Date().toISOString(),
          respondentId,
          rate: workplace.rate,
          expYears: workplace.expYears,
          state: workplace.state,
          mmm: workplace.mmm,
          employer: workplace.employer
        };

        const history = getHistory();
        history.push(snapshot);
        localStorage.setItem('optomCasHistory', JSON.stringify(history));

        isSaving = false;
        out.textContent = '✅ Submitted!';

        lastBackBtn.style.display = 'none';
        btn.style.display = 'none';

        const againBtn = document.createElement('button');
        againBtn.type = 'button';
        againBtn.id = 'submit-another';
        againBtn.textContent = 'Submit another';
        againBtn.style.width = '100%';

        lastNavRow.appendChild(againBtn);

        againBtn.addEventListener('click', () => {
          againBtn.remove();
          lastBackBtn.style.display = '';
          btn.style.display = '';
          btn.disabled = false;
          lastBackBtn.disabled = false;
          resetForm();
        });
      })
      .catch(err => {
        isSaving = false;
        btn.disabled = false;
        lastBackBtn.disabled = false;
        out.textContent = '⚠️ Unable to submit right now, please try again';
        console.error(err);
      });
  }

  showStep(cur);
</script>
</body>
</html>
