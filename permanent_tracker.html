<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #6600ff;
    --ink: #151515;
    --muted: #69718a;
    --track: #e8eaf0;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }

  body {
    font-family: 'Lato', sans-serif;
    color: var(--ink);
    background: #fff;
    overflow-x: hidden;
    overflow-y: auto;
  }

  #fit {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100dvh;
    width: 100%;
  }

  .box {
    width: min(calc(100% - 24px), 520px);
    max-width: 100%;
    min-width: 0;
    margin-inline: auto;
    padding: 20px 18px 28px;
    text-align: center;
  }
  /* Permanent tracker instructions */
  .tracker-notice {
    width: 100%;
    margin: 0 0 8px;
    padding: 0 0 14px;
    border-bottom: 1px solid var(--track);
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
    text-align: center;
  }

  .tracker-notice p {
    margin: 0;
  }

  .tracker-notice p + p {
    margin-top: 2px;
  }
  .step {
    display: none;
  }

  .step.active {
    display: grid;
    grid-template-areas:
      "progress"
      "body"
      "nav";
    grid-template-rows: 28px minmax(0, 1fr) 48px;
    min-height: clamp(420px, 60dvh, 500px);
    align-items: stretch;
  }

  .progress {
    grid-area: progress;
    min-height: 28px;
    margin: 0;
    padding: 0;
    color: var(--purple);
    font-size: 13px;
    line-height: 28px;
    text-align: center;
  }

  .step-body {
    grid-area: body;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    min-width: 0;
    padding: 24px 0 0;
  }

  .step-body > label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 108px;
    margin: 0;
    color: var(--ink);
    font-size: clamp(22px, 5.4vw, 28px);
    font-weight: 700;
    line-height: 1.2;
    text-align: center;
  }

  .step[data-step="1"] .question-title {
    font-size: clamp(28px, 6.6vw, 36px);
  }
  .step[data-step="11"] .step-body > label {
    font-size: clamp(21px, 5.2vw, 27px);
  }  
  /* Keep the final four answer lines aligned with each other. */
  .step-body > label.long-question {
    min-height: 160px;
  }

  @media (max-width: 430px) {
    .step-body > label.long-question {
      min-height: 180px;
    }
  }
  .step-body > label small {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.35;
  }

  .step-body > input[type="number"],
  .step-body > input[type="text"],
  .step-body > select {
    display: block;
    width: 100%;
    max-width: 100%;
    min-width: 0;
    height: 50px;
    margin: 0 auto;
    padding: 0 4px;
    color: var(--ink);
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--ink);
    border-radius: 0;
    font: inherit;
    font-size: 20px;
    text-align: center;
    outline: none;
  }

  .step-body > input[type="number"]:focus,
  .step-body > input[type="text"]:focus,
  .step-body > select:focus {
    border-bottom-color: var(--ink);
  }

  select {
    text-align-last: center;
    -moz-text-align-last: center;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    margin: 0;
    -webkit-appearance: none;
  }

  .rate-field {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    min-width: 0;
    height: 50px;
    margin-top: 0;
    border-bottom: 1px solid var(--ink);
  }

  .rate-prefix {
    color: var(--purple);
    font-size: 32px;
    font-weight: 400;
    line-height: 1;
  }

  .rate-field input[type="number"] {
    flex: 1;
    width: auto;
    min-width: 0;
    height: 100%;
    margin: 0;
    padding: 0;
    color: var(--ink);
    background: transparent;
    border: 0;
    border-radius: 0;
    font: inherit;
    font-size: 26px;
    text-align: left;
    outline: none;
  }

  .rate-suffix {
    color: var(--muted);
    font-size: 18px;
  }

  .multi {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    margin: 0 auto;
    text-align: left;
  }

  .multi label {
    display: inline-flex;
    align-items: center;
    margin: 6px 0;
    color: var(--ink);
    font-size: 16px;
    font-weight: 400;
    text-align: left;
  }

  .multi label input {
    margin-right: 9px;
  }

  /* Q3 basis options */
  .basis-options {
    display: grid;
    gap: 6px;
    width: 100%;
    max-width: 360px;
  }

  .basis-options .basis-option {
    display: grid;
    grid-template-columns: 18px minmax(0, 1fr);
    align-items: center;
    gap: 9px;
    width: 100%;
    min-height: 46px;
    margin: 0;
    padding: 8px 10px;
    color: var(--ink);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.25;
    text-align: left;
    transition: background-color 120ms ease, border-color 120ms ease;
  }

  .basis-options .basis-option input {
    width: 16px;
    height: 16px;
    margin: 0;
    accent-color: var(--purple);
  }

  .basis-options .basis-option.selected {
    background: #f4efff;
    border-color: var(--purple);
  }
  .nav-row {
    grid-area: nav;
    display: flex;
    align-items: center;
    align-self: end;
    width: 100%;
    min-width: 0;
    min-height: 48px;
    margin-top: 0;
    padding: 0;
    gap: 10px;
  }

  button {
    font-family: inherit;
    cursor: pointer;
  }

  .nav-row .next,
  .nav-row #submit {
    flex: 1;
    min-height: 48px;
    padding: 0 18px;
    color: #fff;
    background: var(--ink);
    border: 0;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 700;
  }

  .nav-row .next:hover,
  .nav-row #submit:hover {
    background: #26324d;
  }

  .nav-row .back {
    flex: 0 0 64px;
    min-height: 48px;
    padding: 0 4px;
    color: var(--muted);
    background: transparent;
    border: 0;
    font-size: 14px;
  }

  .nav-row .next:only-child {
    width: 100%;
  }

  #last-submitted,
  #out {
    width: 100%;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
    text-align: left;
  }

  #last-submitted {
    margin-top: 12px;
  }

  #out {
    min-height: 1.6em;
    margin: 14px auto 0;
    white-space: pre-line;
  }

  #last-submitted:empty,
  #salary-warning:empty,
  .field-warning:empty {
    display: none;
  }

  #last-submitted .last-submitted-note {
    padding-top: 0;
  }

  #last-submitted .last-submitted-date {
    color: var(--ink);
    font-size: 14px;
  }

  #last-submitted .last-submitted-date span {
    margin-right: 8px;
    color: var(--muted);
    font-weight: 700;
  }

  #last-submitted .last-submitted-details {
    margin-top: 4px;
    color: var(--muted);
    font-size: 14px;
  }

  #salary-warning,
  .field-warning {
    width: 100%;
    margin-top: 10px;
    color: #b42318;
    font-size: 14px;
    line-height: 1.45;
    text-align: left;
  }

  /* Inline action links */
  #salary-warning button,
  .field-warning button,
  .step-body > label small a {
    color: var(--purple);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.45;
    text-decoration: underline;
  }

  #salary-warning button,
  .field-warning button {
    display: block;
    margin: 8px 0 0;
    padding: 0;
    background: transparent;
    border: 0;
  }

  /* Saved and annual-lockout screen */
  #out.terminal-state {
    min-height: 0;
    margin: 28px auto 0;
    white-space: normal;
  }

  .terminal-card {
    width: 100%;
    text-align: left;
  }

  .terminal-title {
    color: var(--ink);
    font-size: clamp(24px, 6vw, 30px);
    font-weight: 700;
    line-height: 1.2;
    text-align: center;
  }

  .terminal-subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
    text-align: center;
  }

  .terminal-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--track);
  }

  .terminal-section-label {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
  }

  .terminal-details {
    margin-top: 5px;
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
  }

  .terminal-estimate-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.35;
  }

  .terminal-estimate-row strong {
    color: var(--ink);
    font-weight: 400;
    text-align: right;
    white-space: nowrap;
  }

  .terminal-estimate-row.total {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--track);
    color: var(--ink);
    font-weight: 700;
  }

  .terminal-estimate-row.total strong {
    font-weight: 700;
  }

  input:disabled,
  select:disabled,
  textarea:disabled,
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  @media (max-width: 430px) {
    .box {
      width: calc(100% - 24px);
      padding: 18px 14px 26px;
    }

    .step.active {
      min-height: clamp(400px, 58dvh, 470px);
    }

    .step-body {
      padding-top: 20px;
    }

    .step-body > label {
      min-height: 100px;
    }

    .rate-field {
      height: 48px;
    }

    .rate-prefix {
      font-size: 30px;
    }

    .rate-field input[type="number"] {
      font-size: 24px;
    }
  }
</style>
</head>




<body>
<div id="fit">
  <div id="app" class="box">

    <aside class="tracker-notice" role="note">
      <p>Best used in a non-Facebook browser</p>
      <p>Australian permanent optometrists only</p>
      <p>Submit for main workplace per financial year</p>
    </aside>

  <!-- ------------- WIZARD: one question per step ------------- -->

<!-- Step 1 -->
<div class="step active" data-step="1">
  <div class="step-body">
    <label for="q1_salary" class="question-title">
      Annual salary
      <small>Pre-tax; exclude super and sales bonuses</small>
      <small>Include location and weekend/night loadings</small>
    </label>

    <div class="rate-field">
      <span class="rate-prefix">$</span>
      <input
        id="q1_salary"
        type="number"
        inputmode="numeric"
        enterkeyhint="next"
        min="0"
        step="1"
        required
        aria-label="Annual salary"
      >
      <span class="rate-suffix">/year</span>
    </div>

    <div id="salary-warning" role="alert" aria-live="polite"></div>
    <div id="last-submitted"></div>
  </div>

  <div class="nav-row">
    <button type="button" class="next">Next</button>
  </div>

  <div class="progress"></div>
</div>


<!-- Step 2 -->
<div class="step" data-step="2">
  <div class="step-body">
    <label>Approx. yearly income from sales bonuses only</label>
    <input id="q1b_bonus"
          type="number"
          inputmode="numeric"
          min="0"
          step="1"
          enterkeyhint="next"
          required>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>



<!-- Step 3 -->
<div class="step" data-step="3">
  <div class="step-body">
    <label>The previous values are…</label>
    <div class="multi basis-options" id="basis_group">
      <label class="basis-option">
        <input
          class="basis-one"
          type="checkbox"
          value="Pro-rata (adjusted for part-time hrs)"
        >
        <span>Pro-rata (adjusted for part-time hrs)</span>
      </label>

      <label class="basis-option">
        <input
          class="basis-one"
          type="checkbox"
          value="Full-time-equivalent (FTE)"
        >
        <span>Full-time-equivalent (FTE)</span>
      </label>
    </div>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>


<!-- Step 4 -->
<div class="step" data-step="4">
  <div class="step-body">
    <label>Average hours worked per week</label>
    <input id="q1c_hours" type="number" inputmode="decimal" enterkeyhint="next" min="0" step="0.1" required>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>


<!-- Step 5 -->
<div class="step" data-step="5">
  <div class="step-body">
    <label>Years since graduating</label>
    <input id="q2_exp" type="number" inputmode="decimal" enterkeyhint="next" min="0" step="0.5" required>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>




<!-- Step 7 (Saturdays) -->
<div class="step" data-step="7">
  <div class="step-body">
    <label>Rostered Saturdays in a 4-week cycle</label>
    <input id="q3a_sat4wk" type="number" inputmode="numeric" enterkeyhint="next" min="0" max="4" step="1" required>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>

<!-- Step 8 (Sundays) -->
<div class="step" data-step="8">
  <div class="step-body">
    <label>Rostered Sundays in a 4-week cycle</label>
    <input id="q3b_sun4wk" type="number" inputmode="numeric" enterkeyhint="next" min="0" max="4" step="1" required>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>

<!-- Step 9 (Late nights) -->
<div class="step" data-step="9">
  <div class="step-body">
    <label>Rostered late nights (6pm+) in a 4-week cycle</label>
    <input id="q3c_lates4wk" type="number" inputmode="numeric" enterkeyhint="next" min="0" max="4" step="1" required>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>


<!-- Step 10 -->
<div class="step" data-step="10">
  <div class="step-body">
    <label>State/territory of practice</label>
    <select id="q4_state" required>
      <option value="" selected disabled>Select…</option>
      <option>NSW</option><option>QLD</option><option>ACT</option><option>VIC</option>
      <option>SA</option><option>NT</option><option>WA</option><option>TAS</option>
    </select>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>


<!-- Step 11 -->
<div class="step" data-step="11">
  <div class="step-body">
    <label for="q4_mmm">
      Rurality of practice (MMM)
      <small>
        <a
          href="https://www.health.gov.au/resources/apps-and-tools/health-workforce-locator/health-workforce-locator"
          target="_blank"
          rel="noopener"
        >Find my MMM</a>
      </small>
    </label>

    <select id="q4_mmm" required>
      <option value="" selected disabled>Select MMM…</option>
      <option value="1">MM1 (Metropolitan areas)</option>
      <option value="2">MM2 (Regional centres)</option>
      <option value="3">MM3 (Large rural towns)</option>
      <option value="4">MM4 (Medium rural towns)</option>
      <option value="5">MM5 (Small rural towns)</option>
      <option value="6">MM6 (Remote communities)</option>
      <option value="7">MM7 (Very remote communities)</option>
    </select>
  </div>

  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>

  <div class="progress"></div>
</div>

<!-- Step 13 (Employer) -->
<div class="step" data-step="13">
  <div class="step-body">
    <label>Employer</label>
      <select id="q6_employer" required>
        <option value="" selected disabled>Select…</option>

        <option value="1001">1001 Optometry</option>
        <option value="Bailey Nelson">Bailey Nelson</option>
        <option value="Bupa">Bupa Optical</option>
        <option value="Chemist/Optometrist Warehouse">Chemist Warehouse Optometry</option>
        <option value="Costco">Costco Optical</option>
        <option value="Dresden">Dresden Vision</option>
        <option value="George &amp; Matilda">George &amp; Matilda Eyecare</option>
        <option value="HCF">HCF Eyecare</option>
        <option value="Independent">Independent</option>
        <option value="Ophthal practice">Ophthalmologist</option>
        <option value="OPSM (incl. L&amp;P, EyeQ)">OPSM (incl. L&amp;P, EyeQ)</option>
        <option value="Optical by National Pharmacies">Optical by National Pharmacies</option>
        <option value="Oscar Wylee">Oscar Wylee</option>
        <option value="Other (e.g., uni, not-for-profit)">Other (e.g., uni, hospital, govt, not-for-profit)</option>
        <option value="Specsavers">Specsavers</option>
        <option value="Teacher’s Health Fund">Teachers Health</option>
        <option value="NIB (incl. the Optical Company)">The Optical Company (incl. NIB)</option>
        <option value="The Optical Superstore">The Optical Superstore</option>
      </select>
  </div>
  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>

<!-- Step 14 (Meal breaks) -->
<div class="step" data-step="14">
  <div class="step-body">


    <label for="q14_mealBreakPct" class="long-question">
      % of unpaid meal-break time taken in a 4-week cycle
      <small>Not consulting or doing admin</small>
      <small>You’re entitled to a 30–60 min unpaid meal break if working &gt;5hrs</small>
    </label>
    <input id="q14_mealBreakPct" type="number" inputmode="numeric" enterkeyhint="next" min="0" max="100" step="1" required>
  </div>

  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>

<!-- Step 15 (Tea breaks) -->
<div class="step" data-step="15">
  <div class="step-body">


    <label for="q14_teaBreakPct" class="long-question">
      % of paid tea-break time taken in a 4-week cycle
      <small>You’re entitled to a 10 min paid tea break per 4hrs worked</small>
    </label>
    <input id="q14_teaBreakPct" type="number" inputmode="numeric" enterkeyhint="next" min="0" max="100" step="1" required>
  </div>

  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>
  <div class="progress"></div>
</div>

<!-- Step 16 -->
<div class="step" data-step="16">
  <div class="step-body">
    <label for="q15_extraMinutes4wk" class="long-question">
      Total minutes worked outside rostered hours in a 4-week cycle
      <small>Include early setup and staying back for admin</small>
    </label>

    <input
      id="q15_extraMinutes4wk"
      type="number"
      inputmode="numeric"
      enterkeyhint="next"
      min="0"
      step="1"
      required
    >
  </div>

  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button type="button" class="next">Next</button>
  </div>

  <div class="progress"></div>
</div>

<!-- Step 17 -->
<div class="step" data-step="17">
  <div class="step-body">
    <label for="q15_extraTimePaidPct" class="long-question">
      % of this extra time paid or returned as TOIL
      <small>TOIL = time off in lieu</small>
    </label>

    <input
      id="q15_extraTimePaidPct"
      type="number"
      inputmode="numeric"
      enterkeyhint="done"
      min="0"
      max="100"
      step="1"
      required
    >
  </div>

  <div class="nav-row">
    <button type="button" class="back">Back</button>
    <button id="submit" type="button">Submit</button>
  </div>

  <div class="progress"></div>
</div>

<div id="out"></div>

</div><!-- /#app -->
</div><!-- /#fit -->


  <script>
    /*
      GitHub version:
      1) Deploy the backend Code.gs below as a Web App.
      2) Paste the Web App /exec URL here.
    */
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbweiMJU_UsT_TXhl7P673MCNE2k9n7tSej5NnsTt_gNlYSL3VmPeFfn0L0F_SPU04zCeQ/exec';

    function callPermanentSalaryBackend(action, params = {}) {
      return new Promise((resolve, reject) => {
        if (!BACKEND_URL) {
          reject(new Error('Backend URL has not been set.'));
          return;
        }

        const callbackName = `permSalaryTrackerCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');

        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('Request timed out.'));
        }, 30000);

        function cleanup() {
          window.clearTimeout(timeout);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = response => {
          cleanup();

          if (!response || !response.ok) {
            reject(new Error(response?.message || 'Request failed.'));
            return;
          }

          resolve(response);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Network error.'));
        };

        const query = new URLSearchParams({
          callback: callbackName,
          action,
          ...params
        });

        script.src = `${BACKEND_URL}?${query.toString()}`;
        document.body.appendChild(script);
      });

    /** Returns { ok:boolean, lastInFY:Date|null }
     * ok=false means there is already a submission in the current financial year.
     */
    function financialYearStatus(history) {
      if (!Array.isArray(history) || history.length === 0) {
        return { ok: true, lastInFY: null };
      }

      // Helper: map a Date → financial year starting 1 July
      const getFY = d => {
        const year = d.getFullYear();
        const month = d.getMonth(); // 0=Jan, 6=Jul
        return (month >= 6) ? year : (year - 1); // e.g. 1 Jul 2024–30 Jun 2025 ⇒ 2024
      };

      const nowFY = getFY(new Date());

      const dated = history
        .map(h => (typeof h === 'string' ? new Date(h) : new Date(h.ts)))
        .filter(d => !isNaN(+d));

      if (dated.length === 0) return { ok: true, lastInFY: null };

      // Submissions in the current financial year
      const inThisFY = dated.filter(d => getFY(d) === nowFY);
      if (inThisFY.length === 0) {
        return { ok: true, lastInFY: null };
      }

      // latest submission within current FY
      const lastInFY = inThisFY.sort((a, b) => b - a)[0];
      return { ok: false, lastInFY };
    }

    function loadFteWeeklyHours() {

    function getLatestSnapshot(history, currentFYOnly = false) {
      const now = new Date();
      const currentFYStartYear = now.getFullYear() - (now.getMonth() < 6 ? 1 : 0);
      const currentFYStart = new Date(currentFYStartYear, 6, 1);
      const nextFYStart = new Date(currentFYStartYear + 1, 6, 1);

      const matches = (Array.isArray(history) ? history : [])
        .filter(item => item && typeof item === 'object' && item.ts)
        .map(item => ({ item, date: new Date(item.ts) }))
        .filter(({ date }) => !isNaN(+date))
        .filter(({ date }) =>
          !currentFYOnly || (date >= currentFYStart && date < nextFYStart)
        )
        .sort((a, b) => b.date - a.date);

      return matches.length ? matches[0].item : null;
    }

    function getSnapshotFteWeeklyHours(data) {
      const savedFteHours = Number(data?.fteWeeklyHours);

      if (Number.isFinite(savedFteHours) && savedFteHours > 0) {
        return savedFteHours;
      }

      return Number.isFinite(fteWeeklyHours) && fteWeeklyHours > 0
        ? fteWeeklyHours
        : null;
    }

    function calculatePotentialUncompensatedWork(data) {
      if (!data) return null;

      const salary = Number(data.salary);
      const hoursPerWeek = Number(data.hoursPerWeek);
      const mealBreakPct = Number(data.mealBreakPct);
      const teaBreakPct = Number(data.teaBreakPct);
      const extraMinutes4wk = Number(data.extraMinutes4wk);
      const extraTimePaidPct = Number(data.extraTimePaidPct);

      const inputs = [
        salary,
        hoursPerWeek,
        mealBreakPct,
        teaBreakPct,
        extraMinutes4wk,
        extraTimePaidPct
      ];

      if (
        !inputs.every(value => Number.isFinite(value)) ||
        salary < 0 ||
        hoursPerWeek <= 0 ||
        mealBreakPct < 0 || mealBreakPct > 100 ||
        teaBreakPct < 0 || teaBreakPct > 100 ||
        extraMinutes4wk < 0 ||
        extraTimePaidPct < 0 || extraTimePaidPct > 100
      ) {
        return null;
      }

      const fteHours = getSnapshotFteWeeklyHours(data);

      const proRataAnnualSalary = data.basis === 'Full-time-equivalent (FTE)'
        ? (fteHours ? salary * (hoursPerWeek / fteHours) : NaN)
        : salary;

      if (!Number.isFinite(proRataAnnualSalary)) return null;

      const baseHourlyRate = proRataAnnualSalary / (hoursPerWeek * 52);

      const mealBreakWork =
        baseHourlyRate *
        (30 / 60) *
        5 *
        52 *
        (1 - mealBreakPct / 100);

      const teaBreakWork =
        baseHourlyRate *
        (10 / 60) *
        5 *
        52 *
        (1 - teaBreakPct / 100);

      const outsideRosteredWork =
        baseHourlyRate *
        (extraMinutes4wk / 60) *
        13 *
        (1 - extraTimePaidPct / 100);

      return {
        mealBreakWork,
        teaBreakWork,
        outsideRosteredWork,
        total: mealBreakWork + teaBreakWork + outsideRosteredWork
      };
    }

    function escapeHtml(value) {

      if (snapshot.state) {

      if (snapshot.employer) {

      return parts;
    }

    function formatPotentialWorkSummary(data) {

    function formatSubmissionMessage(date, snapshot, isCurrentFY) {

      ].filter(Boolean).join('');
    }

function getOrCreateRespondentId() {
  const storageKey = 'optomPermRespondentId';
  let id = localStorage.getItem(storageKey);

  if (!id) {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') {
      id = window.crypto.randomUUID();
    } else {
      id = 'op_' + Date.now().toString(36) + '_' +
           Math.random().toString(36).slice(2);
    }

    localStorage.setItem(storageKey, id);
  }

  return id;
}

    function save () {
      // load prior submissions (back-compat with old timestamp-only entries)
      const historyRaw = JSON.parse(localStorage.getItem('optomPermHistory') || '[]');
      const hist = historyRaw.map(h => (typeof h === 'string' ? { ts: h } : h));

      // --- Enforce one submission per financial year ---
      const fy = financialYearStatus(hist);
      if (!fy.ok) {
        const snapshot = getLatestSnapshot(hist, true);

        showTerminalState(
          formatSubmissionMessage(fy.lastInFY, snapshot, true)
        );

        return;
      }

      const q15Field = document.getElementById('q15_extraTimePaidPct');

      if (!q15Field.value.trim()) {
        showFieldWarning(q15Field, '⚠️ Enter a value from 0 to 100');
        return;
      }

      if (!validateFieldRule(q15Field)) {
        return;
      }


      /* read & validate fields… */
      const salaryRaw = document.getElementById('q1_salary').value.trim();
      const salaryNum = salaryRaw.replace(/[, ]/g, ''); // allow "120,000"
      // Basis (must choose exactly one)
      const basisBoxes = [...document.querySelectorAll('.basis-one')].filter(b => b.checked);
      const basis      = basisBoxes.length === 1 ? basisBoxes[0].value : 'x';

      // Average hours/week (0–80, decimals OK)
      const hoursRaw     = document.getElementById('q1c_hours').value.trim();
      const hoursPerWeek = hoursRaw === '' ? 'x' : +hoursRaw;

      const bonusRaw    = document.getElementById('q1b_bonus').value.trim();
      const bonusIncome = bonusRaw === '' ? 'x' : bonusRaw; // keep as free text, per your request

      const expRaw   = document.getElementById('q2_exp').value.trim();
      const sat4wkRaw   = document.getElementById('q3a_sat4wk').value.trim();
      const sun4wkRaw   = document.getElementById('q3b_sun4wk').value.trim();
      const lates4wkRaw = document.getElementById('q3c_lates4wk').value.trim();

      const stateRaw = document.getElementById('q4_state').value.trim();
      const mmmRaw   = document.getElementById('q4_mmm').value.trim();
      const employerRaw = document.getElementById('q6_employer').value.trim();
      const mealBreakPctRaw = document.getElementById('q14_mealBreakPct').value.trim();
      const teaBreakPctRaw = document.getElementById('q14_teaBreakPct').value.trim();
      const extraMinutes4wkRaw = document.getElementById('q15_extraMinutes4wk').value.trim();
      const extraTimePaidPctRaw = document.getElementById('q15_extraTimePaidPct').value.trim();

      const salary    = salaryNum === '' ? 'x' : +salaryNum;
      const expYears  = expRaw === '' ? 'x' : +expRaw;
      const patients  = ''; // Keep column D blank for new submissions
      const sat4wk    = sat4wkRaw === '' ? 'x' : +sat4wkRaw;
      const sun4wk   = sun4wkRaw   === '' ? 'x' : +sun4wkRaw;
      const lates4wk = lates4wkRaw === '' ? 'x' : +lates4wkRaw;

      const state    = stateRaw === '' ? 'x' : stateRaw;
      // strip any leading “MM” (case‐insensitive) before converting to Number
      const mmmStripped = mmmRaw.replace(/^mm/i, '').trim();
      const mmm        = mmmStripped === '' ? 'x' : +mmmStripped;
      const employer = employerRaw === '' ? 'x' : employerRaw;
      const mealBreakPct = mealBreakPctRaw === '' ? 'x' : +mealBreakPctRaw;
      const teaBreakPct = teaBreakPctRaw === '' ? 'x' : +teaBreakPctRaw;
      const extraMinutes4wk = extraMinutes4wkRaw === '' ? 'x' : +extraMinutes4wkRaw;
      const extraTimePaidPct = extraTimePaidPctRaw === '' ? 'x' : +extraTimePaidPctRaw;

      const services = ''; // Keep column F blank for new submissions

      let invalidQuestion = null;

      if (!Number.isFinite(salary) || salary < 0) {
        invalidQuestion = 1;
      } else if (!Number.isFinite(Number(bonusIncome)) || Number(bonusIncome) < 0) {
        invalidQuestion = 2;
      } else if (basis === 'x') {
        invalidQuestion = 3;
      } else if (!Number.isFinite(hoursPerWeek) || hoursPerWeek < 0) {
        invalidQuestion = 4;
      } else if (!Number.isFinite(expYears) || expYears < 0) {
        invalidQuestion = 5;
      } else if (!Number.isInteger(sat4wk) || sat4wk < 0 || sat4wk > 4) {
        invalidQuestion = 6;
      } else if (!Number.isInteger(sun4wk) || sun4wk < 0 || sun4wk > 4) {
        invalidQuestion = 7;
      } else if (!Number.isInteger(lates4wk) || lates4wk < 0 || lates4wk > 4) {
        invalidQuestion = 8;
      } else if (state === 'x') {
        invalidQuestion = 9;
      } else if (!Number.isInteger(mmm) || mmm < 1 || mmm > 7) {
        invalidQuestion = 10;
      } else if (employer === 'x') {
        invalidQuestion = 11;
      } else if (!Number.isFinite(mealBreakPct) || mealBreakPct < 0 || mealBreakPct > 100) {
        invalidQuestion = 12;
      } else if (!Number.isFinite(teaBreakPct) || teaBreakPct < 0 || teaBreakPct > 100) {
        invalidQuestion = 13;
      } else if (!Number.isFinite(extraMinutes4wk) || extraMinutes4wk < 0) {
        invalidQuestion = 14;
      } else if (
        !Number.isFinite(extraTimePaidPct) ||
        extraTimePaidPct < 0 ||
        extraTimePaidPct > 100
      ) {
        invalidQuestion = 15;
      }

      if (invalidQuestion !== null) {
        out.textContent = `⚠️ Please complete Q ${invalidQuestion}`;
        applyScale();
        return;
      }


      const respondentId = getOrCreateRespondentId();

      out.textContent = 'Submitting…';
      applyScale();

      callPermanentSalaryBackend('saveSurvey', {
        salary,
        bonusIncome,
        basis,
        hoursPerWeek,
        expYears,
        patientsPerDay: patients,
        sat4wk,
        sun4wk,
        lates4wk,
        state,
        mmm,
        services,
        employer,
        respondentId,
        mealBreakPct,
        teaBreakPct,
        extraMinutes4wk,
        extraTimePaidPct
      })
        .then(() => {
          // Save a concise snapshot for the last-submitted and lockout displays.
          const snapshot = {
            ts: new Date().toISOString(),
            respondentId,
            salary, bonusIncome, basis, hoursPerWeek,
            expYears, patients, sat4wk, sun4wk, lates4wk,
            state, mmm, services, employer,
            mealBreakPct, teaBreakPct, extraMinutes4wk, extraTimePaidPct, fteWeeklyHours
          };

          const historyRaw2 = JSON.parse(localStorage.getItem('optomPermHistory') || '[]');
          const updated = Array.isArray(historyRaw2) ? historyRaw2 : [];
          updated.push(snapshot);
          localStorage.setItem('optomPermHistory', JSON.stringify(updated));

          showTerminalState(
            formatSubmissionMessage(new Date(snapshot.ts), snapshot, false)
          );
        })
        .catch(err => {
          out.textContent = '⚠️ Unable to submit right now, please try again';
          applyScale();
          console.error(err);
        });



        console.log(`Attempted save: ${salary},${expYears},${patients},${state},${mmm},${services},${employer}`);



    }
  </script>
