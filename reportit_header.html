<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --purple: #6600ff;
      --ink: #151515;
      --muted: #69718a;
      --live-red: #e53935;

      --blue-cone: rgba(74, 86, 255, 0.82);
      --green-cone: rgba(36, 210, 116, 0.78);
      --red-cone: rgba(255, 92, 48, 0.76);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      color: var(--ink);
    }

    #fit {
      width: 100%;
      overflow: hidden;
    }

    #app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 2px 14px;
      text-align: center;
    }

    .response-summary {
      position: relative;
      width: 100%;
      padding: 0;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      align-items: start;
    }

    .summary-item {
      min-width: 0;
      padding: 0 10px;
    }

    .summary-item:first-child .response-label,
    .summary-item:first-child .response-value {
      transform: translateX(8px);
    }
    
    .summary-item:last-child .response-label,
    .summary-item:last-child .response-value {
      transform: translateX(-8px);
    }    
    
    .summary-item:first-child {
      border-right: 1px solid rgba(105, 113, 138, 0.16);
    }

    .response-label {
      color: var(--muted);
      font-size: clamp(13px, 3.8vw, 16px);
      font-weight: 400;
      line-height: 1.15;
      text-align: center;
      white-space: nowrap;
    }

    .response-value-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 31px;
      margin-top: 2px;
    }

    .response-value {
      margin-top: 2px;
      color: var(--ink);
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 400;
      line-height: 1.1;
      text-align: center;
      white-space: nowrap;
    }

    .response-value.is-loading {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 82px;
      min-height: 31px;
      font-size: inherit;
    }

    .cone-loader {
      position: relative;
      width: 42px;
      height: 20px;
      margin: 0;
      overflow: visible;
      isolation: isolate;
      flex: 0 0 42px;
    }

    .cone {
      position: absolute;
      bottom: 1px;
      width: 14px;
      height: 17px;
      opacity: 0;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      -webkit-clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      filter: drop-shadow(0 1px 2px rgba(21, 21, 21, 0.07));
      mix-blend-mode: multiply;
      will-change: opacity;
    }

    .cone.blue {
      left: 10px;
      background: var(--blue-cone);
      animation: blueConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.green {
      left: 18px;
      background: var(--green-cone);
      animation: greenConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .cone.red {
      left: 23px;
      background: var(--red-cone);
      animation: redConeCycle 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    .loader-text {
      margin: 0;
      color: var(--muted);
      font-size: 8px;
      font-weight: 400;
      line-height: 1;
      text-align: left;
      animation: loadingTextPulse 2.7s infinite cubic-bezier(0.45, 0, 0.25, 1);
    }

    @keyframes blueConeCycle {
      0% { opacity: 0; }
      12% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes greenConeCycle {
      0% { opacity: 0; }
      20% { opacity: 0; }
      32% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes redConeCycle {
      0% { opacity: 0; }
      40% { opacity: 0; }
      52% { opacity: 1; }
      76% { opacity: 1; }
      87% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes loadingTextPulse {
      0% { opacity: 0.45; }
      52% { opacity: 0.78; }
      76% { opacity: 0.78; }
      87% { opacity: 0.45; }
      100% { opacity: 0.45; }
    }

    .live-data {
      position: absolute;
      right: 1px;
      bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }

    .live-data-dot {
      width: 6px;
      height: 6px;
      flex: 0 0 6px;
      border-radius: 50%;
      background: var(--live-red);
    }

    .response-summary::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: 5px;
      background: linear-gradient(
        90deg,
        #fff 0%,
        rgba(102, 0, 255, 0.16) 24%,
        var(--purple) 50%,
        rgba(102, 0, 255, 0.16) 76%,
        #fff 100%
      );
    }

    .error {
      color: var(--muted);
      font-size: 14px;
    }

    @media (prefers-reduced-motion: reduce) {
      .cone.blue,
      .cone.green,
      .cone.red {
        animation: none;
        opacity: 1;
      }

      .loader-text {
        animation: none;
        opacity: 0.72;
      }
    }

    @media (max-width: 430px) {
      #app {
        padding: 12px 1px 12px;
      }

      .summary-item {
        padding: 0 6px;
      }

      .response-label {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div id="fit">
    <main id="app">

      <section class="response-summary" aria-live="polite">

        <div class="summary-grid">

          <!-- LEFT -->
          <div class="summary-item">
            <div class="response-label">
              Reports
            </div>

            <div class="response-value-row">
              <div id="reports-value" class="response-value is-loading">

                <div class="cone-loader" role="status" aria-label="Loading">
                  <div class="cone blue" aria-hidden="true"></div>
                  <div class="cone green" aria-hidden="true"></div>
                  <div class="cone red" aria-hidden="true"></div>
                </div>

                <div class="loader-text">Loading...</div>

              </div>
            </div>
          </div>

          <!-- RIGHT -->
          <div class="summary-item">
            <div class="response-label">
              Supporting documents
            </div>

            <div class="response-value-row">
              <div id="documents-value" class="response-value is-loading">
            
                <div class="cone-loader" role="status" aria-label="Loading">
                  <div class="cone blue" aria-hidden="true"></div>
                  <div class="cone green" aria-hidden="true"></div>
                  <div class="cone red" aria-hidden="true"></div>
                </div>
            
                <div class="loader-text">Loading...</div>
            
              </div>
            
              <div class="live-data" aria-label="Live data">
                <span class="live-data-dot" aria-hidden="true"></span>
                <span>LIVE data</span>
              </div>
            </div>
          </div>

        </div>

      </section>

    </main>
  </div>

  <script>
    const SPREADSHEET_ID = '1hMjeY-Cg3ZJWYWrfx0Brxb1QvhDYpiDq6OR4F4g8zCE';
    const SHEET_GID = '0';

    // B1 = Reports
    // C1 = Supporting documents
    const DATA_RANGE = 'B1:C1';

    const reportsValue = document.getElementById('reports-value');
    const documentsValue = document.getElementById('documents-value');

    function getCellDisplayValue(cell) {
      if (!cell) return '';
      return String(cell.f ?? cell.v ?? '').trim();
    }

    function showValue(element, value, isError = false) {
      element.classList.remove('is-loading');
      element.textContent = value || '—';
      element.classList.toggle('error', isError);
    }

    function loadDashboardData() {
      const callbackName =
        `pffReportStatsCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;

      const script = document.createElement('script');

      const timeout = window.setTimeout(() => {
        cleanup();
        showValue(reportsValue, '—', true);
        showValue(documentsValue, '—', true);
      }, 10000);

      function cleanup() {
        window.clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      window[callbackName] = response => {
        cleanup();

        if (response?.status === 'error') {
          showValue(reportsValue, '—', true);
          showValue(documentsValue, '—', true);
          return;
        }

        const row = response?.table?.rows?.[0];
        const reports = getCellDisplayValue(row?.c?.[0]);
        const documents = getCellDisplayValue(row?.c?.[1]);

        showValue(reportsValue, reports);
        showValue(documentsValue, documents);
      };

      script.onerror = () => {
        cleanup();
        showValue(reportsValue, '—', true);
        showValue(documentsValue, '—', true);
      };

      const params = new URLSearchParams({
        gid: SHEET_GID,
        range: DATA_RANGE,
        headers: '0',
        tqx: `responseHandler:${callbackName}`
      });

      script.src =
        `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;

      document.body.appendChild(script);
    }

    loadDashboardData();

    // Refresh the live values every 60 seconds while the page remains open.
    window.setInterval(loadDashboardData, 60000);
  </script>
</body>
</html>
